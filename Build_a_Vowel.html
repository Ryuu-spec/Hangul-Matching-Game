<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build a Vowel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdf8f0;
            color: #1a1a2e;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── 반응형 핵심: vmin 기반 스케일 ── */
        :root {
            --s: 1vmin;           /* 기본 스케일 단위 */
        }

        .universe-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bg-default  { background: radial-gradient(circle at center, #fdf8f0, #f0e9dc); }
        .bg-bright   { background: linear-gradient(to bottom, #ffe8cc, #ffd4a8, #fdf8f0); }
        .bg-dark     { background: linear-gradient(to bottom, #e8eef5, #d4e0ec, #fdf8f0); }
        .bg-neutral  { background: linear-gradient(to bottom, #eef2e8, #dde8d4, #fdf8f0); }

        /* ── 레이아웃 ── */
        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: clamp(4px, 1.5vmin, 12px);
            gap: clamp(2px, 0.8vmin, 8px);
        }

        /* ── 헤더 ── */
        #app > header {
            flex: 0 0 auto;
            text-align: center;
        }

        #app > header h1 {
            font-size: clamp(16px, 4.5vmin, 32px);
            font-weight: 900;
            letter-spacing: -0.03em;
            color: #1f2937;
            margin: 0 0 2px;
            line-height: 1.1;
        }

        #app > header p {
            font-size: clamp(7px, 1.4vmin, 11px);
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.8;
            margin: 0;
        }

        /* ── 원소 카드 행 ── */
        .elements-row {
            display: flex;
            justify-content: center;
            gap: clamp(4px, 1.2vmin, 12px);
            margin-top: clamp(4px, 1vmin, 10px);
        }

        .element-card {
            cursor: grab;
            touch-action: none;
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.10);
            border-radius: clamp(12px, 3vmin, 24px);
            width: clamp(60px, 14vmin, 96px);
            padding: clamp(6px, 1.2vmin, 12px) clamp(4px, 0.8vmin, 8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.6vmin, 6px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .element-card.dragging { opacity: 0.5; transform: scale(0.8); }

        .elem-shape-heaven {
            width: clamp(24px, 5.5vmin, 40px);
            height: clamp(24px, 5.5vmin, 40px);
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(239,68,68,0.5);
        }
        .elem-shape-earth {
            width: clamp(36px, 8vmin, 56px);
            height: clamp(8px, 1.8vmin, 12px);
            background: #facc15;
            border-radius: 9999px;
            box-shadow: 0 0 20px rgba(250,204,21,0.6);
            margin: clamp(6px, 1.5vmin, 16px) 0;
        }
        .elem-shape-human {
            width: clamp(8px, 1.8vmin, 12px);
            height: clamp(28px, 6.5vmin, 48px);
            background: #22c55e;
            border-radius: 9999px;
            box-shadow: 0 0 20px rgba(34,197,94,0.5);
        }

        .elem-label {
            font-size: clamp(7px, 1.4vmin, 10px);
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        /* ── 메인 (드롭존) ── */
        #app > main {
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: clamp(2px, 0.5vmin, 6px);
        }

        #drop-zone {
            --dz: clamp(120px, 33vmin, 280px);
            width: var(--dz);
            height: var(--dz);
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.03);
            border: 2px dashed rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
        }
        #drop-zone.active {
            background: rgba(0,0,0,0.07);
            border-color: rgba(0,0,0,0.3);
        }

        /* ── 드롭존 내부 ── */
        .visual-layer {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .base-silhouette {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0.5);
            position: absolute;
            border-radius: 9999px;
        }
        .base-silhouette.show {
            opacity: 0.8;
            transform: scale(1);
            filter: drop-shadow(0 0 15px currentColor);
        }

        #visual-human { left: calc(50% - 6px); width: 12px; height: 70%; background: #22c55e; }
        #visual-earth { top:  calc(50% - 6px); width: 70%; height: 12px; background: #facc15; }

        #visual-dot {
            position: absolute;
            width: clamp(16px, 4vmin, 30px);
            height: clamp(16px, 4vmin, 30px);
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 24px rgba(239,68,68,0.9), 0 0 8px rgba(239,68,68,0.5);
            opacity: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }

        @keyframes dotLand {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 24px rgba(239,68,68,0.9); }
            50%       { box-shadow: 0 0 40px rgba(239,68,68,1), 0 0 60px rgba(239,68,68,0.4); }
        }
        .dot-land {
            animation: dotLand 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                       dotPulse 1s ease-in-out 0.7s infinite;
        }

        .preview-text {
            position: absolute;
            font-size: clamp(60px, 18vmin, 140px);
            font-weight: 900;
            color: rgba(0,0,0,0.07);
            pointer-events: none;
            z-index: 5;
        }

        #recipe-hint {
            text-align: center;
            color: rgba(0,0,0,0.2);
            transition: all 0.7s;
        }
        #recipe-hint i  { font-size: clamp(28px, 8vmin, 56px); display: block; margin-bottom: 6px; }
        #recipe-hint p  { font-size: clamp(7px, 1.4vmin, 10px); font-weight: 900; letter-spacing: 0.3em; margin: 0; }

        #result-display {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #result-display.hidden { display: none; }

        @keyframes fadeInVowel {
            0%   { opacity: 0; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1); }
        }
        .vowel-appear { animation: fadeInVowel 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        #vowel-char {
            font-size: clamp(56px, 16vmin, 160px);
            font-weight: 900;
            line-height: 1;
            color: #1f2937;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.15));
        }
        #vowel-desc {
            font-size: clamp(7px, 1.4vmin, 11px);
            font-weight: 700;
            color: #374151;
            padding: clamp(3px, 0.6vmin, 6px) clamp(8px, 2vmin, 16px);
            background: rgba(0,0,0,0.1);
            border-radius: 9999px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            max-width: 90%;
            text-align: center;
        }

        #status-msg {
            font-size: clamp(9px, 1.6vmin, 13px);
            font-weight: 700;
            color: #3b82f6;
            height: clamp(14px, 2.5vmin, 24px);
            text-align: center;
            transition: opacity 0.3s;
        }

        /* ── 푸터 ── */
        #app > footer {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: clamp(16px, 4vmin, 36px);
            padding: clamp(6px, 1.5vmin, 16px) clamp(10px, 2.5vmin, 24px);
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(4px, 0.8vmin, 8px);
        }
        .footer-top span:first-child {
            font-size: clamp(7px, 1.3vmin, 10px);
            font-weight: 900;
            color: rgba(0,0,0,0.35);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        #progress-text {
            font-size: clamp(8px, 1.5vmin, 12px);
            font-weight: 900;
            color: #f97316;
        }

        .vowel-collection {
            display: flex;
            justify-content: center;
            gap: clamp(3px, 0.8vmin, 8px);
        }

        .progress-dot {
            width:  clamp(28px, 7vmin, 44px);
            height: clamp(28px, 7vmin, 44px);
            border-radius: clamp(6px, 1.5vmin, 14px);
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(11px, 2.8vmin, 18px);
            color: rgba(0,0,0,0.25);
            transition: all 0.3s;
        }
        .progress-dot.completed {
            background: #f59e0b;
            box-shadow: 0 0 15px #f59e0b;
            color: #000;
            border-color: #fff;
        }

        #reset-btn {
            display: block;
            width: 100%;
            margin-top: clamp(4px, 1vmin, 10px);
            padding: clamp(5px, 1.2vmin, 12px);
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: clamp(10px, 2.5vmin, 20px);
            font-size: clamp(7px, 1.3vmin, 10px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(0,0,0,0.35);
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        #reset-btn:hover { background: rgba(0,0,0,0.1); }

        /* ── 드래그 고스트 ── */
        #drag-icon {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            display: none;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

<div id="universe" class="universe-bg bg-default"></div>
<div id="drag-icon"></div>

<div id="app">

    <!-- ── 헤더 ── -->
    <header>
        <h1>Build a Vowel</h1>
        <p>천지인 (Heaven · Earth · Human)</p>

        <div class="elements-row">
            <div class="element-card" data-type="heaven">
                <div class="elem-shape-heaven"></div>
                <span class="elem-label" style="color:#dc2626">Heaven (ㆍ)</span>
            </div>
            <div class="element-card" data-type="earth">
                <div class="elem-shape-earth"></div>
                <span class="elem-label" style="color:#ca8a04">Earth (ㅡ)</span>
            </div>
            <div class="element-card" data-type="human">
                <div class="elem-shape-human"></div>
                <span class="elem-label" style="color:#16a34a">Human (ㅣ)</span>
            </div>
        </div>
    </header>

    <!-- ── 메인 ── -->
    <main>
        <div id="drop-zone">
            <div class="visual-layer" id="visual-container">
                <div id="visual-human" class="base-silhouette"></div>
                <div id="visual-earth" class="base-silhouette"></div>
                <div id="visual-dot"></div>
            </div>

            <div id="preview-char" class="preview-text"></div>

            <div id="recipe-hint">
                <i class="fa-solid fa-expand"></i>
                <p>DRAG HERE</p>
            </div>

            <div id="result-display" class="hidden">
                <div id="vowel-char"></div>
                <div id="vowel-desc"></div>
            </div>
        </div>

        <div id="status-msg"></div>
    </main>

    <!-- ── 푸터 ── -->
    <footer>
        <div class="footer-top">
            <span>Inventory</span>
            <span id="progress-text">0 / 6</span>
        </div>
        <div class="vowel-collection">
            <div class="progress-dot" data-vowel="ㅏ">ㅏ</div>
            <div class="progress-dot" data-vowel="ㅓ">ㅓ</div>
            <div class="progress-dot" data-vowel="ㅗ">ㅗ</div>
            <div class="progress-dot" data-vowel="ㅜ">ㅜ</div>
            <div class="progress-dot" data-vowel="ㅡ">ㅡ</div>
            <div class="progress-dot" data-vowel="ㅣ">ㅣ</div>
        </div>
        <button id="reset-btn">Initialize Universe</button>
    </footer>

</div>

<script>
    const dropZone    = document.getElementById('drop-zone');
    const dragIcon    = document.getElementById('drag-icon');
    const universe    = document.getElementById('universe');
    const resultDisplay = document.getElementById('result-display');
    const recipeHint  = document.getElementById('recipe-hint');
    const statusMsg   = document.getElementById('status-msg');
    const previewChar = document.getElementById('preview-char');
    const vHuman      = document.getElementById('visual-human');
    const vEarth      = document.getElementById('visual-earth');

    let baseElement = null;
    let collectedVowels = new Set();
    let isDragging  = false;
    let activeType  = null;
    let resultTimer = null;

    const results = {
        'ㅏ': { char: 'ㅏ', theme: 'bright',  dotPos: { left: '67%', top: '50%' }, desc: 'Heaven shines to the RIGHT of Human' },
        'ㅓ': { char: 'ㅓ', theme: 'dark',    dotPos: { left: '33%', top: '50%' }, desc: 'Heaven shines to the LEFT of Human'  },
        'ㅗ': { char: 'ㅗ', theme: 'bright',  dotPos: { left: '50%', top: '28%' }, desc: 'Heaven rises ABOVE the Earth'         },
        'ㅜ': { char: 'ㅜ', theme: 'dark',    dotPos: { left: '50%', top: '72%' }, desc: 'Heaven falls BELOW the Earth'         },
        'ㅡ': { char: 'ㅡ', theme: 'neutral', dotPos: null,                         desc: 'The flat Earth'                       },
        'ㅣ': { char: 'ㅣ', theme: 'neutral', dotPos: null,                         desc: 'A standing Human'                     }
    };

    /* ── 드래그 ── */
    document.querySelectorAll('.element-card').forEach(card => {
        card.addEventListener('pointerdown', e => {
            isDragging = true;
            activeType = card.dataset.type;
            card.classList.add('dragging');
            dragIcon.innerHTML = card.querySelector('div').outerHTML;
            dragIcon.style.display = 'block';
            moveAt(e.clientX, e.clientY);
        });
    });

    document.addEventListener('pointermove', e => {
        if (!isDragging) return;
        moveAt(e.clientX, e.clientY);

        const r = dropZone.getBoundingClientRect();
        const inside = e.clientX > r.left && e.clientX < r.right &&
                       e.clientY > r.top  && e.clientY < r.bottom;
        dropZone.classList.toggle('active', inside);

        if (inside && activeType === 'heaven' && baseElement) {
            const relX = (e.clientX - r.left) / r.width;
            const relY = (e.clientY - r.top)  / r.height;
            if (baseElement === 'human') previewChar.innerText = relX > 0.5 ? 'ㅏ' : 'ㅓ';
            else if (baseElement === 'earth') previewChar.innerText = relY < 0.5 ? 'ㅗ' : 'ㅜ';
        } else {
            previewChar.innerText = '';
        }
    });

    document.addEventListener('pointerup', e => {
        if (!isDragging) return;
        isDragging = false;
        dragIcon.style.display = 'none';
        document.querySelectorAll('.element-card').forEach(c => c.classList.remove('dragging'));

        const r = dropZone.getBoundingClientRect();
        if (e.clientX > r.left && e.clientX < r.right &&
            e.clientY > r.top  && e.clientY < r.bottom) {
            const relX = (e.clientX - r.left) / r.width;
            const relY = (e.clientY - r.top)  / r.height;
            handleLogic(activeType, relX, relY);
        }
        dropZone.classList.remove('active');
        previewChar.innerText = '';
    });

    function moveAt(x, y) {
        dragIcon.style.left = x - dragIcon.offsetWidth  / 2 + 'px';
        dragIcon.style.top  = y - dragIcon.offsetHeight / 2 + 'px';
    }

    /* ── 게임 로직 ── */
    function handleLogic(type, relX, relY) {
        if (!resultDisplay.classList.contains('hidden')) return;

        if (type === 'human') {
            baseElement = 'human';
            vHuman.classList.add('show');
            vEarth.classList.remove('show');
            statusMsg.innerText = 'Human (ㅣ) stands at the center.';
            recipeHint.style.opacity = '0';
            updateCollection('ㅣ');
        } else if (type === 'earth') {
            baseElement = 'earth';
            vEarth.classList.add('show');
            vHuman.classList.remove('show');
            statusMsg.innerText = 'Earth (ㅡ) lies flat.';
            recipeHint.style.opacity = '0';
            updateCollection('ㅡ');
        } else if (type === 'heaven') {
            if (baseElement === 'human') {
                showResult(relX > 0.5 ? results['ㅏ'] : results['ㅓ']);
            } else if (baseElement === 'earth') {
                showResult(relY < 0.5 ? results['ㅗ'] : results['ㅜ']);
            } else {
                statusMsg.innerText = 'Place Human (ㅣ) or Earth (ㅡ) first!';
            }
        }
    }

    function showResult(result) {
        if (resultTimer) clearTimeout(resultTimer);
        universe.className = `universe-bg bg-${result.theme}`;
        updateCollection(result.char);

        if (!result.dotPos) {
            resultTimer = setTimeout(() => {
                vHuman.classList.remove('show');
                vEarth.classList.remove('show');
                showVowel(result);
                resultTimer = setTimeout(clearSelection, 2500);
            }, 800);
            return;
        }

        const dot = document.getElementById('visual-dot');
        dot.className = '';
        dot.style.left    = '50%';
        dot.style.top     = '5%';
        dot.style.opacity = '0';

        requestAnimationFrame(() => requestAnimationFrame(() => {
            dot.style.transition = 'left 0.65s cubic-bezier(0.34,1.2,0.64,1), top 0.65s cubic-bezier(0.34,1.2,0.64,1)';
            dot.style.left = result.dotPos.left;
            dot.style.top  = result.dotPos.top;
            dot.classList.add('dot-land');
        }));

        resultTimer = setTimeout(() => {
            dot.style.opacity    = '0';
            dot.style.transition = 'opacity 0.3s';
            vHuman.classList.remove('show');
            vEarth.classList.remove('show');
            showVowel(result);
            resultTimer = setTimeout(clearSelection, 2500);
        }, 1800);
    }

    function showVowel(result) {
        const vc = document.getElementById('vowel-char');
        const vd = document.getElementById('vowel-desc');
        vc.innerText   = result.char;
        vc.className   = 'vowel-appear';
        vd.innerText   = result.desc;
        resultDisplay.classList.remove('hidden');
    }

    function updateCollection(char) {
        if (!collectedVowels.has(char)) {
            collectedVowels.add(char);
            const dot = document.querySelector(`.progress-dot[data-vowel="${char}"]`);
            if (dot) dot.classList.add('completed');
            document.getElementById('progress-text').innerText = `${collectedVowels.size} / 6`;
        }
    }

    function clearSelection() {
        if (resultTimer) clearTimeout(resultTimer);
        baseElement = null;
        statusMsg.innerText = '';
        resultDisplay.classList.add('hidden');
        recipeHint.style.opacity = '1';
        universe.className = 'universe-bg bg-default';
        vHuman.classList.remove('show');
        vEarth.classList.remove('show');
        const dot = document.getElementById('visual-dot');
        dot.className = '';
        dot.style.opacity    = '0';
        dot.style.transition = 'none';
    }

    function resetGame() {
        collectedVowels.clear();
        document.querySelectorAll('.progress-dot').forEach(d => d.classList.remove('completed'));
        document.getElementById('progress-text').innerText = '0 / 6';
        clearSelection();
    }

    document.getElementById('reset-btn').addEventListener('click', resetGame);
</script>
</body>
</html>
