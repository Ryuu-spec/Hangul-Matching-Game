<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Basic Vowels - Matching Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdf8f5;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            width: 95vw;
            height: 95vh;
            max-width: none;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
            background-color: white;
            padding: 1.5vh 4vw;
            border-radius: 100px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(24px, 4vw, 48px);
            font-weight: bold;
            color: #333;
        }

        .title span.blue { color: #5b8dee; }
        .title span.red  { color: #ff6b6b; }

        .timer {
            background-color: #ff6b6b;
            color: white;
            padding: 1vh 2vw;
            border-radius: 10px;
            font-size: clamp(18px, 2.5vw, 28px);
            font-weight: bold;
            min-width: 12vw;
            text-align: center;
            box-shadow: 0 2px 6px rgba(255, 107, 107, 0.2);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vw;
            padding: 0 2vw;
            flex: 1;
            align-content: center;
        }

        .card {
            aspect-ratio: 0.8;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            user-select: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: translateX(-100%);
            transition: transform 0.3s;
        }

        .card:hover::before { transform: translateX(100%); }

        .card.romaji {
            background-color: #ddeafc;
            color: #2a4a8a;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: clamp(36px, 8vw, 130px);
            border: clamp(3px, 0.5vw, 6px) solid white;
            letter-spacing: -1px;
        }

        .card.hangul {
            background-color: white;
            border: clamp(3px, 0.5vw, 6px) solid #84aae4;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 900;
            font-size: clamp(60px, 10vw, 140px);
        }

        .card.selected {
            border: clamp(3px, 0.5vw, 6px) solid #5b8dee;
            box-shadow: 0 0 30px rgba(91,141,238,0.6), 0 8px 20px rgba(0,0,0,0.2);
            transform: scale(1.05);
        }

        .card.matched {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .card.wrong {
            animation: shake 0.2s;
            border-color: #f44336;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card:hover:not(.matched):not(.selected) {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .card:active:not(.matched) { transform: scale(1.02); }

        .confetti {
            position: fixed;
            width: 12px; height: 12px;
            top: -10px;
            z-index: 9999;
            pointer-events: none;
            border-radius: 2px;
        }

        @keyframes confetti-fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .restart-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            width: clamp(35px, 4vw, 50px);
            height: clamp(35px, 4vw, 50px);
            border-radius: 50%;
            font-size: clamp(16px, 2vw, 22px);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,107,107,0.3);
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            justify-content: center;
            margin-left: 2vw;
        }

        .restart-button.show { display: flex; }
        .restart-button:hover {
            background-color: #ff5252;
            transform: scale(1.1) rotate(90deg);
        }
        .restart-button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="header">
            <h1 class="title">Korean <span class="blue">Basic</span> <span class="red">Vowels</span></h1>
            <div style="display:flex; align-items:center;">
                <div class="timer" id="timer">00:00</div>
                <button class="restart-button" id="restartBtn" onclick="restartGame()">↻</button>
            </div>
        </div>
        <div class="game-board" id="gameBoard"></div>
    </div>

        };

        let currentAudio = null;
        function speakKorean(text) {
            const audio = audioMap[text];
            if (!audio) return;
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = audio;
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        let selectedCards = [];
        let matchedPairs = 0;
        let startTime;
        let timerInterval;
        let gameStarted = false;
        let isChecking = false;

        function playCorrectSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(), g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 523.25; osc.type = 'sine';
            g.gain.setValueAtTime(0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
        }

        function playIncorrectSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(), g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 200; osc.type = 'sawtooth';
            g.gain.setValueAtTime(0.2, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
        }

        function playCelebrationSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                const t = ctx.currentTime + i * 0.15;
                g.gain.setValueAtTime(0.3, t);
                g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
            });
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initGame() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            shuffleArray(cardsTemplate).forEach((card, index) => {
                const el = document.createElement('div');
                el.className = `card ${card.type}`;
                el.textContent = card.value;
                el.dataset.value = card.value;
                el.dataset.pair  = card.pair;
                el.dataset.index = index;
                if (card.color && card.type === 'hangul') el.style.color = card.color;
                el.addEventListener('click', handleCardClick);
                board.appendChild(el);
            });
        }

        function handleCardClick(e) {
            if (!gameStarted) { startTimer(); gameStarted = true; }
            const card = e.currentTarget;
            if (card.classList.contains('matched') ||
                card.classList.contains('selected') ||
                isChecking || selectedCards.length >= 2) return;

            // 양쪽 카드 클릭 시 발음 재생
            if (card.classList.contains('romaji')) {
                speakKorean(card.dataset.pair);
            } else {
                speakKorean(card.dataset.value);
            }

            card.classList.add('selected');
            selectedCards.push(card);
            if (selectedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            isChecking = true;
            const [c1, c2] = selectedCards;
            if (c1.dataset.value === c2.dataset.pair && c2.dataset.value === c1.dataset.pair) {
                playCorrectSound();
                c1.classList.add('matched'); c2.classList.add('matched');
                c1.classList.remove('selected'); c2.classList.remove('selected');
                matchedPairs++;
                selectedCards = [];
                isChecking = false;
                if (matchedPairs === TOTAL_PAIRS) endGame();
            } else {
                playIncorrectSound();
                c1.classList.add('wrong'); c2.classList.add('wrong');
                setTimeout(() => {
                    c1.classList.remove('selected', 'wrong');
                    c2.classList.remove('selected', 'wrong');
                    selectedCards = [];
                    isChecking = false;
                }, 100);
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const el = Date.now() - startTime;
                const m = Math.floor(el / 60000);
                const s = Math.floor((el % 60000) / 1000);
                document.getElementById('timer').textContent =
                    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 10);
        }

        function createConfetti() {
            const colors = ['#5b8dee','#4ecdc4','#f9ca24','#a29bfe','#fd79a8','#ff7675'];
            const shapes = ['●','■','★'];
            for (let i = 0; i < 100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.color = colors[Math.floor(Math.random() * colors.length)];
                c.style.fontSize = (Math.random() * 15 + 12) + 'px';
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                c.style.animation = 'confetti-fall linear forwards';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 6000);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            playCelebrationSound();
            createConfetti();
            document.getElementById('restartBtn').classList.add('show');
        }

        function restartGame() {
            document.getElementById('restartBtn').classList.remove('show');
            selectedCards = []; matchedPairs = 0;
            gameStarted = false; isChecking = false;
            clearInterval(timerInterval);
            document.getElementById('timer').textContent = '00:00';
            initGame();
        }

        initGame();
    </script>
