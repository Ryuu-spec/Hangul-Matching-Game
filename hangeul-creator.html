<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangeul Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky: #f97316;
            --earth: #22c55e;
            --human: #3b82f6;
            --bg: #080c14;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: #fff;
            height: 100svh;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Cosmic background ── */
        .cosmos {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 50% 0%, #1a2744 0%, #080c14 60%);
            transition: background 1.2s ease;
        }
        .cosmos::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 70% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 10% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.6) 0%, transparent 100%);
        }
        .cosmos.bright { background: radial-gradient(ellipse at 50% 0%, #7c3a0a, #1a0a00 50%, #080c14 100%); }
        .cosmos.dark   { background: radial-gradient(ellipse at 50% 0%, #0e1f4d, #060d23 50%, #080c14 100%); }

        /* ── Layout ── */
        .app {
            position: relative; z-index: 1;
            height: 100svh;
            display: flex; flex-direction: column;
            padding: 16px 16px 0;
            max-width: 420px;
            margin: 0 auto;
        }

        /* ── Header ── */
        header { text-align: center; padding-bottom: 12px; }
        header h1 {
            font-family: 'Gowun Batang', serif;
            font-size: 24px; letter-spacing: 0.05em;
            background: linear-gradient(135deg, #93c5fd, #c4b5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        header p { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.02em; }

        /* ── Element cards ── */
        .elements {
            display: flex; gap: 8px; justify-content: center;
            margin-top: 12px;
        }
        .element-card {
            cursor: grab;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 8px 10px;
            width: 88px;
            text-align: center;
            touch-action: none;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
        }
        .element-card:active { transform: scale(0.93); }
        .element-card[data-type="heaven"] { border-color: rgba(249,115,22,0.25); }
        .element-card[data-type="earth"]  { border-color: rgba(34,197,94,0.25); }
        .element-card[data-type="human"]  { border-color: rgba(59,130,246,0.25); }
        .element-card .glyph {
            font-family: 'Gowun Batang', serif;
            font-size: 28px; line-height: 1;
            margin-bottom: 4px;
        }
        .element-card .label {
            font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; opacity: 0.6;
        }
        .element-card[data-type="heaven"] .glyph { color: var(--sky); }
        .element-card[data-type="earth"]  .glyph { color: var(--earth); }
        .element-card[data-type="human"]  .glyph { color: var(--human); }

        /* ── Drop zone ── */
        .drop-wrap {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px;
        }
        .drop-zone {
            width: 260px; height: 260px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.25s, background 0.25s;
            overflow: hidden;
        }
        .drop-zone.active {
            border-color: rgba(99,179,255,0.4);
            background: rgba(99,179,255,0.05);
        }

        .hint {
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .hint-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.15; }
        .hint p { font-size: 11px; color: rgba(255,255,255,0.2); }

        /* ── Animation stage (inside drop-zone) ── */
        #anim-stage {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .anim-base {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Gowun Batang', serif;
            transition: opacity 0.3s;
        }

        /* base bar visuals */
        .bar-vertical {
            width: 6px; height: 110px;
            background: var(--human);
            border-radius: 3px;
            box-shadow: 0 0 20px var(--human);
        }
        .bar-horizontal {
            width: 110px; height: 6px;
            background: var(--earth);
            border-radius: 3px;
            box-shadow: 0 0 20px var(--earth);
        }

        /* heaven dot */
        .dot-heaven {
            width: 22px; height: 22px;
            background: var(--sky);
            border-radius: 50%;
            box-shadow: 0 0 18px var(--sky);
            position: absolute;
        }

        /* ── Combination animation keyframes ── */
        @keyframes dotFlyRight {
            0%   { transform: translateX(60px) scale(0.5); opacity: 0; }
            40%  { opacity: 1; }
            100% { transform: translateX(40px) scale(1); opacity: 1; }
        }
        @keyframes dotFlyLeft {
            0%   { transform: translateX(-60px) scale(0.5); opacity: 0; }
            40%  { opacity: 1; }
            100% { transform: translateX(-40px) scale(1); opacity: 1; }
        }
        @keyframes dotFlyUp {
            0%   { transform: translateY(-60px) scale(0.5); opacity: 0; }
            40%  { opacity: 1; }
            100% { transform: translateY(-35px) scale(1); opacity: 1; }
        }
        @keyframes dotFlyDown {
            0%   { transform: translateY(60px) scale(0.5); opacity: 0; }
            40%  { opacity: 1; }
            100% { transform: translateY(35px) scale(1); opacity: 1; }
        }
        @keyframes mergeFlash {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.15); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes vowelReveal {
            0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
            60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes haloExpand {
            0%   { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* ── Result display ── */
        #result-display {
            position: absolute; inset: 0;
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        #result-display.show { display: flex; }

        .halo {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            animation: haloExpand 0.9s ease-out forwards;
        }

        #vowel-char {
            font-family: 'Gowun Batang', serif;
            font-size: 130px; line-height: 1;
            animation: vowelReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            text-shadow: 0 0 40px currentColor;
        }
        #vowel-name {
            margin-top: 4px;
            font-size: 13px; font-weight: 600;
            background: rgba(0,0,0,0.4);
            padding: 4px 14px; border-radius: 20px;
            backdrop-filter: blur(8px);
            letter-spacing: 0.04em;
            animation: vowelReveal 0.6s 0.15s both;
        }

        .close-btn {
            position: absolute; top: 12px; right: 12px;
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.1);
            border: none; border-radius: 50%; cursor: pointer;
            color: #fff; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
        }

        #speak-btn {
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 6px 18px;
            color: #fff; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: background 0.2s, transform 0.15s;
            animation: vowelReveal 0.6s 0.3s both;
        }
        #speak-btn:hover { background: rgba(255,255,255,0.2); }
        #speak-btn:active { transform: scale(0.92); }
        #speak-btn .label { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; opacity: 0.7; }

        @keyframes speakPulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.2); }
        }
        .speaking { animation: speakPulse 0.5s ease infinite !important; }

        /* ── Status message ── */
        #status-msg {
            height: 20px;
            font-size: 12px; font-weight: 600;
            color: rgba(150,200,255,0.8);
            text-align: center;
            letter-spacing: 0.02em;
        }

        /* ── Drag ghost ── */
        #drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999;
            display: none; transform: translate(-50%, -50%);
        }

        /* ── Footer collection ── */
        footer {
            background: rgba(8,12,20,0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-radius: 28px 28px 0 0;
            padding: 16px 20px 20px;
        }
        .footer-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .footer-label {
            font-size: 9px; font-weight: 700;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: rgba(255,255,255,0.25);
        }
        #progress-text { font-size: 12px; font-weight: 700; color: #60a5fa; }

        .vowel-grid {
            display: flex; gap: 6px; justify-content: center;
        }
        .v-dot {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Gowun Batang', serif;
            font-size: 18px; color: rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .v-dot.done {
            background: rgba(59,130,246,0.15);
            border-color: rgba(99,179,255,0.4);
            color: #93c5fd;
            box-shadow: 0 0 12px rgba(59,130,246,0.3);
            transform: scale(1.08);
        }

        .reset-btn {
            margin-top: 12px;
            width: 100%; padding: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; cursor: pointer; color: rgba(255,255,255,0.3);
            font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.08); }

        /* celebration for all 6 */
        @keyframes celebration {
            0%,100% { filter: hue-rotate(0deg); }
            50%      { filter: hue-rotate(180deg) brightness(1.3); }
        }
        .cosmos.celebrate { animation: celebration 2s ease-in-out 3; }
    </style>
</head>
<body>

<div id="cosmos" class="cosmos"></div>
<div id="drag-ghost"></div>

<div class="app">
    <!-- Header -->
    <header>
        <h1>Hangeul Creator ✦</h1>
        <p>Korean vowels were born from Heaven · Earth · Human</p>

        <div class="elements">
            <div class="element-card" data-type="human" draggable="false">
                <div class="glyph">ㅣ</div>
                <div class="label">Human</div>
            </div>
            <div class="element-card" data-type="earth" draggable="false">
                <div class="glyph">ㅡ</div>
                <div class="label">Earth</div>
            </div>
            <div class="element-card" data-type="heaven" draggable="false">
                <div class="glyph">ㆍ</div>
                <div class="label">Heaven</div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <div class="drop-wrap">
        <div id="drop-zone" class="drop-zone">

            <!-- Animation stage -->
            <div id="anim-stage">
                <div id="base-bar" class="anim-base" style="opacity:0;"></div>
                <div id="heaven-dot" class="dot-heaven" style="display:none;"></div>
            </div>

            <!-- Hint -->
            <div id="hint" class="hint">
                <div class="hint-icon">◎</div>
                <p>Drop elements here to build a vowel</p>
            </div>

            <!-- Result -->
            <div id="result-display">
                <button class="close-btn" onclick="clearSelection()">✕</button>
                <div class="halo"></div>
                <div id="vowel-char"></div>
                <div id="vowel-name"></div>
                <button id="speak-btn" onclick="speakCurrent()" title="Play pronunciation">
                    <span id="speak-icon">🔊</span>
                </button>
            </div>
        </div>

        <div id="status-msg"></div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-header">
            <span class="footer-label">Vowel Collection</span>
            <span id="progress-text">0 / 6</span>
        </div>
        <div class="vowel-grid" id="vowel-collection">
            <div class="v-dot" data-v="ㅏ">ㅏ</div>
            <div class="v-dot" data-v="ㅓ">ㅓ</div>
            <div class="v-dot" data-v="ㅗ">ㅗ</div>
            <div class="v-dot" data-v="ㅜ">ㅜ</div>
            <div class="v-dot" data-v="ㅡ">ㅡ</div>
            <div class="v-dot" data-v="ㅣ">ㅣ</div>
        </div>
        <button class="reset-btn" onclick="resetGame()">↺ Reset Universe</button>
    </footer>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const VOWELS = {
    'ㅏ': { name: 'A  —  Heaven right of Human',  cosmos: 'bright', color: '#fb923c' },
    'ㅓ': { name: 'Eo  —  Heaven left of Human',  cosmos: 'dark',   color: '#818cf8' },
    'ㅗ': { name: 'O  —  Heaven above Earth',      cosmos: 'bright', color: '#fbbf24' },
    'ㅜ': { name: 'U  —  Heaven below Earth',      cosmos: 'dark',   color: '#38bdf8' },
    'ㅡ': { name: 'Eu  —  Flat Earth',             cosmos: '',       color: '#4ade80' },
    'ㅣ': { name: 'I  —  Standing Human',          cosmos: '',       color: '#60a5fa' },
};

// ── State ──────────────────────────────────────────────────────────────
let base = null;          // 'human' | 'earth' | null
let collected = new Set();
let dragging = false;
let dragType = null;
let resultTimer = null;

// ── Elements ───────────────────────────────────────────────────────────
const cosmos      = document.getElementById('cosmos');
const dropZone    = document.getElementById('drop-zone');
const hint        = document.getElementById('hint');
const anim        = document.getElementById('anim-stage');
const baseBar     = document.getElementById('base-bar');
const heavenDot   = document.getElementById('heaven-dot');
const resultDisp  = document.getElementById('result-display');
const vowelChar   = document.getElementById('vowel-char');
const vowelName   = document.getElementById('vowel-name');
const statusMsg   = document.getElementById('status-msg');
const dragGhost   = document.getElementById('drag-ghost');

// ── Drag logic ─────────────────────────────────────────────────────────
document.querySelectorAll('.element-card').forEach(card => {
    card.addEventListener('pointerdown', e => {
        dragging = true;
        dragType = card.dataset.type;
        card.setPointerCapture(e.pointerId);

        const glyph = card.querySelector('.glyph').innerText;
        const colors = { heaven: '#fb923c', earth: '#4ade80', human: '#60a5fa' };
        dragGhost.style.cssText = `
            display:block; font-family:'Gowun Batang',serif;
            font-size:40px; color:${colors[dragType]};
            text-shadow:0 0 20px ${colors[dragType]};
            left:${e.pageX}px; top:${e.pageY}px;
        `;
        dragGhost.innerText = glyph;
        e.preventDefault();
    });

    card.addEventListener('pointermove', e => {
        if (!dragging) return;
        dragGhost.style.left = e.pageX + 'px';
        dragGhost.style.top  = e.pageY + 'px';
        checkZone(e.pageX, e.pageY);
    });

    card.addEventListener('pointerup', e => {
        if (!dragging) return;
        dragging = false;
        dragGhost.style.display = 'none';

        const rect = dropZone.getBoundingClientRect();
        const inZone =
            e.pageX > rect.left && e.pageX < rect.right &&
            e.pageY > rect.top  && e.pageY < rect.bottom;

        dropZone.classList.remove('active');

        if (inZone) {
            const relX = (e.pageX - rect.left)  / rect.width;
            const relY = (e.pageY - rect.top)   / rect.height;
            handleDrop(dragType, relX, relY);
        }
    });
});

function checkZone(x, y) {
    const rect = dropZone.getBoundingClientRect();
    const inZone = x > rect.left && x < rect.right && y > rect.top && y < rect.bottom;
    dropZone.classList.toggle('active', inZone);
}

// ── Drop handling ──────────────────────────────────────────────────────
function handleDrop(type, relX, relY) {
    if (resultDisp.classList.contains('show')) return;

    if (type === 'human') {
        setBase('human');
    } else if (type === 'earth') {
        setBase('earth');
    } else if (type === 'heaven') {
        if (!base) {
            setStatus('Place ㅣ (Human) or ㅡ (Earth) first!');
            shakeZone();
            return;
        }
        const vowel = resolveVowel(base, relX, relY);
        playComboAnimation(base, relX, relY, vowel);
    }
}

function resolveVowel(b, rx, ry) {
    if (b === 'human') return rx >= 0.5 ? 'ㅏ' : 'ㅓ';
    if (b === 'earth') return ry <= 0.5 ? 'ㅗ' : 'ㅜ';
}

// ── Base element setup ────────────────────────────────────────────────
function setBase(type) {
    base = type;
    hint.style.opacity = '0';

    if (type === 'human') {
        baseBar.innerHTML = '<div class="bar-vertical"></div>';
        baseBar.style.opacity = '1';
        setStatus('ㅣ (Human) is standing. Now drop ㆍ (Heaven).');
        addToCollection('ㅣ');
    } else {
        baseBar.innerHTML = '<div class="bar-horizontal"></div>';
        baseBar.style.opacity = '1';
        setStatus('ㅡ (Earth) is laid flat. Now drop ㆍ (Heaven).');
        addToCollection('ㅡ');
    }
}

// ── Combination animation ─────────────────────────────────────────────
function playComboAnimation(baseType, relX, relY, vowel) {
    // Show heaven dot with directional fly-in
    heavenDot.style.display = 'block';
    heavenDot.style.animation = 'none';
    heavenDot.style.transform  = '';

    const animMap = {
        'ㅏ': 'dotFlyRight',
        'ㅓ': 'dotFlyLeft',
        'ㅗ': 'dotFlyUp',
        'ㅜ': 'dotFlyDown',
    };

    // Force reflow then animate
    void heavenDot.offsetWidth;
    heavenDot.style.animation = `${animMap[vowel]} 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards`;

    // After dot lands → merge flash
    setTimeout(() => {
        baseBar.style.animation = 'mergeFlash 0.35s ease forwards';

        // After merge → show result
        setTimeout(() => {
            heavenDot.style.display = 'none';
            baseBar.style.opacity = '0';
            baseBar.style.animation = '';
            showResult(vowel);
        }, 350);

    }, 520);
}

// ── Speech ────────────────────────────────────────────────────────────
// Romanization hints so Speech API reads naturally for ko-KR
const VOWEL_SPEECH = {
    'ㅏ': 'ㅏ', 'ㅓ': 'ㅓ', 'ㅗ': 'ㅗ',
    'ㅜ': 'ㅜ', 'ㅡ': '으', 'ㅣ': 'ㅣ',
};
let currentVowel = null;
let speechSupported = 'speechSynthesis' in window;

function speak(text) {
    if (!speechSupported) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    utter.rate = 0.75;
    utter.pitch = 1.1;

    const btn = document.getElementById('speak-btn');
    const icon = document.getElementById('speak-icon');
    if (btn) btn.classList.add('speaking');
    utter.onend = () => { if (btn) btn.classList.remove('speaking'); };
    utter.onerror = () => { if (btn) btn.classList.remove('speaking'); };

    window.speechSynthesis.speak(utter);
}

function speakCurrent() {
    if (currentVowel) speak(VOWEL_SPEECH[currentVowel] || currentVowel);
}

// ── Show result ───────────────────────────────────────────────────────
function showResult(vowel) {
    const data = VOWELS[vowel];

    // Rebuild halo
    const old = resultDisp.querySelector('.halo');
    if (old) old.remove();
    const halo = document.createElement('div');
    halo.className = 'halo';
    resultDisp.prepend(halo);

    vowelChar.innerText  = vowel;
    vowelChar.style.color = data.color;
    vowelName.innerText  = data.name;
    vowelName.style.color = data.color;

    resultDisp.classList.add('show');
    hint.style.opacity = '0';

    if (data.cosmos) cosmos.className = `cosmos ${data.cosmos}`;

    currentVowel = vowel;
    addToCollection(vowel);
    setStatus('');

    // Auto-play pronunciation after animation settles
    setTimeout(() => speak(VOWEL_SPEECH[vowel] || vowel), 700);

    if (resultTimer) clearTimeout(resultTimer);
    resultTimer = setTimeout(clearSelection, 5000);
}

// ── Clear ──────────────────────────────────────────────────────────────
function clearSelection() {
    if (resultTimer) clearTimeout(resultTimer);
    if (speechSupported) window.speechSynthesis.cancel();
    currentVowel = null;
    base = null;
    resultDisp.classList.remove('show');
    baseBar.style.opacity = '0';
    baseBar.innerHTML = '';
    heavenDot.style.display = 'none';
    hint.style.opacity = '1';
    cosmos.className = 'cosmos';
    setStatus('');
}

// ── Collection ────────────────────────────────────────────────────────
function addToCollection(v) {
    if (collected.has(v)) return;
    collected.add(v);
    const dot = document.querySelector(`.v-dot[data-v="${v}"]`);
    if (dot) dot.classList.add('done');
    document.getElementById('progress-text').innerText = `${collected.size} / 6`;

    if (collected.size === 6) {
        setTimeout(() => {
            cosmos.classList.add('celebrate');
            setStatus('🎉 All 6 vowels discovered!');
        }, 600);
    }
}

// ── Helpers ───────────────────────────────────────────────────────────
function setStatus(msg) { statusMsg.innerText = msg; }

function shakeZone() {
    dropZone.style.animation = 'none';
    dropZone.style.transform = 'translateX(-6px)';
    setTimeout(() => dropZone.style.transform = 'translateX(6px)', 80);
    setTimeout(() => dropZone.style.transform = 'translateX(-4px)', 160);
    setTimeout(() => dropZone.style.transform = 'translateX(0)',    240);
}

function resetGame() {
    collected.clear();
    document.querySelectorAll('.v-dot').forEach(d => d.classList.remove('done'));
    document.getElementById('progress-text').innerText = '0 / 6';
    cosmos.classList.remove('celebrate');
    clearSelection();
}
</script>
</body>
</html>
