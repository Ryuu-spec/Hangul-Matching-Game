<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외국인 성명 한글 표기 & 모음 원리 학습기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0D0B1E 0%, #161438 55%, #1E1A3C 100%);
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      overflow-x: hidden;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    
    .glass-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 30px;
    }
    
    input:focus { outline: none; border-color: #A78BFA !important; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// [데이터] 천지인 결합 원리 (기존 로직 유지)
const VOWEL_META = {
  "ㅏ": { color: "#FF6B6B", base: "human", dots: [{x:65, y:40}], desc: "사람(ㅣ)의 오른쪽에 태양(·)" },
  "ㅓ": { color: "#4ECDC4", base: "human", dots: [{x:15, y:40}], desc: "사람(ㅣ)의 왼쪽에 태양(·)" },
  "ㅗ": { color: "#96CEB4", base: "earth", dots: [{x:40, y:15}], desc: "땅(ㅡ)의 위에 태양(·)" },
  "ㅜ": { color: "#7B68EE", base: "earth", dots: [{x:40, y:65}], desc: "땅(ㅡ)의 아래에 태양(·)" },
  "ㅡ": { color: "#95A5A6", base: "earth", dots: [], desc: "평평한 땅의 모양" },
  "ㅣ": { color: "#F39C12", base: "human", dots: [], desc: "서 있는 사람의 모양" },
  "ㅑ": { color: "#FF8E53", base: "human", dots: [{x:65, y:30}, {x:65, y:50}], desc: "사람 옆에 태양이 둘" },
  "ㅕ": { color: "#45B7D1", base: "human", dots: [{x:15, y:30}, {x:15, y:50}], desc: "사람 왼쪽에 태양이 둘" },
  "ㅛ": { color: "#52C97A", base: "earth", dots: [{x:30, y:15}, {x:50, y:15}], desc: "땅 위에 태양이 둘" },
  "ㅠ": { color: "#9B59B6", base: "earth", dots: [{x:30, y:65}, {x:50, y:65}], desc: "땅 아래에 태양이 둘" },
  "ㅐ": { color: "#E74C3C", base: "compound", desc: "ㅏ와 ㅣ의 결합" },
  "ㅔ": { color: "#27AE60", base: "compound", desc: "ㅓ와 ㅣ의 결합" }
};

// [컴포넌트] 천지인 스테이지 (기존 디자인 유지)
function CheonJiInStage({ vowel, isActive }) {
  const data = VOWEL_META[vowel];
  if (!data) return null;

  return (
    <div style={{
      width: 220, height: 220, borderRadius: "50%", background: "rgba(255,255,255,0.03)",
      border: `2px solid ${isActive ? data.color : 'rgba(255,255,255,0.1)'}`,
      position: "relative", display: "flex", alignItems: "center", justifyContent: "center",
      transition: "all 0.5s"
    }}>
      {data.base === "human" && <div style={{ width: 8, height: "60%", background: "#4ADE80", borderRadius: 4 }} />}
      {data.base === "earth" && <div style={{ width: "60%", height: 8, background: "#FBBF24", borderRadius: 4 }} />}
      
      {data.dots?.map((dot, i) => (
        <div key={i} style={{
          position: "absolute", left: `${dot.x}%`, top: `${dot.y}%`,
          width: 18, height: 18, background: "#EF4444", borderRadius: "50%",
          transform: "translate(-50%, -50%)"
        }} />
      ))}

      <div style={{
        position: "absolute", fontSize: 80, fontWeight: 900, color: "white",
        opacity: isActive ? 1 : 0, transform: isActive ? "scale(1)" : "scale(0.5)",
        transition: "all 0.5s 0.5s"
      }}>{vowel}</div>
    </div>
  );
}

// [메인 앱] 외래어 표기 로직 통합
function App() {
  const [name, setName] = useState("");
  const [lang, setLang] = useState("en"); // 언어권 선택 기능 추가
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [step, setStep] = useState(0);

  const analyze = async () => {
    if (!name.trim()) return;
    setLoading(true);
    
    // 외래어 표기법 규정을 반영한 AI 분석 요청 (상의한 내용 반영)
    const prompt = `
      입력된 외국인 이름: "${name}"
      선택된 언어권: ${lang === 'en' ? '영어' : lang === 'jp' ? '일본어' : '프랑스어'}
      
      미션:
      1. 국립국어원 '외래어 표기법' 제2장(표기 일람표) 및 제3장(표기 세칙)을 준수하여 한글 표기를 생성하라.
      2. 생성된 이름을 음절 단위로 쪼개고, 각 음절의 핵심 모음(ㅏ, ㅓ, ㅗ, ㅜ, ㅡ, ㅣ, ㅐ, ㅔ 등)을 추출하라.
      3. 왜 해당 글자로 표기되었는지 표기법 근거를 설명하라.

      JSON 응답 형식:
      {
        "standardKorean": "표본 표기",
        "syllables": [
          {"char": "음절", "vowel": "모음", "reason": "표기법 근거"}
        ]
      }
    `;

    try {
      const resp = await fetch("/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await resp.json();
      const parsed = JSON.parse(data.text.replace(/```json|```/g, ""));
      setResult(parsed);
      setStep(0);
    } catch (e) {
      alert("분석 중 오류가 발생했습니다.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "50px 20px" }}>
      <header style={{ textAlign: "center", marginBottom: 40 }}>
        <h1 style={{ fontSize: 36, fontWeight: 900, marginBottom: 10 }}>
          <span style={{ color: "#A78BFA" }}>외래어 표기</span> & 모음 원리 학습
        </h1>
        <p style={{ color: "rgba(255,255,255,0.5)" }}>국어국어원 규정 기반 분석 툴</p>
      </header>

      <div className="glass-card" style={{ marginBottom: 30 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 15 }}>
          {/* 국적/언어권 선택 칸 추가 */}
          <select 
            value={lang} 
            onChange={(e) => setLang(e.target.value)}
            style={{ padding: "10px", borderRadius: "12px", background: "#1E1A3C", color: "white", border: "1px solid rgba(255,255,255,0.2)" }}
          >
            <option value="en">영어권</option>
            <option value="jp">일본어권</option>
            <option value="fr">프랑스어권</option>
          </select>
          <input 
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="이름 입력 (예: Jane, Robert)"
            style={{ flex: 1, padding: "15px", borderRadius: "12px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.2)", color: "white" }}
          />
        </div>
        <button 
          onClick={analyze}
          disabled={loading}
          style={{ width: "100%", padding: "15px", borderRadius: "12px", background: "linear-gradient(135deg, #A78BFA, #60A5FA)", border: "none", color: "white", fontWeight: 800, cursor: "pointer" }}
        >
          {loading ? "표기법 분석 중..." : "한글 표기 분석하기"}
        </button>
      </div>

      {result && (
        <div style={{ animation: "fadeUp 0.5s both" }}>
          <div className="glass-card" style={{ textAlign: "center", marginBottom: 20 }}>
            <h2 style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 5 }}>표준 표기법 결과</h2>
            <div style={{ fontSize: 42, fontWeight: 900 }}>{result.standardKorean}</div>
          </div>

          <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
            <div className="glass-card" style={{ flex: 1, minWidth: 300, display: "flex", flexDirection: "column", alignItems: "center" }}>
               <h3 style={{ marginBottom: 20 }}>"{result.syllables[step]?.char}"의 모음 원리</h3>
               <CheonJiInStage vowel={result.syllables[step]?.vowel} isActive={true} />
               <p style={{ marginTop: 20, color: "#A78BFA", fontWeight: 700 }}>{VOWEL_META[result.syllables[step]?.vowel]?.desc}</p>
            </div>

            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 10 }}>
              {result.syllables.map((s, i) => (
                <div 
                  key={i} 
                  onClick={() => setStep(i)}
                  style={{ 
                    padding: "15px", borderRadius: "16px", cursor: "pointer",
                    background: step === i ? "rgba(167,139,250,0.2)" : "rgba(255,255,255,0.05)",
                    border: `1px solid ${step === i ? '#A78BFA' : 'transparent'}`
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 24, fontWeight: 900 }}>{s.char}</span>
                    <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>모음: {s.vowel}</span>
                  </div>
                  {step === i && <p style={{ fontSize: 13, marginTop: 8, lineHeight: 1.5 }}>💡 {s.reason}</p>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
