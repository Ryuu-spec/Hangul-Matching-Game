<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외국인 성명 한글 표기 & 모음 원리 학습기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* 기존 스타일 유지 및 보완 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0D0B1E 0%, #161438 55%, #1E1A3C 100%);
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: white;
      overflow-x: hidden;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 15px rgba(167,139,250,.3)} 50%{box-shadow:0 0 30px rgba(167,139,250,.6)} }
    
    .glass-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 30px;
    }
    
    input:focus { outline: none; border-color: #A78BFA !important; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 데이터 정의 (천지인 결합 원리) ──
const VOWEL_META = {
  "ㅏ": { roman: "a", color: "#FF6B6B", base: "human", dots: [{x:65, y:40, f:"right"}], desc: "사람(ㅣ)의 오른쪽에 태양(·)" },
  "ㅓ": { roman: "eo", color: "#4ECDC4", base: "human", dots: [{x:15, y:40, f:"left"}], desc: "사람(ㅣ)의 왼쪽에 태양(·)" },
  "ㅗ": { roman: "o", color: "#96CEB4", base: "earth", dots: [{x:40, y:15, f:"top"}], desc: "땅(ㅡ)의 위에 태양(·)" },
  "ㅜ": { roman: "u", color: "#7B68EE", base: "earth", dots: [{x:40, y:65, f:"bottom"}], desc: "땅(ㅡ)의 아래에 태양(·)" },
  "ㅡ": { roman: "eu", color: "#95A5A6", base: "earth", dots: [], desc: "평평한 땅의 모양" },
  "ㅣ": { roman: "i", color: "#F39C12", base: "human", dots: [], desc: "서 있는 사람의 모양" },
  "ㅑ": { roman: "ya", color: "#FF8E53", base: "human", dots: [{x:65, y:30, f:"right"}, {x:65, y:50, f:"right"}], desc: "사람 옆에 태양이 둘" },
  "ㅕ": { roman: "yeo", color: "#45B7D1", base: "human", dots: [{x:15, y:30, f:"left"}, {x:15, y:50, f:"left"}], desc: "사람 왼쪽에 태양이 둘" },
  "ㅛ": { roman: "yo", color: "#52C97A", base: "earth", dots: [{x:30, y:15, f:"top"}, {x:50, y:15, f:"top"}], desc: "땅 위에 태양이 둘" },
  "ㅠ": { roman: "yu", color: "#9B59B6", base: "earth", dots: [{x:30, y:65, f:"bottom"}, {x:50, y:65, f:"bottom"}], desc: "땅 아래에 태양이 둘" },
  "ㅐ": { roman: "ae", color: "#E74C3C", base: "compound", parts: ["ㅏ","ㅣ"], desc: "ㅏ와 ㅣ의 결합" },
  "ㅔ": { roman: "e", color: "#27AE60", base: "compound", parts: ["ㅓ","ㅣ"], desc: "ㅓ와 ㅣ의 결합" }
};

// ── 애니메이션 컴포넌트 ──
function CheonJiInStage({ vowel, isActive }) {
  const data = VOWEL_META[vowel];
  if (!data) return null;

  return (
    <div style={{
      width: 220, height: 220, borderRadius: "50%", background: "rgba(255,255,255,0.03)",
      border: `2px solid ${isActive ? data.color : 'rgba(255,255,255,0.1)'}`,
      position: "relative", display: "flex", alignItems: "center", justifyContent: "center",
      transition: "all 0.5s", boxShadow: isActive ? `0 0 30px ${data.color}44` : "none"
    }}>
      {/* 땅(ㅡ) 혹은 사람(ㅣ) 베이스 */}
      {data.base === "human" && <div style={{ width: 8, height: "60%", background: "#4ADE80", borderRadius: 4 }} />}
      {data.base === "earth" && <div style={{ width: "60%", height: 8, background: "#FBBF24", borderRadius: 4 }} />}
      
      {/* 태양(·) 점들 */}
      {data.dots.map((dot, i) => (
        <div key={i} style={{
          position: "absolute", left: `${dot.x}%`, top: `${dot.y}%`,
          width: 18, height: 18, background: "#EF4444", borderRadius: "50%",
          transform: "translate(-50%, -50%)", filter: "drop-shadow(0 0 8px #EF4444)"
        }} />
      ))}

      {/* 결과 글자 pop-up */}
      <div style={{
        position: "absolute", fontSize: 80, fontWeight: 900, color: "white",
        textShadow: `0 0 20px ${data.color}`, opacity: isActive ? 1 : 0, transform: isActive ? "scale(1)" : "scale(0.5)",
        transition: "all 0.5s 1s"
      }}>{vowel}</div>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [name, setName] = useState("");
  const [lang, setLang] = useState("en"); // en, jp, fr 등
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [step, setStep] = useState(0);

  const analyze = async () => {
    if (!name.trim()) return;
    setLoading(true);
    
    // AI에게 외래어 표기법 규칙 준수 요청
    const prompt = `
      입력된 이름: "${name}" (언어권: ${lang})
      국립국어원 외래어 표기법과 천지인 원리를 결합하여 분석해줘.
      
      1. 'standardKorean': 외래어 표기법에 따른 정확한 한글 표기.
      2. 'syllables': 각 음절별로 분석.
         - 'char': 한글 글자 (예: '로')
         - 'vowel': 그 글자의 핵심 모음 (예: 'ㅗ')
         - 'reason': 왜 이 모음이 쓰였는지 (외래어 표기 규칙 기반)
      
      JSON 형식으로만 응답해줘.
      {
        "standardKorean": "로버트",
        "syllables": [
          {"char": "로", "vowel": "ㅗ", "reason": "영어의 [o] 발음은 한국어 'ㅗ'로 대응됩니다."},
          ...
        ]
      }
    `;

    try {
      const resp = await fetch("/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await resp.json();
      const parsed = JSON.parse(data.text.replace(/```json|```/g, ""));
      setResult(parsed);
      setStep(0);
    } catch (e) {
      alert("분석 중 오류가 발생했습니다.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "50px 20px" }}>
      <header style={{ textAlign: "center", marginBottom: 40 }}>
        <h1 style={{ fontSize: 36, fontWeight: 900, marginBottom: 10 }}>
          <span style={{ color: "#A78BFA" }}>AI</span> 성명 분석 & 한글 학습
        </h1>
        <p style={{ color: "rgba(255,255,255,0.5)" }}>외국어 이름을 입력하면 표기법과 천지인 원리를 알려드려요.</p>
      </header>

      {/* 입력 섹션 */}
      <div className="glass-card" style={{ marginBottom: 30 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 15 }}>
          <select 
            value={lang} 
            onChange={(e) => setLang(e.target.value)}
            style={{ padding: "10px", borderRadius: "12px", background: "#1E1A3C", color: "white", border: "1px solid rgba(255,255,255,0.2)" }}
          >
            <option value="en">영어 (English)</option>
            <option value="jp">일본어 (Japanese)</option>
            <option value="fr">프랑스어 (French)</option>
          </select>
          <input 
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="이름을 입력하세요 (예: Robert)"
            style={{ flex: 1, padding: "15px", borderRadius: "12px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.2)", color: "white", fontSize: 18 }}
          />
        </div>
        <button 
          onClick={analyze}
          disabled={loading}
          style={{ width: "100%", padding: "15px", borderRadius: "12px", background: "linear-gradient(135deg, #A78BFA, #60A5FA)", border: "none", color: "white", fontWeight: 800, cursor: "pointer", fontSize: 16 }}
        >
          {loading ? "AI 분석 중..." : "한글 표기 & 모음 원리 찾기 ✦"}
        </button>
      </div>

      {/* 결과 섹션 */}
      {result && (
        <div style={{ animation: "fadeUp 0.5s both" }}>
          <div className="glass-card" style={{ textAlign: "center", marginBottom: 20 }}>
            <h2 style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 5 }}>표준 표기법 결과</h2>
            <div style={{ fontSize: 42, fontWeight: 900, letterSpacing: 4 }}>{result.standardKorean}</div>
          </div>

          <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
            {/* 왼쪽: 모음 원리 애니메이션 */}
            <div className="glass-card" style={{ flex: 1, minWidth: 300, display: "flex", flexDirection: "column", alignItems: "center" }}>
               <h3 style={{ marginBottom: 20, fontSize: 16 }}>
                음절 "{result.syllables[step]?.char}"의 모음 원리
               </h3>
               <CheonJiInStage vowel={result.syllables[step]?.vowel} isActive={true} />
               <p style={{ marginTop: 20, color: "#A78BFA", fontWeight: 700 }}>
                {VOWEL_META[result.syllables[step]?.vowel]?.desc}
               </p>
            </div>

            {/* 오른쪽: 음절별 설명 리스트 */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 10 }}>
              {result.syllables.map((s, i) => (
                <div 
                  key={i} 
                  onClick={() => setStep(i)}
                  style={{ 
                    padding: "15px", borderRadius: "16px", cursor: "pointer",
                    background: step === i ? "rgba(167,139,250,0.2)" : "rgba(255,255,255,0.05)",
                    border: `1px solid ${step === i ? '#A78BFA' : 'transparent'}`,
                    transition: "all 0.3s"
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 24, fontWeight: 900 }}>{s.char}</span>
                    <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>모음: {s.vowel}</span>
                  </div>
                  {step === i && (
                    <p style={{ fontSize: 13, marginTop: 8, color: "rgba(255,255,255,0.8)", lineHeight: 1.5 }}>
                      💡 {s.reason}
                    </p>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
