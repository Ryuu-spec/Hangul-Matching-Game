<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외래어 한글 모음 분석기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── 모음 메타 ── */
const VOWEL_COLORS = {
  "ㅏ":"#FF6B6B","ㅑ":"#FF8E53","ㅓ":"#4ECDC4","ㅕ":"#45B7D1",
  "ㅗ":"#96CEB4","ㅛ":"#52C97A","ㅜ":"#7B68EE","ㅠ":"#9B59B6",
  "ㅡ":"#95A5A6","ㅣ":"#F39C12","ㅐ":"#E74C3C","ㅔ":"#27AE60",
  "ㅘ":"#E67E22","ㅝ":"#3498DB","ㅚ":"#1ABC9C","ㅟ":"#8E44AD","ㅢ":"#BDC3C7",
};
const VOWEL_ROMAN = {
  "ㅏ":"a","ㅑ":"ya","ㅓ":"eo","ㅕ":"yeo","ㅗ":"o","ㅛ":"yo",
  "ㅜ":"u","ㅠ":"yu","ㅡ":"eu","ㅣ":"i","ㅐ":"ae","ㅔ":"e",
  "ㅘ":"wa","ㅝ":"wo","ㅚ":"oe","ㅟ":"wi","ㅢ":"ui",
};

/* ── 언어별 설정 ── */
const LANG_CONFIG = {
  en: {
    name: "영어",
    flag: "🇬🇧",
    color: "#60A5FA",
    rule: "외래어 표기법 제3장 제1절 (영어)",
    ruleRef: "문화체육관광부 고시 제2017-14호",
    keyRules: [
      { symbol: "[f]", arrow: "→", result: "ㅍ", example: "coffee → 커피" },
      { symbol: "[v]", arrow: "→", result: "ㅂ", example: "vitamin → 비타민" },
      { symbol: "[θ]", arrow: "→", result: "ㅅ", example: "theater → 시어터" },
      { symbol: "[r]", arrow: "→", result: "ㄹ/르", example: "Ryan → 라이언" },
      { symbol: "장음", arrow: "→", result: "표기 안 함", example: "team → 팀" },
    ],
    systemPrompt: `You are a Korean loanword transcription expert. Apply 외래어 표기법 제3장 제1절 (영어 표기법) rules:
- [f] → ㅍ (f is aspirated bilabial, not ㅎ): coffee → 커피, cafe → 카페
- [v] → ㅂ: vitamin → 비타민
- [θ] (voiceless) → ㅅ: theater → 시어터
- [ð] (voiced) → ㄷ: the → 더
- Short vowels: [æ] → 애, [ʌ] → 어, [ɒ] → 오, [ɪ] → 이, [ε] → 에, [ʊ] → 우
- Long vowels: [iː] → 이, [uː] → 우 (no length marker in Korean)
- Diphthongs: [eɪ] → 에이, [oʊ] → 오, [aɪ] → 아이, [aʊ] → 아우, [ɔɪ] → 오이
- [r]: before vowel → ㄹ; elsewhere → 르 or silent
- Syllable-final [p][t][k] → ㅂ·ㅅ·ㄱ 받침
- [ŋ] → ㅇ 받침, [n] → ㄴ 받침, [m] → ㅁ 받침
- [dʒ] → 지, [tʃ] → 치, [ʃ] → 시, [ʒ] → 지`,
  },
  ja: {
    name: "일본어",
    flag: "🇯🇵",
    color: "#F87171",
    rule: "외래어 표기법 제2장 제5절 (일본어)",
    ruleRef: "문화체육관광부 고시 제2017-14호",
    keyRules: [
      { symbol: "장음(ー)", arrow: "→", result: "생략", example: "トーキョー → 도쿄" },
      { symbol: "つ", arrow: "→", result: "쓰", example: "つ → 쓰" },
      { symbol: "し", arrow: "→", result: "시", example: "し → 시" },
      { symbol: "ッ(촉음)", arrow: "→", result: "받침", example: "サッカー → 사카" },
      { symbol: "ン", arrow: "→", result: "ㄴ 받침", example: "ホンダ → 혼다" },
    ],
    systemPrompt: `You are a Korean loanword transcription expert. Apply 외래어 표기법 제2장 제5절 (일본어 표기법) rules:
- Long vowel (ー, vowel doubling) → OMIT (장음 생략): トーキョー → 도쿄, オーサカ → 오사카
- つ → 쓰, し → 시 (NOT 씨), ち → 지, す → 스, ふ → 후
- ッ (小っ, 촉음) → next consonant as 받침: サッカー → 사카
- ン → ㄴ 받침 (자음 앞/어말): ホンダ → 혼다
- は行: は→하, ひ→히, ふ→후, へ→헤, ほ→호
- ら行: ら→라, り→리, る→루, れ→레, ろ→로 (but initial ら行 → 나/니/누/네/노 in Sino-Japanese)
- が行(voiced): が→가, ぎ→기, ぐ→구, げ→게, ご→고
- For Romaji input: apply same rules after converting to Kana first`,
  },
  de: {
    name: "독일어",
    flag: "🇩🇪",
    color: "#FBBF24",
    rule: "외래어 표기법 제3장 제2절 (독일어)",
    ruleRef: "문화체육관광부 고시 제2017-14호",
    keyRules: [
      { symbol: "v/w", arrow: "→", result: "ㅂ", example: "Wolf → 볼프" },
      { symbol: "ch [x]", arrow: "→", result: "흐", example: "Bach → 바흐" },
      { symbol: "sch", arrow: "→", result: "슈", example: "Schiller → 실러" },
      { symbol: "ü/ö/ä", arrow: "→", result: "위/외/에", example: "Müller → 뮐러" },
      { symbol: "어말 -e", arrow: "→", result: "에", example: "Goethe → 괴테" },
    ],
    systemPrompt: `You are a Korean loanword transcription expert. Apply 외래어 표기법 제3장 제2절 (독일어 표기법) rules:
- v → ㅂ (NOT ㅍ, unlike English): Vogel → 포겔, but f → ㅍ: Frankfurt → 프랑크푸르트
- w → ㅂ: Wolf → 볼프, Wagner → 바그너
- ch after a/o/u → 흐 [x]: Bach → 바흐, Doch → 도흐
- ch after i/e/ä/ü/ö → 히 [ç]: Milch → 밀히, Licht → 리히트
- sch → 슈: Schiller → 실러, Schuh → 슈
- tsch → 치: Deutsch → 도이치
- Umlauts: ü → 위, ö → 외, ä → 에
- Diphthongs: ei/ai → 아이, au → 아우, eu/äu → 오이, ie → 이
- z/tz → 츠, qu → 크ㅂ
- r (uvular) before vowel → ㄹ; elsewhere → 르
- Syllable-final b → ㅂ (devoiced), d → ㅅ, g → ㄱ
- sp- (word initial) → 슈ㅍ, st- (word initial) → 슈트`,
  },
  fr: {
    name: "프랑스어",
    flag: "🇫🇷",
    color: "#34D399",
    rule: "외래어 표기법 제3장 제3절 (프랑스어)",
    ruleRef: "문화체육관광부 고시 제2017-14호",
    keyRules: [
      { symbol: "어말 자음", arrow: "→", result: "묵음", example: "Paris → 파리 (-s 묵음)" },
      { symbol: "an/en", arrow: "→", result: "앙", example: "France → 프랑스" },
      { symbol: "in/ain", arrow: "→", result: "앵", example: "Martin → 마르탱" },
      { symbol: "eau/au", arrow: "→", result: "오", example: "Bordeaux → 보르도" },
      { symbol: "ou", arrow: "→", result: "우", example: "Toulouse → 툴루즈" },
    ],
    systemPrompt: `You are a Korean loanword transcription expert. Apply 외래어 표기법 제3장 제3절 (프랑스어 표기법) rules:
- Word-final consonants are SILENT (묵음): s, t, x, d, p, z, nt, nt at word-end → not transcribed
  Example: Paris → 파리 (not 파리스), Bordeaux → 보르도 (not 보르도x)
- Nasal vowels (비모음):
  - an/am/en/em → 앙: France → 프랑스, enfant → 앙팡
  - in/im/ain/aim/ein → 앵: Martin → 마르탱, saint → 생
  - on/om → 옹: Montmartre → 몽마르트르
  - un/um → 앵 (same as in)
- Vowel combos: eau/au → 오, ou → 우, oi → 와, eu/oeu → 외, ai/ei → 에
- r (uvular [ʁ]) → before vowel: ㄹ; word-final: 르; consonant cluster: 르
- gn → 뉴: Champagne → 샹파뉴
- ill after vowel → 이유 or 이: Marseille → 마르세이유
- qu → ㅋ (u silent): Quentin → 캉탱
- c before e/i → 스; c elsewhere → ㅋ
- g before e/i → 주; g elsewhere → 그
- ch → 슈 (French ch): champagne → 샹파뉴`,
  },
};

/* ══════════════════════════════════════════════════════════════
   KCISA 외래어 표기법 API — /api/kcisa Vercel 프록시 경유
   (브라우저 CORS 우회 · serviceKey는 Vercel 환경변수 KCISA_SERVICE_KEY)
   원본 endpoint: https://api.kcisa.kr/openapi/service/rest/meta6/getKRAG0401
   파라미터: serviceKey, keyword, numOfRows, pageNo
   응답 JSON: response.body.items.item[].title / .language / .description
   메시지코드: 0000=정상, F2013=서비스주소호출실패, 9999=서비스점검중
══════════════════════════════════════════════════════════════ */

async function fetchKCISA(query) {
  if (!query || !query.trim()) return { found: false };

  const params = new URLSearchParams({ keyword: query.trim() });
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 6000);

  try {
    const res = await fetch(`/api/kcisa?${params.toString()}`, {
      method : "GET",
      headers: { "accept": "application/json" },
      signal : controller.signal,
    });
    clearTimeout(timeout);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return { found: false, error: true, detail: err.error || `HTTP ${res.status}` };
    }

    const json = await res.json();

    // 메시지 코드 확인 (0000 = 정상)
    const msgCode = json?.response?.header?.resultCode
                 || json?.response?.header?.code
                 || "0000";
    if (msgCode !== "0000" && msgCode !== 0) {
      return { found: false, error: true, code: msgCode };
    }

    // items 추출
    const items = json?.response?.body?.items?.item;
    if (!items) return { found: false };
    const list = Array.isArray(items) ? items : [items];

    // 입력어와 가장 유사한 항목 우선 선택
    const inputLower = query.toLowerCase().replace(/\s/g, "");
    const exactMatch = list.find(item => {
      const raw = (item.title || "").toLowerCase().replace(/\s/g, "");
      return raw === inputLower || raw.startsWith(inputLower);
    });
    const hit = exactMatch || list[0];
    if (!hit) return { found: false };

    // title에서 한글 부분 추출: "Paris(파리)" → "파리" / "파리" 단독도 처리
    const rawTitle       = hit.title || "";
    const bracketKorean  = rawTitle.match(/\(([가-힣\s]+)\)/);
    const allKorean      = rawTitle.match(/^[가-힣\s]+$/);
    const koreanWord     = bracketKorean ? bracketKorean[1].trim()
                         : allKorean     ? rawTitle.trim()
                         : null;

    return {
      found      : !!koreanWord,
      word       : koreanWord || rawTitle,
      title      : rawTitle,
      language   : hit.language   || "",
      description: hit.description || "",
      allItems   : list,
    };

  } catch (err) {
    clearTimeout(timeout);
    return { found: false, error: true, timeout: err.name === "AbortError" };
  }
}

/* ── /api/gemini 서버리스 프록시 호출 (키는 Vercel 환경변수에 보관) ── */
async function callGemini(prompt) {
  const res = await fetch("/api/gemini", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err.error || `HTTP ${res.status}`;
    if (res.status === 429) throw new Error("API 호출 한도 초과. 잠시 후 다시 시도하세요.");
    if (res.status === 500) throw new Error("서버 오류: " + msg);
    throw new Error("API 오류: " + msg);
  }

  const data = await res.json();
  const raw = data.text || "";
  if (!raw) throw new Error("응답이 비어있습니다.");
  const clean = raw.trim().replace(/^```json\n?/,"").replace(/^```\n?/,"").replace(/```\n?$/,"").trim();
  return clean;
}

/* ── 규칙 기반 분석 ── */
async function analyzeWithGemini(inputName, langKey) {
  const cfg = LANG_CONFIG[langKey];
  const prompt = `${cfg.systemPrompt}

INPUT NAME: "${inputName}"
LANGUAGE: ${cfg.name}

Analyze this name following the exact rules above. Return ONLY a JSON object (no markdown, no explanation outside JSON):

{
  "koreanName": "완성된 한글 표기",
  "pronunciation": "발음 설명 (한국어 1문장)",
  "syllables": [
    {
      "original": "원문 음절 (로마자/일본어 등)",
      "korean": "한글 음절",
      "vowel": "핵심 모음 (예: ㅏ, ㅗ, ㅣ 등)",
      "vowelRoman": "모음 로마자 표기",
      "phoneme": "발음 기호 또는 발음 설명",
      "ruleApplied": "적용 규칙 설명 (예: [f]→ㅍ 규칙 적용)",
      "ruleRef": "근거 조항 (예: 외래어 표기법 제3장 제1절 제7항)"
    }
  ],
  "overallRule": "${cfg.rule}",
  "ruleRef": "${cfg.ruleRef}",
  "tip": "학습자를 위한 짧은 발음 팁 (한국어 1~2문장)"
}`;

  const clean = await callGemini(prompt);
  return JSON.parse(clean);
}

/* ── 모음 칩 컴포넌트 ── */
function VowelChip({ vowel, size = "md", glow = false, delay = 0 }) {
  const color = VOWEL_COLORS[vowel] || "#888";
  const roman = VOWEL_ROMAN[vowel] || "?";
  const sz = size === "lg" ? { box:56, font:28, sub:12 } : size === "sm" ? { box:34, font:16, sub:10 } : { box:44, font:22, sub:11 };
  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center", gap:3,
      animation: `popIn 0.45s ${delay}s cubic-bezier(.34,1.56,.64,1) both`,
    }}>
      <div style={{
        width:sz.box, height:sz.box,
        background: color,
        borderRadius: sz.box * 0.28,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize: sz.font, fontWeight:900, color:"white",
        boxShadow: glow ? `0 0 22px ${color}88, 0 4px 14px ${color}55` : `0 4px 14px ${color}44`,
        animation: glow ? "glowPulse 2s ease-in-out infinite" : "none",
        letterSpacing: -1,
      }}>{vowel}</div>
      <div style={{ fontSize:sz.sub, fontWeight:700, color, opacity:0.9 }}>/{roman}/</div>
    </div>
  );
}

/* ── 음절 카드 ── */
function SyllableCard({ syl, index }) {
  const color = VOWEL_COLORS[syl.vowel] || "#888";
  return (
    <div style={{
      background:`linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03))`,
      border:`1.5px solid ${color}44`,
      borderRadius:18, padding:"18px 20px",
      animation:`slideIn 0.4s ${index*0.1}s both`,
      position:"relative", overflow:"hidden",
    }}>
      {/* 배경 모음 워터마크 */}
      <div style={{
        position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
        fontSize:80, fontWeight:900, color: color, opacity:0.06, lineHeight:1,
        pointerEvents:"none", userSelect:"none",
      }}>{syl.vowel}</div>

      <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:14 }}>
        {/* 원문 → 한글 */}
        <div style={{ flex:1 }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", fontWeight:700, letterSpacing:1.2, textTransform:"uppercase", marginBottom:5 }}>음절 {index+1}</div>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:22, fontWeight:900, color:"rgba(255,255,255,.85)", letterSpacing:1 }}>{syl.original}</span>
            <span style={{ fontSize:16, color:"rgba(255,255,255,.3)" }}>→</span>
            <span style={{ fontSize:26, fontWeight:900, color:"white", textShadow:`0 0 20px ${color}88` }}>{syl.korean}</span>
          </div>
          {syl.phoneme && (
            <div style={{ fontSize:12, color:"rgba(255,255,255,.4)", marginTop:4, fontStyle:"italic" }}>{syl.phoneme}</div>
          )}
        </div>
        {/* 모음 칩 */}
        <VowelChip vowel={syl.vowel} size="md" glow={true} />
      </div>

      {/* 적용 규칙 */}
      <div style={{
        background:"rgba(0,0,0,0.25)", borderRadius:10, padding:"10px 14px",
        borderLeft:`3px solid ${color}88`,
      }}>
        <div style={{ fontSize:11, color: color, fontWeight:800, marginBottom:3, letterSpacing:.8 }}>📐 적용 규칙</div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,.75)", fontWeight:600, lineHeight:1.55 }}>{syl.ruleApplied}</div>
        {syl.ruleRef && (
          <div style={{ fontSize:11, color:"rgba(255,255,255,.3)", marginTop:5, fontFamily:"monospace" }}>⚖ {syl.ruleRef}</div>
        )}
      </div>
    </div>
  );
}

/* ── 언어 선택 버튼 그룹 ── */
function LangSelector({ value, onChange }) {
  return (
    <div>
      <div style={{ fontSize:11, color:"rgba(255,255,255,.4)", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:10 }}>
        국적 / 언어권 선택 <span style={{ color:"#F87171", fontSize:10 }}>필수</span>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        {Object.entries(LANG_CONFIG).map(([key, cfg]) => {
          const active = value === key;
          return (
            <button key={key}
              onClick={() => onChange(key)}
              style={{
                padding:"10px 18px",
                background: active ? `linear-gradient(135deg,${cfg.color}33,${cfg.color}1a)` : "rgba(255,255,255,.06)",
                border: active ? `1.5px solid ${cfg.color}88` : "1.5px solid rgba(255,255,255,.1)",
                borderRadius:30,
                color: active ? cfg.color : "rgba(255,255,255,.5)",
                fontWeight: active ? 800 : 600,
                fontSize:14,
                transition:"all .2s",
                boxShadow: active ? `0 0 18px ${cfg.color}33` : "none",
              }}>
              {cfg.flag} {cfg.name}
            </button>
          );
        })}
      </div>
      {value && (
        <div style={{
          marginTop:10, padding:"8px 14px",
          background:"rgba(255,255,255,.04)", borderRadius:10,
          fontSize:12, color:"rgba(255,255,255,.4)",
          animation:"fadeIn .3s both",
        }}>
          <span style={{ color: LANG_CONFIG[value].color, fontWeight:700 }}>⚖ 적용 법령: </span>
          {LANG_CONFIG[value].rule} · {LANG_CONFIG[value].ruleRef}
        </div>
      )}
    </div>
  );
}

/* ── 규칙 참조 패널 ── */
function RulePanel({ langKey }) {
  const [open, setOpen] = useState(false);
  const cfg = LANG_CONFIG[langKey];
  if (!cfg) return null;
  return (
    <div style={{ marginTop:12 }}>
      <button onClick={() => setOpen(o=>!o)} style={{
        background:"none", border:"none", padding:0,
        fontSize:12, color:"rgba(255,255,255,.35)", fontWeight:700,
        display:"flex", alignItems:"center", gap:5,
        letterSpacing:.5,
      }}>
        {open ? "▲" : "▶"} {cfg.name} 주요 표기 규칙 미리 보기
      </button>
      {open && (
        <div style={{
          marginTop:8, background:"rgba(0,0,0,0.3)", borderRadius:12, padding:"14px 16px",
          animation:"fadeUp .2s both",
        }}>
          <div style={{ fontSize:11, color: cfg.color, fontWeight:800, marginBottom:10, letterSpacing:1 }}>
            {cfg.rule}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {cfg.keyRules.map((r,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:8, fontSize:13 }}>
                <span style={{ color:"rgba(255,255,255,.7)", fontWeight:700, minWidth:70, fontFamily:"monospace" }}>{r.symbol}</span>
                <span style={{ color:"rgba(255,255,255,.3)" }}>{r.arrow}</span>
                <span style={{ color: cfg.color, fontWeight:800, minWidth:40 }}>{r.result}</span>
                <span style={{ color:"rgba(255,255,255,.35)", fontSize:11 }}>({r.example})</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── 소스 배지 ── */
function SourceBadge({ source, apiError }) {
  const isStandard = source === "standard";
  return (
    <div style={{
      display:"inline-flex", alignItems:"center", gap:6,
      padding:"5px 12px",
      background: isStandard ? "rgba(52,211,153,.12)" : "rgba(167,139,250,.12)",
      border: `1px solid ${isStandard ? "rgba(52,211,153,.35)" : "rgba(167,139,250,.35)"}`,
      borderRadius:20, fontSize:11, fontWeight:700,
      color: isStandard ? "#34D399" : "#A78BFA",
      letterSpacing:.5,
    }}>
      {isStandard ? "✓ 국립국어원 표준 표기" : "⚙ 규칙 기반 분석"}
      {apiError && <span style={{ color:"rgba(255,255,255,.3)", fontWeight:500 }}>(API 연결 불가)</span>}
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [lang, setLang]               = useState("en");
  const [name, setName]               = useState("");
  const [stage, setStage]           = useState("input"); // input | loading | result
  const [result, setResult]         = useState(null);
  const [source, setSource]         = useState("rule");
  const [apiError, setApiError]     = useState(false);
  const [apiDetail, setApiDetail]   = useState(null);
  const [loadMsg, setLoadMsg]       = useState("");
  const [dots, setDots]             = useState("");
  const inputRef = useRef(null);

  // 로딩 점 애니메이션
  useEffect(() => {
    if (stage !== "loading") return;
    const id = setInterval(() => setDots(d => d.length >= 3 ? "" : d + "."), 400);
    return () => clearInterval(id);
  }, [stage]);

  async function analyze() {
    if (!name.trim() || !lang) return;
    setStage("loading");
    setApiError(false);
    setApiDetail(null);

    try {
      // ── Step 1: KCISA 외래어 표기법 API 조회 ──
      // Endpoint: https://api.kcisa.kr/openapi/service/rest/meta6/getKRAG0401
      // Params  : serviceKey(필수), keyword(검색어)
      // Header  : accept: application/json
      setLoadMsg("KCISA 외래어 표기법 API 조회 중");
      const kcisa = await fetchKCISA(name.trim());

      let analysisResult;
      let src = "rule";
      let apiErr = false;

      if (kcisa.found) {
        // ── Step 1 성공: KCISA에서 검증된 표기 발견 ──
        // title   : 원어 + 한글표기 (예: "Paris(파리)")
        // language: 언어 정보
        src = "standard";
        setApiDetail({ title: kcisa.title, language: kcisa.language, description: kcisa.description });
        setLoadMsg(`표준 표기 발견 (${kcisa.language || "KCISA"}) — 모음 분석 중`);
        const cfg = LANG_CONFIG[lang];
        const prompt2 = `${cfg.systemPrompt}

The KCISA (국립국어원) standard Korean transcription of "${name.trim()}" is:
- title: "${kcisa.title}"
- Korean word: "${kcisa.word}"
- language tag: "${kcisa.language || "unknown"}"

Analyze ONLY the vowels of the Korean word "${kcisa.word}". Return ONLY JSON:
{
  "koreanName": "${kcisa.word}",
  "pronunciation": "발음 설명 1문장",
  "syllables": [{"original":"","korean":"","vowel":"","vowelRoman":"","phoneme":"","ruleApplied":"","ruleRef":""}],
  "overallRule": "${cfg.rule}",
  "ruleRef": "${cfg.ruleRef}",
  "tip": "1~2문장 팁"
}`;
        const r2raw = await callGemini(prompt2);
        analysisResult = JSON.parse(r2raw);
      } else {
        if (kcisa.error || kcisa.noKey) { apiErr = true; }
        const reasonMsg = kcisa.noKey    ? "KCISA 키 없음 — Gemini 규칙 분석 중"
                        : kcisa.timeout ? "KCISA 타임아웃 — Gemini 규칙 분석 중"
                        : kcisa.error   ? "KCISA CORS 차단 — Gemini 규칙 분석 중"
                        : "KCISA 미등재 — Gemini 규칙 분석 중";
        setLoadMsg(reasonMsg);
        analysisResult = await analyzeWithGemini(name.trim(), lang);
      }

      setResult(analysisResult);
      setSource(src);
      setApiError(apiErr);
      setStage("result");
    } catch (e) {
      console.error(e);
      setStage("input");
      alert(`분석 실패: ${e.message}\n다시 시도해 주세요.`);
    }
  }

  function reset() {
    setStage("input"); setResult(null); setName(""); setApiDetail(null);
    setTimeout(() => inputRef.current?.focus(), 80);
  }

  const activeLang = LANG_CONFIG[lang];

  return (
    <div style={{ minHeight:"100vh" }}>
      {/* 배경 오브 */}
      <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:0 }}>
        <div style={{ position:"absolute", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 70%)", top:-100, left:-100 }}/>
        <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle,rgba(96,165,250,0.05) 0%,transparent 70%)", bottom:0, right:-80 }}/>
      </div>

      <div style={{ position:"relative", zIndex:1, maxWidth:680, margin:"0 auto", padding:"44px 20px 100px" }}>

        {/* ── 헤더 ── */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:"rgba(167,139,250,0.12)", backdropFilter:"blur(12px)", border:"1px solid rgba(167,139,250,0.25)", borderRadius:30, padding:"6px 18px", marginBottom:16 }}>
            <span style={{ fontSize:14 }}>🇰🇷</span>
            <span style={{ fontSize:11, color:"rgba(255,255,255,0.65)", fontWeight:700, letterSpacing:2, textTransform:"uppercase" }}>Korean Vowel · 외래어 분석기</span>
          </div>
          <h1 style={{ fontSize:"clamp(22px,5vw,36px)", fontWeight:900, color:"white", margin:"0 0 10px", lineHeight:1.2 }}>
            내 이름 속의{" "}
            <span style={{ background:"linear-gradient(135deg,#A78BFA 0%,#60A5FA 60%,#34D399 100%)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>한국어 모음</span>
            {" "}찾기
          </h1>
          {/* 안내 배너 */}
          <div style={{
            display:"inline-flex", alignItems:"center", gap:8,
            background:"rgba(251,191,36,.09)", border:"1px solid rgba(251,191,36,.3)",
            borderRadius:12, padding:"8px 16px", marginTop:10,
            fontSize:13, color:"rgba(251,191,36,.9)", fontWeight:600, lineHeight:1.5,
          }}>
            <span>ℹ️</span>
            <span>이 툴은 <strong>외국어 이름을 한글로 바꾸는 전용 툴</strong>입니다. 영문·일문·독문·불문 이름을 입력하세요.</span>
          </div>
        </div>

        {/* ── 입력 스테이지 ── */}
        {stage === "input" && (
          <div style={{ background:"rgba(255,255,255,0.055)", backdropFilter:"blur(20px)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:28, padding:"30px 28px", animation:"fadeUp .4s both" }}>

            {/* 언어 선택 */}
            <div style={{ marginBottom:24 }}>
              <LangSelector value={lang} onChange={setLang} />
              <RulePanel langKey={lang} />
            </div>

            {/* 이름 입력 */}
            <div>
              <label style={{ display:"block", fontSize:11, color:"rgba(255,255,255,.4)", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:8 }}>
                이름 입력 (원어 표기) — e.g. Jane, 田中, Müller, Dupont
              </label>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <input
                  ref={inputRef}
                  value={name}
                  onChange={e => setName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && name.trim() && analyze()}
                  placeholder={lang==="ja" ? "예: Tanaka · 田中 · タナカ" : lang==="de" ? "예: Müller · Schmidt" : lang==="fr" ? "예: Dupont · Marie" : "예: Jane · Smith · Ryan"}
                  style={{
                    flex:1, minWidth:200, padding:"14px 18px",
                    fontSize:20, fontWeight:700, letterSpacing:2,
                    background:"rgba(255,255,255,0.07)", border:"2px solid rgba(255,255,255,0.12)",
                    borderRadius:14, color:"white",
                  }}
                />
                <button
                  onClick={analyze}
                  disabled={!name.trim() || !lang}
                  style={{
                    padding:"14px 24px", fontSize:14, fontWeight:800,
                    background: (!name.trim() || !lang) ? "rgba(255,255,255,.08)" : `linear-gradient(135deg,${activeLang?.color || "#A78BFA"},#A78BFA)`,
                    color: (!name.trim() || !lang) ? "rgba(255,255,255,.28)" : "white",
                    border:"none", borderRadius:14,
                    boxShadow: (!name.trim() || !lang) ? "none" : `0 4px 22px ${activeLang?.color || "#A78BFA"}44`,
                    whiteSpace:"nowrap", transition:"all .2s",
                  }}>
                  ✦ 분석하기
                </button>
              </div>
            </div>

            {/* 예시 버튼 */}
            <div style={{ marginTop:18, display:"flex", flexWrap:"wrap", gap:7, alignItems:"center" }}>
              <span style={{ fontSize:11, color:"rgba(255,255,255,.3)", fontWeight:700, letterSpacing:1 }}>예시:</span>
              {(lang==="en" ? ["Jane","Ryan","Sofia","Michael"] :
                lang==="ja" ? ["Tanaka","Honda","Suzuki","Yamamoto"] :
                lang==="de" ? ["Müller","Schmidt","Bach","Schiller"] :
                ["Dupont","Martin","Bordeaux","Champagne"]).map(ex => (
                <button key={ex} onClick={() => setName(ex)}
                  style={{ padding:"5px 12px", background:"rgba(255,255,255,.06)", border:`1px solid ${activeLang?.color || "#A78BFA"}33`, borderRadius:20, fontSize:13, fontWeight:700, color:"rgba(255,255,255,.55)" }}>
                  {ex}
                </button>
              ))}
            </div>

            {/* 분석 흐름 설명 */}
            <div style={{ marginTop:22, padding:"14px 16px", background:"rgba(0,0,0,.25)", borderRadius:14, display:"flex", gap:12, alignItems:"flex-start" }}>
              <div style={{ fontSize:20, flexShrink:0 }}>🔍</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,.4)", lineHeight:1.7 }}>
                <strong style={{ color:"rgba(255,255,255,.6)" }}>2단계 하이브리드 분석 엔진</strong><br/>
                <span style={{ color:"rgba(96,165,250,.7)", fontWeight:700 }}>Step 1</span> — KCISA 외래어 표기법 API(<span style={{ fontFamily:"monospace", fontSize:10 }}>getKRAG0401</span>)에서 <strong style={{ color:"rgba(255,255,255,.6)" }}>keyword</strong> 파라미터로 검색. 결과의 <strong style={{ color:"rgba(255,255,255,.6)" }}>title</strong> · <strong style={{ color:"rgba(255,255,255,.6)" }}>language</strong> 필드로 표준 표기 확인.<br/>
                <span style={{ color:"rgba(167,139,250,.7)", fontWeight:700 }}>Step 2</span> — API 미등재 / 인증키 없음 → {activeLang?.rule} 규칙을 AI가 음소 단위로 적용.
              </div>
            </div>
          </div>
        )}

        {/* ── 로딩 스테이지 ── */}
        {stage === "loading" && (
          <div style={{ background:"rgba(255,255,255,0.055)", backdropFilter:"blur(20px)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:28, padding:"48px 28px", textAlign:"center", animation:"fadeIn .3s both" }}>
            <div style={{ display:"flex", justifyContent:"center", gap:12, marginBottom:20 }}>
              {["ㅏ","ㅗ","ㅣ","ㅜ","ㅔ"].map((v,i) => (
                <div key={v} style={{
                  width:44, height:44,
                  background: VOWEL_COLORS[v] || "#888",
                  borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:20, fontWeight:900, color:"white",
                  animation:`bounce .9s ${i*0.18}s infinite`,
                }}>{v}</div>
              ))}
            </div>
            <p style={{ color:"rgba(255,255,255,.7)", fontSize:15, fontWeight:700, marginBottom:6 }}>
              {loadMsg}{dots}
            </p>
            <p style={{ color:"rgba(255,255,255,.3)", fontSize:12 }}>
              {activeLang?.flag} {activeLang?.rule} 적용 중
            </p>
          </div>
        )}

        {/* ── 결과 스테이지 ── */}
        {stage === "result" && result && (
          <div style={{ animation:"fadeUp .4s both" }}>

            {/* 소스 배지 + 한글 이름 */}
            <div style={{
              background:"linear-gradient(135deg,rgba(167,139,250,.15),rgba(96,165,250,.1))",
              border:"1px solid rgba(167,139,250,.3)", borderRadius:24, padding:"24px 26px",
              marginBottom:20, textAlign:"center",
            }}>
              <div style={{ marginBottom:12 }}>
                <SourceBadge source={source} apiError={apiError} />
              </div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:6 }}>
                {activeLang?.flag} {name} → 한글 표기
              </div>
              <div style={{
                fontSize:"clamp(36px,10vw,64px)", fontWeight:900, color:"white",
                textShadow:"0 0 40px rgba(167,139,250,0.5)",
                letterSpacing:4, marginBottom:10,
                animation:"cardIn 0.5s both",
              }}>
                {result.koreanName}
              </div>
              {result.pronunciation && (
                <p style={{ color:"rgba(255,255,255,.5)", fontSize:14, fontWeight:500 }}>{result.pronunciation}</p>
              )}
              {/* 모음 요약 */}
              <div style={{ marginTop:16, display:"flex", justifyContent:"center", gap:10, flexWrap:"wrap" }}>
                {result.syllables?.map((s,i) => (
                  <VowelChip key={i} vowel={s.vowel} size="lg" glow={true} delay={i*0.1} />
                ))}
              </div>
            </div>

            {/* KCISA 원문 응답 패널 (표준 표기 발견 시) */}
            {source === "standard" && apiDetail && (
              <div style={{
                background:"rgba(52,211,153,.07)", border:"1px solid rgba(52,211,153,.25)",
                borderRadius:16, padding:"14px 18px", marginBottom:20,
                animation:"fadeUp .4s .1s both",
              }}>
                <div style={{ fontSize:11, color:"#34D399", fontWeight:800, letterSpacing:.8, marginBottom:10 }}>
                  ✓ KCISA API 응답 원문
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  <div style={{ display:"flex", gap:10, alignItems:"baseline" }}>
                    <span style={{ fontSize:11, fontFamily:"monospace", color:"rgba(52,211,153,.7)", minWidth:80 }}>title</span>
                    <span style={{ fontSize:14, color:"rgba(255,255,255,.8)", fontWeight:700 }}>{apiDetail.title}</span>
                  </div>
                  {apiDetail.language && (
                    <div style={{ display:"flex", gap:10, alignItems:"baseline" }}>
                      <span style={{ fontSize:11, fontFamily:"monospace", color:"rgba(52,211,153,.7)", minWidth:80 }}>language</span>
                      <span style={{ fontSize:13, color:"rgba(255,255,255,.6)" }}>{apiDetail.language}</span>
                    </div>
                  )}
                  {apiDetail.description && (
                    <div style={{ display:"flex", gap:10, alignItems:"baseline" }}>
                      <span style={{ fontSize:11, fontFamily:"monospace", color:"rgba(52,211,153,.7)", minWidth:80 }}>description</span>
                      <span style={{ fontSize:12, color:"rgba(255,255,255,.45)", lineHeight:1.5 }}>{apiDetail.description.slice(0,120)}{apiDetail.description.length>120?"…":""}</span>
                    </div>
                  )}
                </div>
                <div style={{ marginTop:10, fontSize:10, fontFamily:"monospace", color:"rgba(255,255,255,.2)" }}>
                  /api/kcisa?keyword={encodeURIComponent(name)}&numOfRows=10&pageNo=1
                </div>
              </div>
            )}

            {/* 음절별 카드 */}
            <div style={{ marginBottom:22 }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,.35)", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:14 }}>
                ✦ 음절별 분석 — {result.overallRule}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {result.syllables?.map((s,i) => (
                  <SyllableCard key={i} syl={s} index={i} />
                ))}
              </div>
            </div>

            {/* 학습 팁 */}
            {result.tip && (
              <div style={{
                background:"rgba(251,191,36,.08)", border:"1px solid rgba(251,191,36,.25)",
                borderRadius:16, padding:"16px 18px", marginBottom:20,
                animation:"fadeUp .4s .3s both",
              }}>
                <div style={{ fontSize:11, color:"#FBBF24", fontWeight:800, letterSpacing:.8, marginBottom:6 }}>💡 발음 팁</div>
                <p style={{ color:"rgba(255,255,255,.7)", fontSize:14, lineHeight:1.65 }}>{result.tip}</p>
              </div>
            )}

            {/* 법령 근거 */}
            <div style={{
              background:"rgba(0,0,0,.3)", borderRadius:14, padding:"14px 18px",
              marginBottom:28, animation:"fadeUp .4s .4s both",
            }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,.3)", fontWeight:700, letterSpacing:.8, marginBottom:6 }}>⚖ 법령 근거</div>
              <div style={{ fontSize:13, color:"rgba(255,255,255,.55)", lineHeight:1.6 }}>
                <strong style={{ color:"rgba(255,255,255,.75)" }}>{result.overallRule}</strong>
                {result.ruleRef && <span style={{ color:"rgba(255,255,255,.3)" }}> · {result.ruleRef}</span>}
              </div>
              <div style={{ marginTop:8, fontSize:11, color:"rgba(255,255,255,.25)", lineHeight:1.5 }}>
                외래어 표기법은 원어의 발음을 기준으로 하며, 같은 알파벳도 국적에 따라 표기 규칙이 달라집니다.
              </div>
            </div>

            {/* 모음 전체 참고표 */}
            <div style={{ background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:18, padding:"16px 20px", marginBottom:28 }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,.3)", fontWeight:700, letterSpacing:1.2, textTransform:"uppercase", marginBottom:14 }}>🗂 기본 모음 참고표</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {Object.entries(VOWEL_COLORS).map(([v, color]) => {
                  const used = result.syllables?.some(s => s.vowel === v);
                  const roman = VOWEL_ROMAN[v] || "?";
                  return (
                    <div key={v} style={{ textAlign:"center", opacity: used ? 1 : 0.25 }}>
                      <div style={{
                        width:34, height:34, background: color,
                        borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:16, fontWeight:900, color:"white", margin:"0 auto 2px",
                        boxShadow: used ? `0 2px 10px ${color}55` : "none",
                        outline: used ? `2.5px solid ${color}` : "none", outlineOffset:2,
                      }}>{v}</div>
                      <div style={{ fontSize:9, fontWeight:700, color }}>{roman}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,.2)", marginTop:10 }}>✦ 밝게 표시 = 이름에 포함된 모음</div>
            </div>

            {/* 다시하기 */}
            <div style={{ textAlign:"center" }}>
              <button onClick={reset} style={{
                padding:"13px 36px", fontSize:14, fontWeight:800,
                background:"transparent", color:"rgba(255,255,255,.6)",
                border:"1.5px solid rgba(255,255,255,.18)", borderRadius:50,
              }}>
                ↩ 다른 이름 분석하기
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
