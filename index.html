<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>너의 이름의 한글 코드</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;0,700;1,400&family=Noto+Serif+KR:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #FAF7F2;
  --bg2: #F2EDE4;
  --surface: #FFFFFF;
  --border: #E2D9CC;
  --navy: #0D1B2A;
  --navy2: #2B3E52;
  --gold: #B8860B;
  --gold-light: #F5E6B8;
  --gold-glow: 0 0 14px rgba(184,134,11,0.25);
  --muted: #8A7E72;
  --teal: #2A7A8A;
  --red: #C0392B;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── 배경 패턴 ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(184,134,11,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(42,122,138,0.05) 0%, transparent 50%);
  pointer-events: none;
}

/* 부유 한글 */
.bg-floaters { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.floater {
  position: absolute;
  font-family: 'Noto Serif KR', serif;
  font-weight: 900;
  color: rgba(184,134,11,0.06);
  user-select: none;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(-8deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(8deg); opacity: 0; }
}

/* ── 레이아웃 ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 20px;
}

/* ── 헤더 ── */
.header { text-align: center; margin-bottom: 44px; }
.kicker {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 4px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 16px;
}
.title {
  font-size: clamp(30px, 6vw, 54px);
  font-weight: 300; letter-spacing: -0.5px; line-height: 1.15;
  color: var(--navy);
}
.title em { font-style: italic; color: var(--gold); }
.subtitle {
  margin-top: 14px;
  font-size: 16px; font-weight: 300; color: var(--muted); line-height: 1.7;
}

/* ── 입력 카드 ── */
.card {
  background: var(--surface);
  border: 1.5px solid #D0C5B5;
  border-radius: 20px;
  padding: 40px;
  width: 100%; max-width: 520px;
  box-shadow: 0 8px 40px rgba(13,27,42,0.13), 0 2px 8px rgba(13,27,42,0.07);
}

/* ── 언어 선택 ── */
.lang-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
}
.lang-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.lang-btn {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--navy2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; padding: 7px 13px;
  cursor: pointer; transition: all .2s;
}
.lang-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }
.lang-btn.active { background: var(--gold-light); border-color: var(--gold); color: var(--gold); font-weight: 600; }

/* ── 입력 ── */
.name-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--navy);
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400;
  padding: 15px 20px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.name-input::placeholder { color: #BDB3A8; }
.name-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.1); }

.submit-btn {
  width: 100%;
  background: var(--navy);
  border: none; border-radius: 12px;
  color: #FFFFFF;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600;
  padding: 15px; cursor: pointer;
  transition: all .2s; letter-spacing: 0.5px;
}
.submit-btn:hover { background: var(--navy2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,27,42,0.18); }

.examples { margin-top: 16px; text-align: center; font-size: 13px; color: var(--muted); }
.examples span {
  cursor: pointer; color: var(--navy2);
  border-bottom: 1px dotted var(--border); margin: 0 5px;
  transition: color .2s;
}
.examples span:hover { color: var(--gold); }

/* ── 로딩 ── */
#loading-screen { display: none; text-align: center; }
.loader-ring {
  width: 52px; height: 52px;
  border: 2.5px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; color: var(--muted); font-weight: 300; letter-spacing: 0.5px; }

/* ── 결과 화면 ── */
#result-screen { display: none; width: 100%; max-width: 560px; }

.step-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 4px;
  color: var(--muted); text-transform: uppercase;
  text-align: center; margin-bottom: 10px;
}
.step-title {
  text-align: center; font-size: 19px; font-weight: 300;
  color: var(--navy2); margin-bottom: 32px; line-height: 1.6;
}
.step-title strong { color: var(--navy); font-weight: 700; }

/* 모음 orb */
.vowel-stage {
  display: flex; justify-content: center;
  align-items: center; gap: 18px;
  flex-wrap: wrap; margin-bottom: 44px;
}
.vowel-orb {
  width: 84px; height: 84px; border-radius: 50%;
  background: var(--gold-light);
  border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif KR', serif;
  font-size: 36px; font-weight: 900;
  color: var(--gold);
  box-shadow: var(--gold-glow);
  opacity: 0; transform: scale(0.5);
  transition: opacity .45s, transform .45s;
}
.vowel-orb.show {
  opacity: 1; transform: scale(1);
  animation: pulse-orb 2.8s ease-in-out infinite;
}
@keyframes pulse-orb {
  0%, 100% { box-shadow: var(--gold-glow); }
  50% { box-shadow: 0 0 22px rgba(184,134,11,0.35), 0 0 0 6px rgba(184,134,11,0.08); }
}

/* 한글 이름 */
.divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 40px; }

.korean-name-wrap { text-align: center; margin-bottom: 16px; }
.korean-name {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(52px, 13vw, 90px);
  font-weight: 900; letter-spacing: 6px; line-height: 1.1;
  display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;
}
.syllable {
  opacity: 0; transform: translateY(18px);
  transition: opacity .45s, transform .45s;
  display: inline-block;
}
.syllable.show { opacity: 1; transform: translateY(0); }
.syllable.has-vowel { color: var(--gold); }
.syllable.no-vowel { color: var(--navy); }

.note-text {
  text-align: center; font-size: 14px;
  color: var(--muted); font-style: italic;
  margin-bottom: 36px; line-height: 1.7;
  padding: 0 16px;
}

/* 액션 버튼 */
.action-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.action-btn {
  display: flex; align-items: center; gap: 8px;
  border-radius: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; padding: 11px 22px;
  cursor: pointer; transition: all .2s;
}
.action-btn.primary {
  background: var(--navy); color: #FFF;
  border: 1.5px solid var(--navy); font-weight: 600;
}
.action-btn.primary:hover { background: var(--navy2); transform: translateY(-1px); }
.action-btn.ghost {
  background: transparent; color: var(--navy2);
  border: 1.5px solid var(--border);
}
.action-btn.ghost:hover { border-color: var(--navy2); background: var(--bg); }

.retry-link {
  display: block; text-align: center;
  font-size: 13px; color: var(--muted);
  cursor: pointer; margin-top: 4px;
}
.retry-link:hover { color: var(--gold); }

/* ── 공유 카드 (캡처 전용) ── */
#share-card {
  position: fixed; top: -9999px; left: -9999px;
  width: 520px;
  background: #FAF7F2;
  padding: 52px 48px 44px;
  border: 2px solid rgba(184,134,11,0.3);
  border-radius: 24px;
  font-family: 'Noto Serif KR', serif;
  display: flex; flex-direction: column; align-items: center;
}
.sc-kicker { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 32px; }
.sc-vowels { display: flex; gap: 14px; margin-bottom: 36px; }
.sc-orb {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--gold-light); border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 900; color: var(--gold);
}
.sc-name { font-size: 76px; font-weight: 900; color: var(--gold); letter-spacing: 8px; margin-bottom: 10px; line-height: 1; }
.sc-original { font-size: 20px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; }
.sc-brand { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #C8BFB5; text-transform: uppercase; }
</style>
</head>
<body>

<div class="bg-floaters" id="bgFloaters"></div>

<div class="page">

  <!-- ① 입력 -->
  <div id="input-screen">
    <div class="header">
      <div class="kicker">Korean Vowel Code · HelloEdu</div>
      <h1 class="title">너의 이름의<br><em>한글 코드</em></h1>
      <p class="subtitle">이름을 입력하면, 그 안에 숨은<br>한글 모음의 비밀을 알려드립니다.</p>
    </div>

    <div class="card">
      <div class="lang-label">언어 선택</div>
      <div class="lang-grid" id="langGrid">
        <button class="lang-btn active" data-lang="영어">🇺🇸 영어</button>
        <button class="lang-btn" data-lang="프랑스어">🇫🇷 프랑스어</button>
        <button class="lang-btn" data-lang="독일어">🇩🇪 독일어</button>
        <button class="lang-btn" data-lang="스페인어">🇪🇸 스페인어</button>
        <button class="lang-btn" data-lang="이탈리아어">🇮🇹 이탈리아어</button>
        <button class="lang-btn" data-lang="러시아어">🇷🇺 러시아어</button>
        <button class="lang-btn" data-lang="포르투갈어">🇧🇷 포르투갈어</button>
        <button class="lang-btn" data-lang="일본어">🇯🇵 일본어</button>
      </div>

      <input type="text" id="nameInput" class="name-input" placeholder="이름을 입력하세요 (예: Ryan)" maxlength="30" autocomplete="off" />
      <button class="submit-btn" id="submitBtn">한글 코드 해독하기 ✦</button>

      <div class="examples">
        예시: <span onclick="fillExample('Ryan')">Ryan</span>
              <span onclick="fillExample('Sophie')">Sophie</span>
              <span onclick="fillExample('Emma')">Emma</span>
              <span onclick="fillExample('Michael')">Michael</span>
              <span onclick="fillExample('Lena')">Lena</span>
      </div>
    </div>
  </div>

  <!-- ② 로딩 -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loading-text" id="loadingText">한글 코드를 분석하는 중…</div>
  </div>

  <!-- ③ 결과 -->
  <div id="result-screen">
    <div id="step1">
      <div class="step-label">Step 1 · 모음 코드 발견</div>
      <div class="step-title" id="step1Title"></div>
      <div class="vowel-stage" id="vowelStage"></div>
    </div>

    <hr class="divider">

    <div id="step2">
      <div class="step-label">Step 2 · 이름 완성</div>
      <div class="step-title">당신의 이름이 한글로 탄생했습니다</div>
      <div class="korean-name-wrap">
        <div class="korean-name" id="koreanNameDisplay"></div>
      </div>
      <div class="note-text" id="noteText"></div>

      <div class="action-row">
        <button class="action-btn ghost" id="ttsBtn">🔊 발음 듣기</button>
        <button class="action-btn primary" id="shareBtn">📸 카드 저장</button>
      </div>
      <span class="retry-link" onclick="resetAll()">↩ 다른 이름 해독하기</span>
    </div>
  </div>

</div>

<!-- 공유 카드 -->
<div id="share-card">
  <div class="sc-kicker">Korean Vowel Code · HelloEdu</div>
  <div class="sc-vowels" id="scVowels"></div>
  <div class="sc-name" id="scName"></div>
  <div class="sc-original" id="scOriginal"></div>
  <div class="sc-brand">helloedu.app</div>
</div>

<script>
// 배경 부유 글자
const FLOATER_CHARS = ['ㅏ','ㅓ','ㅗ','ㅜ','ㅣ','ㅐ','ㅕ','ㅛ','ㅠ','ㅡ','ㅔ','ㅑ'];
const bgEl = document.getElementById('bgFloaters');
for (let i = 0; i < 16; i++) {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = FLOATER_CHARS[i % FLOATER_CHARS.length];
  const size = 50 + Math.random() * 90;
  el.style.cssText = `font-size:${size}px;left:${Math.random()*100}%;animation-duration:${14+Math.random()*16}s;animation-delay:-${Math.random()*22}s;`;
  bgEl.appendChild(el);
}

// 언어 선택
let selectedLang = '영어';
document.getElementById('langGrid').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = btn.dataset.lang;
});

function fillExample(name) {
  document.getElementById('nameInput').value = name;
  document.getElementById('nameInput').focus();
}

// 모음 추출
const VOWEL_LIST = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];

function extractVowels(korean) {
  const syllables = [], seen = new Set(), unique = [];
  for (const char of korean) {
    const code = char.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const vowel = VOWEL_LIST[Math.floor((code - 0xAC00) / 28) % 21];
      syllables.push({ char, vowel });
      if (!seen.has(vowel)) { seen.add(vowel); unique.push(vowel); }
    } else {
      syllables.push({ char, vowel: null });
    }
  }
  return { syllables, unique };
}

// Gemini 호출
const ENDPOINT = 'https://hangul-vowel.vercel.app/api/gemini';
const LANG_RULES = {
  '영어': '영미권 발음 기준. p/t/k는 모음 앞 ㅍ/ㅌ/ㅋ, 어말/자음 앞 ㅂ·프/ㅅ·트/ㄱ·크. 이미 굳어진 표기 우선(Michael→마이클, Ryan→라이언, Sophie→소피).',
  '프랑스어': '[ə]→으, [œ]→외, 어말 자음 묵음 처리, [j]→이(모음 결합 시 1음절). Sophie(소피), Pierre(피에르).',
  '독일어': '[ε]→에, [ø]→외, 어말 -er→어, ü→위, [ts]→츠. Wolfgang→볼프강.',
  '스페인어': 'll→이, rr→르, ñ→니, 어말 -n→ㄴ, h 묵음, v→ㅂ. Sofia→소피아.',
  '이탈리아어': '-zione→치오네, -gli→리, sc+i/e→시, [ts]→츠. Marco→마르코.',
  '러시아어': '키릴 기준. й→이, ы→이, ъ·ь 묵음. Александр→알렉산드르.',
  '포르투갈어': '[ã]→앙, [õ]→옹, lh→리, nh→니, -ção→상. João→주앙.',
  '일본어': '헵번식 로마자 기준. 장모음 처리, つ→쓰, ふ→후. Haruto→하루토.'
};

async function convertName(name, lang) {
  const prompt = `당신은 국립국어원 외래어 표기법 전문가입니다.
"${name}"을(를) ${lang} 이름으로 보고, 국립국어원 외래어 표기법에 따라 한글로 변환하세요.
${lang} 규칙: ${LANG_RULES[lang] || ''}
반드시 아래 JSON만 응답 (마크다운 없이):
{"korean":"한글 표기","note":"표기 근거 한 문장 (한국어)"}`;

  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) throw new Error('API 오류');
  const data = await res.json();
  const clean = (data.text || '').replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// 메인
let currentKorean = '', currentName = '';

document.getElementById('submitBtn').addEventListener('click', run);
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

async function run() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  currentName = name;

  show('loading-screen'); hide('input-screen'); hide('result-screen');

  const msgs = ['한글 코드를 분석하는 중…', `${selectedLang} 표기법 적용 중…`, '모음을 찾는 중…'];
  let mi = 0;
  const t = setInterval(() => { document.getElementById('loadingText').textContent = msgs[++mi % msgs.length]; }, 1200);

  try {
    const result = await convertName(name, selectedLang);
    clearInterval(t);
    currentKorean = result.korean;

    const { syllables, unique } = extractVowels(currentKorean);
    renderResult(name, currentKorean, syllables, unique, result.note);
    hide('loading-screen'); show('result-screen');
    animateReveal(syllables, unique);
  } catch (err) {
    clearInterval(t);
    hide('loading-screen'); show('input-screen');
    alert('변환 중 오류가 발생했습니다.\n' + err.message);
  }
}

function renderResult(original, korean, syllables, unique, note) {
  document.getElementById('step1Title').innerHTML =
    `<strong>${original}</strong>, 당신의 이름 속에<br>${unique.map(v=>`<strong>${v}</strong>`).join(' · ')} 가 숨어있어요`;

  document.getElementById('vowelStage').innerHTML =
    unique.map(v => `<div class="vowel-orb" data-v="${v}">${v}</div>`).join('');

  document.getElementById('koreanNameDisplay').innerHTML =
    syllables.map(({ char, vowel }) =>
      `<span class="syllable ${vowel ? 'has-vowel' : 'no-vowel'}">${char}</span>`
    ).join('');

  document.getElementById('noteText').textContent = note || '';

  document.getElementById('scVowels').innerHTML = unique.map(v => `<div class="sc-orb">${v}</div>`).join('');
  document.getElementById('scName').textContent = korean;
  document.getElementById('scOriginal').textContent = original;
}

function animateReveal(syllables, unique) {
  document.querySelectorAll('.vowel-orb').forEach((o, i) => {
    setTimeout(() => o.classList.add('show'), i * 280 + 150);
  });
  document.querySelectorAll('.syllable').forEach((s, i) => {
    setTimeout(() => s.classList.add('show'), unique.length * 280 + i * 160 + 500);
  });
}

// TTS
document.getElementById('ttsBtn').addEventListener('click', () => {
  if (!currentKorean) return;
  const u = new SpeechSynthesisUtterance(currentKorean);
  u.lang = 'ko-KR'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
});

// 카드 저장
document.getElementById('shareBtn').addEventListener('click', async () => {
  const btn = document.getElementById('shareBtn');
  btn.textContent = '저장 중…'; btn.disabled = true;
  try {
    const card = document.getElementById('share-card');
    card.style.cssText = 'position:absolute;top:0;left:0;';
    await new Promise(r => setTimeout(r, 200));
    const canvas = await html2canvas(card, { backgroundColor: '#FAF7F2', scale: 2, useCORS: true });
    card.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
    const a = document.createElement('a');
    a.download = `${currentKorean}-한글코드.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch { alert('저장 중 오류가 발생했습니다.'); }
  btn.textContent = '📸 카드 저장'; btn.disabled = false;
});

function resetAll() {
  hide('result-screen'); show('input-screen');
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').focus();
  currentKorean = '';
}

function show(id) {
  const el = document.getElementById(id);
  // flex 컨테이너는 flex, 나머지는 block
  el.style.display = ['result-screen','loading-screen'].includes(id) ? 'flex' : 'block';
  if (id === 'result-screen') el.style.flexDirection = 'column';
}
function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
