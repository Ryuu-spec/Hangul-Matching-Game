<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Sound of You · 너의 이름의 한글 코드</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --cream:#F9F6F0; --navy:#1A243B; --navy2:#374151;
  --gold:#C8A97E; --gold2:#C09040; --red:#8C2727;
  --primary:#f1b055; --muted:#8A93A6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--navy);font-family:'Noto Serif KR',serif;min-height:100dvh;-webkit-font-smoothing:antialiased;}

/* ── 화면 전환 ── */
.pg{display:none;flex-direction:column;align-items:center;width:100%;max-width:480px;margin:0 auto;min-height:100dvh;}
.pg.on{display:flex;}

/* ── 라디오 ── */
.cr{appearance:none;width:14px;height:14px;border-radius:50%;border:1.5px solid var(--muted);outline:none;cursor:pointer;flex-shrink:0;transition:all .2s;}
.cr:checked{background:var(--primary);border-color:var(--primary);box-shadow:inset 0 0 0 2.5px #fff;}
.row:has(.cr:checked){background:#fff;}
.row{display:flex;align-items:center;height:64px;border-bottom:1px solid rgba(138,147,166,.2);padding:0 16px;cursor:pointer;}

/* ── 이름 입력 ── */
.ni{border:none;border-bottom:2px solid var(--primary);background:transparent;font-size:28px;text-align:center;color:var(--navy);padding:10px 0;width:100%;outline:none;font-family:'Noto Serif KR',serif;}
.ni::placeholder{color:var(--muted);opacity:.6;}

/* ── 버튼 ── */
.btn-primary{width:100%;height:56px;background:var(--navy);border:none;color:#fff;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.88;}
.btn-gold{width:100%;height:56px;background:var(--primary);border:none;color:#fff;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-gold:hover{opacity:.88;}

/* ── 로딩 ── */
@keyframes sp{0%,100%{opacity:1;}50%{opacity:.3;}}
.lc span{display:inline-block;animation:sp 1.5s ease-in-out infinite;}
.lc span:nth-child(odd){animation-delay:.4s;}

/* ═══════════════════════════════════
   결합 애니메이션 오버레이 (body 직속)
═══════════════════════════════════ */
#anim-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:var(--cream);
  flex-direction:column;align-items:center;justify-content:center;
}

#anim-stage{
  position:relative;
  width:320px;height:240px;
}

.jm{
  position:absolute;
  left:50%;top:50%;
  font-family:'Nanum Myeongjo',serif;font-weight:700;line-height:1;
  pointer-events:none;opacity:0;
}
.jm-o{font-size:96px;color:var(--navy);}
.jm-v{font-size:80px;color:var(--gold2);}
.jm-c{font-size:60px;color:var(--muted);}
.jm-r{font-size:116px;color:var(--navy);}

@keyframes flash{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}
  45%{opacity:.9;transform:translate(-50%,-50%) scale(1.5);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2.5);}
}
.flash-el{
  position:absolute;left:50%;top:50%;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,144,64,.55) 0%,transparent 70%);
  pointer-events:none;
  animation:flash .7s ease-out forwards;
}

@keyframes ptcl{
  0%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1);}
  100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0);}
}
.ptcl{
  position:absolute;left:50%;top:50%;
  width:6px;height:6px;border-radius:50%;
  background:var(--gold2);pointer-events:none;
  animation:ptcl .9s ease-out forwards;
}

#anim-name{
  font-family:'Nanum Myeongjo',serif;font-weight:700;
  font-size:96px;color:var(--navy);
  letter-spacing:6px;line-height:1;
  opacity:0;transform:scale(.5);
  transition:opacity .8s ease,transform .8s cubic-bezier(.34,1.56,.64,1);
}
#anim-name.on{opacity:1;transform:scale(1);}

@keyframes glow{
  0%,100%{text-shadow:none;}
  50%{text-shadow:0 0 28px rgba(192,144,64,.45),0 0 56px rgba(192,144,64,.2);}
}
#anim-name.glow{animation:glow 2.2s ease-in-out infinite;}

#anim-status{
  font-family:'Nanum Myeongjo',serif;
  font-size:28px;letter-spacing:6px;
  color:var(--muted);margin-top:24px;min-height:36px;
  transition:opacity .4s;
}

/* ── Certificate ── */
.cert-wrap{
  width:100%;background:var(--cream);padding:8px;
  box-shadow:0 16px 48px rgba(26,36,59,.12);
}
.cert-inner{
  border:1px solid var(--gold);padding:32px 28px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  position:relative;min-height:520px;justify-content:space-between;
}
.stamp{
  width:56px;height:56px;border:2.5px solid var(--red);
  color:var(--red);display:flex;align-items:center;justify-content:center;
  transform:rotate(-6deg);opacity:.85;mix-blend-mode:multiply;
  position:absolute;bottom:24px;right:24px;
}
.stamp-inner{border:1px solid var(--red);width:88%;height:88%;display:flex;align-items:center;justify-content:center;}

/* fade util */
.fade-cert{opacity:0;transition:opacity 1s ease;}
.fade-cert.on{opacity:1;}
</style>
</head>
<body>

        <div id="xmk" style="font-family:'Noto Serif KR',serif;font-size:20px;font-weight:500;color:#1A243B;margin-bottom:6px;"></div>
        <div id="xme" style="font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(26,36,59,.55);font-style:italic;"></div>

      </div>

<script>
// ── 화면 전환 ──────────────────────────────────
let curLang='영어', curKor='', curName='';

function show(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ── 유틸 ──────────────────────────────────────
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const raf2  = ()  => new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

// ── 언어 ──────────────────────────────────────
function goName(){
  const s=document.querySelector('input[name="lg"]:checked');
  if(s) curLang=s.value;
  show('pg-name');
}
function setName(n){ document.getElementById('nf').value=n; }

// ── 음절 분해 ─────────────────────────────────
const ON=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const VW=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const CD=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function decompose(kor){
  const res=[];
  for(const ch of kor){
    const c=ch.charCodeAt(0);
    if(c>=0xAC00&&c<=0xD7A3){
      const off=c-0xAC00;
      const oi=Math.floor(off/588);
      const vi=Math.floor((off%588)/28);
      const ci=off%28;
      // 받침 없는 버전 (ㅇ+ㅣ = 이, 받침 포함 전)
      const charNoCoda=ci>0?String.fromCharCode(0xAC00+oi*588+vi*28):ch;
      res.push({char:ch,onset:ON[oi],vowel:VW[vi],coda:CD[ci],charNoCoda});
    }
  }
  return res;
}
function uniqueVowels(kor){
  const seen=new Set(),u=[];
  for(const ch of kor){
    const c=ch.charCodeAt(0);
    if(c>=0xAC00&&c<=0xD7A3){
      const v=VW[Math.floor(((c-0xAC00)%588)/28)];
      if(!seen.has(v)){seen.add(v);u.push(v);}
    }
  }
  return u;
}

// ── Gemini ────────────────────────────────────
const EP='https://hangul-vowel.vercel.app/api/gemini';
const RULES={
  '영어':'영미권 발음 기준. 굳어진 표기 우선(Ryan→라이언,Sophie→소피,Charlotte→샬롯,Emma→에마,Lena→레나).',
  '프랑스어':'[ə]→으,[œ]→외,어말자음묵음. Pierre→피에르.',
  '독일어':'[ε]→에,ü→위,어말-er→어. Wolfgang→볼프강.',
  '스페인어':'ll→이,ñ→니,h묵음. Sofia→소피아.',
  '이탈리아어':'-zione→치오네,sc+e/i→시. Marco→마르코.',
  '러시아어':'키릴기준.й→이,ы→이.',
  '포르투갈어':'[ã]→앙,[õ]→옹,lh→리,nh→니.',
  '일본어':'헵번식 로마자 기준.つ→쓰,ふ→후.'
};
async function callGemini(name,lang){
  const p=`당신은 국립국어원 외래어 표기법 전문가이자 한국 시인입니다.
"${name}"을(를) ${lang} 이름으로 보고 외래어 표기법에 따라 한글로 변환하고, 그 모음에서 영감받은 시적 한 줄 의미를 창작하세요.
규칙: ${RULES[lang]||''}
반드시 아래 JSON만 응답(마크다운 없이):
{"korean":"한글표기","meaning_kr":"시적의미(4-6자)","meaning_en":"English translation","note":"표기근거"}`;
  const r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});
  if(!r.ok)throw new Error('API 오류');
  const d=await r.json();
  return JSON.parse((d.text||'').replace(/```json|```/g,'').trim());
}

// ── 로딩 ──────────────────────────────────────
const LC=['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅏ','ㅓ','ㅗ','ㅜ','ㅣ','가','나','다','라'];
function shuffleLC(){
  const el=document.getElementById('lc');
  if(el) el.innerHTML=Array.from({length:6},()=>`<span>${LC[Math.floor(Math.random()*LC.length)]}</span>`).join('');
}

// ── 처리 ──────────────────────────────────────
async function startProcess(){
  const name=document.getElementById('nf').value.trim();
  if(!name) return;
  curName=name;
  show('pg-load');

  const msgs=['Extracting vowels...','Applying loanword rules...','Composing certificate...'];
  let mi=0;
  const ct=setInterval(shuffleLC,160);
  const mt=setInterval(()=>{const el=document.getElementById('lt');if(el)el.textContent=msgs[++mi%msgs.length];},900);

  try{
    const res=await callGemini(name,curLang);
    clearInterval(ct); clearInterval(mt);
    curKor=res.korean;
    fillCertificate(name,res);

    // 결과 화면 표시 (cert/actions는 아직 숨김)
    show('pg-result');
    document.getElementById('cert-wrap').classList.remove('on');
    document.getElementById('act-wrap').classList.remove('on');
    document.getElementById('retry-btn').classList.remove('on');

    // 애니메이션 오버레이 열기
    const ov=document.getElementById('anim-overlay');
    ov.style.display='flex';
    ov.style.opacity='1';

    await sleep(100);
    await runAnimation(decompose(res.korean), res.korean);
    await sleep(300);

    // 애니메이션 닫기
    ov.style.transition='opacity .8s ease';
    ov.style.opacity='0';
    await sleep(900);
    ov.style.display='none';
    ov.style.transition='';

    // Certificate 등장
    document.getElementById('cert-wrap').classList.add('on');
    await sleep(300);
    document.getElementById('act-wrap').classList.add('on');
    document.getElementById('retry-btn').classList.add('on');

  }catch(e){
    clearInterval(ct); clearInterval(mt);
    console.error(e);
    show('pg-name');
    alert('오류가 발생했습니다.\n'+e.message);
  }
}

// ── Certificate 채우기 ────────────────────────
function fillCertificate(orig,res){
  const yr=new Date().getFullYear();
  const uv=uniqueVowels(res.korean);
  document.getElementById('cv').textContent=uv.join('   ');
  document.getElementById('ck').textContent=res.korean;
  document.getElementById('co').textContent=orig;
  document.getElementById('cmk').textContent=res.meaning_kr||'';
  document.getElementById('cme').textContent=res.meaning_en||'';
  document.getElementById('cy').textContent=yr;
  const st=res.korean.length>=2?res.korean[0]+'<br/>'+res.korean[1]:res.korean;
  document.getElementById('cs').innerHTML=st;
  // 캡처카드
  document.getElementById('xv').textContent=uv.join('   ');
  document.getElementById('xk').textContent=res.korean;
  document.getElementById('xo').textContent=orig;
  document.getElementById('xmk').textContent=res.meaning_kr||'';
  document.getElementById('xme').textContent=res.meaning_en||'';
  document.getElementById('xy').textContent=yr;
  document.getElementById('xs').innerHTML=st;
}

// ══════════════════════════════════════════════
//   한글 결합 애니메이션 (body 직속 fixed overlay)
// ══════════════════════════════════════════════
async function runAnimation(syllables, fullName){
  const stage=document.getElementById('anim-stage');
  const nameEl=document.getElementById('anim-name');
  const statusEl=document.getElementById('anim-status');

  stage.innerHTML='';
  nameEl.textContent='';
  nameEl.className='';

  for(let i=0;i<syllables.length;i++){
    await animSyllable(stage, statusEl, syllables[i]);
    stage.innerHTML='';
    await sleep(200);
  }

  // 완성 이름 등장 — stage 숨기고 중앙에
  setStatus(statusEl,'');
  stage.style.opacity='0';
  await sleep(200);
  nameEl.textContent=fullName;
  await raf2();
  nameEl.classList.add('on');
  await sleep(500);
  nameEl.classList.add('glow');
  await sleep(1400);
  nameEl.className='';
  stage.style.opacity='1';
}

function setStatus(el,txt){
  el.style.opacity='0';
  setTimeout(()=>{el.textContent=txt;el.style.opacity='1';},300);
}

async function animSyllable(stage, statusEl, syl){
  setStatus(statusEl, `${syl.onset}  +  ${syl.vowel}${syl.coda?' + '+syl.coda:''}`);

  // ① 초성 — 왼쪽에서
  const oEl=mkJm(syl.onset,'jm jm-o');
  oEl.style.transform='translate(calc(-50% - 140px), -50%)';
  stage.appendChild(oEl);
  await raf2();
  oEl.style.transition='transform 1.0s cubic-bezier(.34,1.1,.64,1), opacity .6s ease';
  oEl.style.transform='translate(calc(-50% - 44px), -50%)';
  oEl.style.opacity='1';
  await sleep(1400);

  // ② 중성 — 오른쪽에서
  const vEl=mkJm(syl.vowel,'jm jm-v');
  vEl.style.transform='translate(calc(-50% + 140px), -50%)';
  stage.appendChild(vEl);
  await raf2();
  vEl.style.transition='transform 1.0s cubic-bezier(.34,1.1,.64,1), opacity .6s ease';
  vEl.style.transform='translate(calc(-50% + 44px), -50%)';
  vEl.style.opacity='1';

  // ③ 받침 있으면 동시에 위에서 내려옴
  let cEl=null;
  if(syl.coda){
    cEl=mkJm(syl.coda,'jm jm-c');
    cEl.style.transform='translate(-50%, calc(-50% - 120px))';
    stage.appendChild(cEl);
    await raf2();
    cEl.style.transition='transform 1.0s cubic-bezier(.34,1.1,.64,1), opacity .6s ease';
    cEl.style.transform='translate(-50%, calc(-50% + 66px))';
    cEl.style.opacity='1';
  }
  await sleep(1100);

  // ④ 중앙으로 당겨짐
  const sT='transform .9s cubic-bezier(.34,1.1,.64,1), opacity .5s ease';
  oEl.style.transition=sT; vEl.style.transition=sT;
  oEl.style.transform='translate(-50%, -50%)'; oEl.style.opacity='0.12';
  vEl.style.transform='translate(-50%, -50%)'; vEl.style.opacity='0.12';
  if(cEl){ cEl.style.transition=sT; cEl.style.transform='translate(-50%, -50%)'; cEl.style.opacity='0.12'; }
  await sleep(700);

  // ⑤ 플래시 + 파티클 + 완성 음절
  addFlash(stage); addParticles(stage);
  oEl.remove(); vEl.remove(); if(cEl) cEl.remove();
  await sleep(80);

  const rEl=mkJm(syl.char,'jm jm-r');
  rEl.style.transform='translate(-50%, -50%) scale(.25)';
  stage.appendChild(rEl);
  await raf2();
  rEl.style.transition='transform .7s cubic-bezier(.34,1.56,.64,1), opacity .4s ease';
  rEl.style.transform='translate(-50%, -50%) scale(1)';
  rEl.style.opacity='1';
  await sleep(700);
}

function mkJm(char, cls){
  const el=document.createElement('div');
  el.className=cls;
  el.textContent=char;
  return el;
}

function addFlash(stage){
  const f=document.createElement('div');
  f.className='flash-el';
  stage.appendChild(f);
  setTimeout(()=>f.remove(), 800);
}

function addParticles(stage){
  [0,45,90,135,180,225,270,315].forEach(a=>{
    const p=document.createElement('div');
    p.className='ptcl';
    const r=a*Math.PI/180, d=55+Math.random()*30;
    p.style.setProperty('--tx',`${Math.cos(r)*(d*.3)}px`);
    p.style.setProperty('--ty',`${Math.sin(r)*(d*.3)}px`);
    p.style.setProperty('--tx2',`${Math.cos(r)*d}px`);
    p.style.setProperty('--ty2',`${Math.sin(r)*d}px`);
    stage.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  });
}

// ── TTS ───────────────────────────────────────
function playTTS(){
  if(!curKor)return;
  const u=new SpeechSynthesisUtterance(curKor);
  u.lang='ko-KR'; u.rate=0.82;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

// ── 카드 저장 ─────────────────────────────────
async function saveCard(){
  const btn=document.getElementById('sb');
  btn.textContent='저장 중…'; btn.disabled=true;
  try{
    const card=document.getElementById('cap');
    card.style.cssText='position:absolute;top:0;left:0;width:390px;';
    await sleep(250);
    const canvas=await html2canvas(card,{backgroundColor:'#F9F6F0',scale:2,useCORS:true});
    card.style.cssText='position:fixed;top:-9999px;left:-9999px;width:390px;';
    const a=document.createElement('a');
    a.download=`${curKor}-한글코드.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
  }catch{alert('저장 중 오류가 발생했습니다.');}
  btn.innerHTML='<span class="material-symbols-outlined" style="font-size:16px;">ios_share</span>Save';
  btn.disabled=false;
}

// ── 처음으로 ──────────────────────────────────
function startOver(){
  curKor=''; curName='';
  document.getElementById('nf').value='';
  document.getElementById('anim-overlay').style.display='none';
  document.getElementById('anim-overlay').style.opacity='1';
  document.getElementById('anim-overlay').style.transition='';
  document.getElementById('anim-name').className='';
  document.getElementById('anim-name').textContent='';
  document.getElementById('anim-stage').innerHTML='';
  show('pg-land');
}

// Enter
document.getElementById('nf').addEventListener('keydown',e=>{if(e.key==='Enter')startProcess();});
document.getElementById('cy').textContent=new Date().getFullYear();
</script>
