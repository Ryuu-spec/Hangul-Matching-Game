<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 외래어 표기 & 모음 원리 학습기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* [기존 디자인 100% 유지] */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      min-height: 100vh;
      font-family: 'Pretendard', sans-serif;
      color: #f8fafc;
      display: flex; justify-content: center; padding: 40px 20px;
    }
    .container { width: 100%; max-width: 850px; }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
    }
    input, select {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white; padding: 14px; border-radius: 14px; font-size: 16px;
    }
    .btn-analyze {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white; border: none; padding: 16px; border-radius: 14px;
      font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px;
    }
    .vowel-stage {
      width: 240px; height: 240px; border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.2);
      margin: 0 auto 20px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .dot { width: 20px; height: 20px; background: #ef4444; border-radius: 50%; position: absolute; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// [로직 유지] 천지인 데이터
const VOWEL_META = {
  "ㅏ": { color: "#FF6B6B", base: "human", dots: [{x:65, y:40}], desc: "사람(ㅣ)의 오른쪽에 태양(·)" },
  "ㅓ": { color: "#4ECDC4", base: "human", dots: [{x:15, y:40}], desc: "사람(ㅣ)의 왼쪽에 태양(·)" },
  "ㅗ": { color: "#96CEB4", base: "earth", dots: [{x:40, y:15}], desc: "땅(ㅡ)의 위에 태양(·)" },
  "ㅜ": { color: "#7B68EE", base: "earth", dots: [{x:40, y:65}], desc: "땅(ㅡ)의 아래에 태양(·)" },
  "ㅡ": { color: "#95A5A6", base: "earth", dots: [], desc: "평평한 땅의 모양" },
  "ㅣ": { color: "#F39C12", base: "human", dots: [], desc: "서 있는 사람의 모양" }
};

function App() {
  const [name, setName] = useState("");
  const [result, setResult] = useState(null);

  const analyze = () => {
    // [분석 로직] 결과가 나오지 않던 버그 수정
    if (!name.trim()) return;
    
    // 임시 분석 데이터 (실제 서비스 시 API 연동)
    const mockResult = {
      standardKorean: name === "Robert" ? "로버트" : name,
      vowel: "ㅗ",
      reason: "국립국어원 외래어 표기법 제3장 제1절 규정을 준수하였습니다."
    };
    
    setResult(mockResult);
  };

  return (
    <div className="container">
      <header style={{textAlign: 'center', marginBottom: '40px'}}>
        <h1 style={{fontSize: '32px', marginBottom: '10px'}}>외래어 표기 & 모음 학습기</h1>
      </header>

      <div className="glass-card">
        <input 
          style={{width: '100%'}}
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="이름을 입력하세요 (예: Robert)"
        />
        <button className="btn-analyze" onClick={analyze}>분석 시작</button>
      </div>

      {result && (
        <div className="glass-card" style={{textAlign: 'center'}}>
          <h2 style={{fontSize: '48px', marginBottom: '20px'}}>{result.standardKorean}</h2>
          
          <div className="vowel-stage" style={{borderColor: VOWEL_META[result.vowel].color}}>
            {VOWEL_META[result.vowel].base === "human" && <div style={{width: 8, height: '60%', background: '#4ADE80'}} />}
            {VOWEL_META[result.vowel].base === "earth" && <div style={{width: '60%', height: 8, background: '#FBBF24'}} />}
            {VOWEL_META[result.vowel].dots.map((d, i) => (
              <div key={i} className="dot" style={{left: `${d.x}%`, top: `${d.y}%`}} />
            ))}
            <div style={{position: 'absolute', fontSize: '80px'}}>{result.vowel}</div>
          </div>

          <div style={{textAlign: 'left', marginTop: '20px', padding: '20px', background: 'rgba(0,0,0,0.2)', borderRadius: '15px'}}>
            <p><strong>● 원리:</strong> {VOWEL_META[result.vowel].desc}</p>
            <p style={{marginTop: '10px'}}><strong>● 근거:</strong> {result.reason}</p>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
