<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>한글 모음 조합하기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 2.8rem;
            margin-top: 50px;
            margin-bottom: 70px;
            font-weight: 600;
            letter-spacing: 0.06em;
        }
        .title-eq { color: rgba(255,255,255,0.4); font-weight: 400; }
        .title-q  { color: #ff6b9d; }

        .game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }

        .build-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* 완성 글자 모아보기 */
        .completed-row {
            display: flex;
            gap: 14px;
            min-height: 58px;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 6px 18px;
            min-width: 290px;
            justify-content: center;
        }
        .completed-char {
            font-size: 2.2rem;
            font-weight: 700;
            animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
        }

        /* 조합 그리드 */
        .build-grid {
            display: grid;
            grid-template-areas:
                "consonant right"
                "bottom    empty";
            grid-template-columns: 155px 52px;
            grid-template-rows:    155px 52px;
            gap: 10px;
        }

        .consonant-box {
            grid-area: consonant;
            background: #151b3b;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.2rem;
            font-weight: 700;
            color: white;
            user-select: none;
        }

        .answer-slot {
            background: transparent;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.2s ease;
            overflow: hidden;
        }

        .right-slot {
            grid-area: right;
            border: 2px solid #00e5ff;
            border-radius: 10px;
        }
        .bottom-slot {
            grid-area: bottom;
            border: 2px solid #ff9f43;
            border-radius: 10px;
        }

        /* 힌트 라벨 */
        .slot-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.2s;
            text-align: center;
            line-height: 1.3;
        }
        .right-slot  .slot-label { color: #00e5ff; writing-mode: vertical-rl; }
        .bottom-slot .slot-label { color: #ff9f43; }

        .answer-slot.filled .slot-label { opacity: 0; }

        .slot-vowel {
            position: absolute;
            font-size: 2rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .answer-slot.filled .slot-vowel { opacity: 1; }

        .answer-slot.drag-over { background: rgba(255,255,255,0.07); }
        .right-slot.drag-over  { border-color: #80f0ff; }
        .bottom-slot.drag-over { border-color: #ffc87a; }

        .answer-slot.wrong { animation: shake 0.5s ease; }
        .right-slot.wrong  { border-color: #ff4444; }
        .bottom-slot.wrong { border-color: #ff4444; }

        .progress {
            color: rgba(255,255,255,0.45);
            font-size: 0.92rem;
            letter-spacing: 0.05em;
        }
        .reset-btn {
            padding: 8px 22px;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 9px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            touch-action: manipulation;
        }
        .reset-btn:hover  { background: rgba(255,255,255,0.12); }
        .reset-btn:active { transform: scale(0.95); }

        /* 모음 패널 */
        .vowel-panel {
            background: rgba(30,35,60,0.4);
            border-radius: 22px;
            padding: 30px 38px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .panel-label {
            color: rgba(255,255,255,0.35);
            font-size: 0.82rem;
            margin-bottom: 22px;
            letter-spacing: 0.06em;
        }
        .options-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px 28px;
            justify-items: center;
            align-items: center;
        }

        .option-char {
            font-size: 3.6rem;
            font-weight: 700;
            cursor: grab;
            transition: transform 0.1s ease, opacity 0.3s ease;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .option-char:active { cursor: grabbing; }
        .option-char.dragging {
            opacity: 0.6;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
        }
        .option-char.placed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.4);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .option-char.wrong-bounce { animation: wrongBounce 0.5s ease; }

        .option-char[data-vowel="ㅏ"] { color: #ff8c42; }
        .option-char[data-vowel="ㅓ"] { color: #c77dff; }
        .option-char[data-vowel="ㅣ"] { color: #ff6b9d; }
        .option-char[data-vowel="ㅗ"] { color: #ffbe0b; }
        .option-char[data-vowel="ㅜ"] { color: #4ecca3; }
        .option-char[data-vowel="ㅡ"] { color: #48dbfb; }

        .drag-clone {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-size: 3.6rem;
            font-weight: 700;
            opacity: 0.92;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
        }

        .result-popup {
            position: fixed;
            top: 50%; left: 50%;
            font-size: 9rem;
            font-weight: 900;
            z-index: 5000;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%,-50%) scale(0.2);
        }
        .result-popup.show {
            animation: resultPop 0.75s cubic-bezier(.22,.61,.36,1) forwards;
        }

        .fireworks-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .fireworks-container.active { opacity: 1; }
        .firework {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: fireworkExplode 1.2s ease-out forwards;
        }

        @keyframes resultPop {
            0%   { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
            35%  { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
            60%  { transform: translate(-50%,-50%) scale(0.95); opacity: 1; }
            80%  { transform: translate(-50%,-50%) scale(1);    opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1.6);  opacity: 0; }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            15%,45%,75% { transform: translateX(-10px); }
            30%,60%,90% { transform: translateX(10px); }
        }
        @keyframes wrongBounce {
            0%,100% { transform: scale(1); }
            40% { transform: scale(1.25) rotate(-5deg); }
            70% { transform: scale(0.95) rotate(3deg); }
        }
        @keyframes popIn {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.25); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes fireworkExplode {
            0%   { transform: translate(0,0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }

        @media (max-width: 900px) {
            .game-wrapper { flex-direction: column; gap: 50px; }
            h1 { font-size: 2.2rem; margin-bottom: 40px; margin-top: 30px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .build-grid {
                grid-template-columns: 120px 42px;
                grid-template-rows:    120px 42px;
                gap: 8px;
            }
            .consonant-box { font-size: 4rem; }
            .slot-vowel    { font-size: 1.6rem; }
            .option-char   { font-size: 2.8rem; }
            .vowel-panel   { padding: 22px 28px; }
            .result-popup  { font-size: 7rem; }
        }
    </style>
</head>
<body>

<h1>ㅇ + 모음 <span class="title-eq">=</span> <span class="title-q">?</span></h1>

<div class="game-wrapper">
    <div class="build-area">
        <div class="completed-row" id="completedRow"></div>

        <div class="build-grid">
            <div class="consonant-box">ㅇ</div>

            <div class="answer-slot right-slot" id="rightSlot" data-slot="right">
                <span class="slot-label">오른쪽</span>
                <span class="slot-vowel" id="rightVowel"></span>
            </div>

            <div class="answer-slot bottom-slot" id="bottomSlot" data-slot="bottom">
                <span class="slot-label">아래</span>
                <span class="slot-vowel" id="bottomVowel"></span>
            </div>
        </div>

        <div class="progress" id="progress">0 / 6 완성</div>
        <button class="reset-btn" onclick="resetGame()">다시 시작</button>
    </div>

    <div class="vowel-panel">
        <div class="panel-label">모음을 끌어다 놓아 보세요</div>
        <div class="options-area" id="optionsArea">
            <div class="option-char" draggable="true" data-vowel="ㅏ" data-slot="right">ㅏ</div>
            <div class="option-char" draggable="true" data-vowel="ㅓ" data-slot="right">ㅓ</div>
            <div class="option-char" draggable="true" data-vowel="ㅣ" data-slot="right">ㅣ</div>
            <div class="option-char" draggable="true" data-vowel="ㅗ" data-slot="bottom">ㅗ</div>
            <div class="option-char" draggable="true" data-vowel="ㅜ" data-slot="bottom">ㅜ</div>
            <div class="option-char" draggable="true" data-vowel="ㅡ" data-slot="bottom">ㅡ</div>
        </div>
    </div>
</div>

<div class="result-popup" id="resultPopup"></div>
<div class="fireworks-container" id="fireworksContainer"></div>

<script>
    var vowelMap = {
        'ㅏ': { result:'아', color:'#ff8c42', slot:'right'  },
        'ㅓ': { result:'어', color:'#c77dff', slot:'right'  },
        'ㅣ': { result:'이', color:'#ff6b9d', slot:'right'  },
        'ㅗ': { result:'오', color:'#ffbe0b', slot:'bottom' },
        'ㅜ': { result:'우', color:'#4ecca3', slot:'bottom' },
        'ㅡ': { result:'으', color:'#48dbfb', slot:'bottom' }
    };

    var completedCount = 0;
    var slotBusy       = { right: false, bottom: false };
    var draggedElement = null;
    var isDragging     = false;
    var currentTouchEl = null;
    var dragClone      = null;

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR';
        u.rate = 0.85;
        u.pitch = 1.0;
        window.speechSynthesis.speak(u);
    }

    function updateProgress() {
        document.getElementById('progress').textContent = completedCount + ' / 6 완성';
    }

    function showResultPopup(char, color) {
        var p = document.getElementById('resultPopup');
        p.textContent = char;
        p.style.color = color;
        p.className   = 'result-popup';
        void p.offsetWidth;
        p.classList.add('show');
        setTimeout(function() { p.className = 'result-popup'; }, 800);
    }

    function addCompletedChar(char, color) {
        var el = document.createElement('span');
        el.className   = 'completed-char';
        el.textContent = char;
        el.style.color = color;
        document.getElementById('completedRow').appendChild(el);
    }

    function handleDrop(charEl, slotEl) {
        var vowel      = charEl.getAttribute('data-vowel');
        var needSlot   = charEl.getAttribute('data-slot');
        var targetSlot = slotEl.getAttribute('data-slot');

        if (slotBusy[targetSlot]) return;
        if (charEl.classList.contains('placed')) return;

        if (needSlot !== targetSlot) {
            playIncorrectSound();
            slotEl.classList.add('wrong');
            charEl.classList.add('wrong-bounce');
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            setTimeout(function() {
                slotEl.classList.remove('wrong');
                charEl.classList.remove('wrong-bounce');
            }, 500);
            return;
        }

        var info = vowelMap[vowel];
        slotBusy[targetSlot] = true;

        var vowelSpan = slotEl.querySelector('.slot-vowel');
        vowelSpan.textContent = vowel;
        vowelSpan.style.color = info.color;
        slotEl.classList.add('filled');
        charEl.classList.add('placed');

        playCorrectSound();

        setTimeout(function() {
            showResultPopup(info.result, info.color);
            speak(info.result);
            addCompletedChar(info.result, info.color);
            completedCount++;
            updateProgress();

            setTimeout(function() {
                vowelSpan.textContent = '';
                slotEl.classList.remove('filled');
                slotBusy[targetSlot] = false;

                if (completedCount === 6) {
                    setTimeout(function() {
                        playCelebrationSound();
                        createFireworks();
                    }, 300);
                }
            }, 700);
        }, 180);
    }

    function playCorrectSound() {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.frequency.value = 659.25; osc.type = 'sine';
        g.gain.setValueAtTime(0.3, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.22);
        osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.22);
    }
    function playIncorrectSound() {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.frequency.value = 180; osc.type = 'sawtooth';
        g.gain.setValueAtTime(0.2, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.18);
        osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.18);
    }
    function playCelebrationSound() {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 659.25, 783.99, 1046.50].forEach(function(freq, i) {
            var osc = ac.createOscillator(), g = ac.createGain();
            osc.connect(g); g.connect(ac.destination);
            osc.frequency.value = freq; osc.type = 'sine';
            var t = ac.currentTime + i * 0.15;
            g.gain.setValueAtTime(0.3, t);
            g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        });
    }

    function initDragAndDrop() {
        document.querySelectorAll('.option-char').forEach(function(ch) {
            ch.addEventListener('dragstart', function(e) {
                draggedElement = this;
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            ch.addEventListener('dragend', function() { this.classList.remove('dragging'); });
            ch.addEventListener('touchstart', onTouchStart, {passive:false});
            ch.addEventListener('touchmove',  onTouchMove,  {passive:false});
            ch.addEventListener('touchend',   onTouchEnd,   {passive:false});
        });

        document.querySelectorAll('.answer-slot').forEach(function(slot) {
            slot.addEventListener('dragover',  function(e) { e.preventDefault(); this.classList.add('drag-over'); });
            slot.addEventListener('dragleave', function()  { this.classList.remove('drag-over'); });
            slot.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                if (draggedElement) handleDrop(draggedElement, this);
            });
        });
    }

    function onTouchStart(e) {
        if (this.classList.contains('placed')) return;
        e.preventDefault();
        currentTouchEl = this;
        isDragging = false;
    }
    function onTouchMove(e) {
        if (!currentTouchEl) return;
        e.preventDefault();
        var touch = e.touches[0];
        if (!isDragging) {
            isDragging = true;
            currentTouchEl.classList.add('dragging');
            dragClone = document.createElement('div');
            dragClone.className   = 'drag-clone';
            dragClone.textContent = currentTouchEl.textContent;
            dragClone.style.color = window.getComputedStyle(currentTouchEl).color;
            document.body.appendChild(dragClone);
        }
        if (dragClone) {
            dragClone.style.left = (touch.clientX - 30) + 'px';
            dragClone.style.top  = (touch.clientY - 40) + 'px';
        }
    }
    function onTouchEnd(e) {
        if (!currentTouchEl || !isDragging) { currentTouchEl = null; return; }
        e.preventDefault();
        currentTouchEl.classList.remove('dragging');
        if (dragClone) { dragClone.remove(); dragClone = null; }
        var touch  = e.changedTouches[0];
        var target = document.elementFromPoint(touch.clientX, touch.clientY);
        while (target && !target.classList.contains('answer-slot')) target = target.parentElement;
        if (target) handleDrop(currentTouchEl, target);
        currentTouchEl = null;
        isDragging     = false;
    }

    function createFireworks() {
        var c = document.getElementById('fireworksContainer');
        c.innerHTML = '';
        c.classList.add('active');
        var colors = ['#ff6b9d','#ff8c42','#c77dff','#ffbe0b','#4ecca3','#48dbfb'];
        for (var f = 0; f < 12; f++) {
            var x = Math.random() * window.innerWidth;
            var y = Math.random() * window.innerHeight;
            for (var i = 0; i < 35; i++) {
                var p = document.createElement('div');
                p.className = 'firework';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                var angle = (Math.PI * 2 * i) / 35;
                var v = 80 + Math.random() * 150;
                p.style.setProperty('--tx', Math.cos(angle) * v + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * v + 'px');
                p.style.animationDelay = (f * 0.12) + 's';
                c.appendChild(p);
            }
        }
        setTimeout(function() { c.classList.remove('active'); }, 2500);
    }

    function resetGame() {
        completedCount = 0;
        slotBusy = { right: false, bottom: false };
        updateProgress();
        document.getElementById('completedRow').innerHTML = '';
        document.querySelectorAll('.answer-slot').forEach(function(s) {
            s.classList.remove('filled','drag-over','wrong');
            var vs = s.querySelector('.slot-vowel');
            if (vs) { vs.textContent = ''; vs.style.color = ''; }
        });
        document.querySelectorAll('.option-char').forEach(function(c) {
            c.classList.remove('placed','dragging','wrong-bounce');
        });
        document.getElementById('fireworksContainer').classList.remove('active');
        if (dragClone) { dragClone.remove(); dragClone = null; }
        shuffleChars();
    }

    function shuffleChars() {
        var area = document.getElementById('optionsArea');
        var chars = Array.from(area.children);
        for (var i = chars.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = chars[i]; chars[i] = chars[j]; chars[j] = t;
        }
        area.innerHTML = '';
        chars.forEach(function(c) { area.appendChild(c); });
    }

    window.onload = function() { shuffleChars(); initDragAndDrop(); };
</script>
</body>
</html>
