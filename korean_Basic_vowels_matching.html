<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Basic Vowels - Matching Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdf8f5;
            padding: 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            display: block;
            max-width: 980px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background-color: white;
            padding: 12px 36px;
            border-radius: 100px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .title {
            font-size: 34px;
            font-weight: bold;
            color: #333;
        }

        .title span.blue {
            color: #5b8dee;
        }

        .title span.red {
            color: #ff6b6b;
        }

        .timer {
            background-color: #ff6b6b;
            color: white;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            min-width: 130px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(255, 107, 107, 0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 0 10px;
        }

        .card {
            aspect-ratio: 0.8;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            user-select: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transform: translateX(-100%);
            transition: transform 0.3s;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card.romaji {
            background-color: #ddeafc;
            color: #2a4a8a;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 100px;
            border: 6px solid white;
            letter-spacing: -2px;
        }

        .card.hangul {
            background-color: white;
            border: 6px solid #84aae4;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 900;
            font-size: clamp(60px, 10vw, 120px);
        }

        .card.selected {
            border: 6px solid #5b8dee;
            box-shadow: 0 0 30px rgba(91, 141, 238, 0.6), 0 8px 20px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .card.matched {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .card.wrong {
            animation: shake 0.2s;
            border-color: #f44336;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .card:hover:not(.matched):not(.selected) {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .card:active:not(.matched) {
            transform: scale(1.02);
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            top: -10px;
            z-index: 9999;
            pointer-events: none;
            border-radius: 2px;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .restart-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(91, 141, 238, 0.3);
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            justify-content: center;
            margin-left: 20px;
        }

        .restart-button.show {
            display: flex;
        }

        .restart-button:hover {
            background-color: #ff5252;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 16px rgba(91, 141, 238, 0.4);
        }

        .restart-button:active {
            transform: scale(0.95);
        }

        /* 모음 힌트 뱃지 */
        .vowel-hint {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0.45;
            font-family: Arial, sans-serif;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="header">
            <h1 class="title">Korean <span class="blue">Basic</span> <span class="red">Vowels</span></h1>
            <div style="display: flex; align-items: center;">
                <div class="timer" id="timer">00:00</div>
                <button class="restart-button" id="restartBtn" onclick="restartGame()">↻</button>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>
    </div>

        };

        function speakKorean(text) {
            const audio = audioMap[text];
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        let selectedCards = [];
        let matchedPairs = 0;
        let startTime;
        let timerInterval;
        let gameStarted = false;
        let isChecking = false;

        // 사운드
        function playCorrectSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 523.25;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
        }

        function playIncorrectSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 200;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
        }

        function playCelebrationSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                const t = ctx.currentTime + i * 0.15;
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
            });
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initGame() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            shuffleArray(cardsTemplate).forEach((card, index) => {
                const el = document.createElement('div');
                el.className = `card ${card.type}`;
                el.textContent = card.value;
                el.dataset.value = card.value;
                el.dataset.pair  = card.pair;
                el.dataset.index = index;

                if (card.color && card.type === 'hangul') {
                    el.style.color = card.color;
                }

                // 로마자 카드: 글자 수에 따라 폰트 조정
                if (card.type === 'romaji') {
                    el.style.fontSize = card.value.length === 1 ? 'clamp(50px, 9vw, 110px)' : 'clamp(36px, 6vw, 72px)';
                }

                el.addEventListener('click', handleCardClick);
                board.appendChild(el);
            });
        }

        function handleCardClick(e) {
            if (!gameStarted) { startTimer(); gameStarted = true; }
            const card = e.currentTarget;
            if (card.classList.contains('matched') ||
                card.classList.contains('selected') ||
                isChecking || selectedCards.length >= 2) return;

            // 양쪽 카드 클릭 시 발음 재생
            // 로마자 카드: pair(한글)로 소리, 한글 카드: value로 소리
            if (card.classList.contains('romaji')) {
                speakKorean(card.dataset.pair);
            } else {
                speakKorean(card.dataset.value);
            }

            card.classList.add('selected');
            selectedCards.push(card);
            if (selectedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            isChecking = true;
            const [c1, c2] = selectedCards;
            const v1 = c1.dataset.value, v2 = c2.dataset.value;
            const p1 = c1.dataset.pair,  p2 = c2.dataset.pair;

            if (v1 === p2 && v2 === p1) {
                playCorrectSound();
                c1.classList.add('matched'); c2.classList.add('matched');
                c1.classList.remove('selected'); c2.classList.remove('selected');
                matchedPairs++;
                selectedCards = [];
                isChecking = false;
                if (matchedPairs === TOTAL_PAIRS) endGame();
            } else {
                playIncorrectSound();
                c1.classList.add('wrong'); c2.classList.add('wrong');
                setTimeout(() => {
                    c1.classList.remove('selected', 'wrong');
                    c2.classList.remove('selected', 'wrong');
                    selectedCards = [];
                    isChecking = false;
                }, 100);
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const el = Date.now() - startTime;
                const m = Math.floor(el / 60000);
                const s = Math.floor((el % 60000) / 1000);
                document.getElementById('timer').textContent =
                    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 10);
        }

        function createConfetti() {
            const colors = ['#5b8dee','#4ecdc4','#f9ca24','#a29bfe','#fd79a8','#ff7675'];
            const shapes = ['●','■','★'];
            for (let i = 0; i < 100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.color = colors[Math.floor(Math.random() * colors.length)];
                c.style.fontSize = (Math.random() * 15 + 12) + 'px';
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                c.style.animation = 'confetti-fall linear forwards';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 6000);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            playCelebrationSound();
            createConfetti();
            document.getElementById('restartBtn').classList.add('show');
        }

        function restartGame() {
            document.getElementById('restartBtn').classList.remove('show');
            selectedCards = [];
            matchedPairs = 0;
            gameStarted = false;
            isChecking = false;
            clearInterval(timerInterval);
            document.getElementById('timer').textContent = '00:00';
            initGame();
        }

        initGame();
    </script>
