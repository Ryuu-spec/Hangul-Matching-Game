<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Vowel Learning · AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0D0B1E 0%, #161438 55%, #1E1A3C 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      overflow-x: hidden;
    }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardIn    { 0%{opacity:0;transform:scale(.85)} 65%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 14px rgba(167,139,250,.35)} 50%{box-shadow:0 0 32px rgba(167,139,250,.7)} }
    @keyframes bounce    { 0%,80%,100%{transform:scale(.75);opacity:.4} 40%{transform:scale(1.2);opacity:1} }
    input::placeholder   { color: rgba(255,255,255,0.22); }
    input:focus          { outline: none; }
    button               { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// 모음별 색상 + 로마자 + 기원 스토리
const VOWEL_META = {
  "ㅏ": { roman: "a",   color: "#FF6B6B", basic: true,  formula: "ㅣ + ·", formulaDetail: "ㅣ 오른쪽에 점" },
  "ㅑ": { roman: "ya",  color: "#FF8E53", basic: false, formula: "ㅣ + ··", formulaDetail: "ㅣ 오른쪽에 점 두 개" },
  "ㅓ": { roman: "eo",  color: "#4ECDC4", basic: true,  formula: "· + ㅣ", formulaDetail: "ㅣ 왼쪽에 점" },
  "ㅕ": { roman: "yeo", color: "#45B7D1", basic: false, formula: "·· + ㅣ", formulaDetail: "ㅣ 왼쪽에 점 두 개" },
  "ㅗ": { roman: "o",   color: "#96CEB4", basic: true,  formula: "ㅡ + ·", formulaDetail: "ㅡ 위에 점" },
  "ㅛ": { roman: "yo",  color: "#52C97A", basic: false, formula: "ㅡ + ··", formulaDetail: "ㅡ 위에 점 두 개" },
  "ㅜ": { roman: "u",   color: "#7B68EE", basic: true,  formula: "ㅡ + ·", formulaDetail: "ㅡ 아래에 점" },
  "ㅠ": { roman: "yu",  color: "#9B59B6", basic: false, formula: "ㅡ + ··", formulaDetail: "ㅡ 아래에 점 두 개" },
  "ㅡ": { roman: "eu",  color: "#95A5A6", basic: true,  formula: "ㅡ", formulaDetail: "평평한 땅의 모양" },
  "ㅣ": { roman: "i",   color: "#F39C12", basic: true,  formula: "ㅣ", formulaDetail: "서 있는 사람의 모양" },
  "ㅐ": { roman: "ae",  color: "#E74C3C", basic: true,  formula: "ㅣ + ·", formulaDetail: "ㅏ에서 변형된 소리" },
  "ㅔ": { roman: "e",   color: "#27AE60", basic: true,  formula: "· + ㅣ", formulaDetail: "ㅓ에서 변형된 소리" },
  "ㅘ": { roman: "wa",  color: "#E67E22", basic: false, formula: "ㅗ + ㅏ", formulaDetail: "두 모음이 합쳐진 소리" },
  "ㅝ": { roman: "wo",  color: "#3498DB", basic: false, formula: "ㅜ + ㅓ", formulaDetail: "두 모음이 합쳐진 소리" },
  "ㅚ": { roman: "oe",  color: "#1ABC9C", basic: false, formula: "ㅗ + ㅣ", formulaDetail: "두 모음이 합쳐진 소리" },
  "ㅟ": { roman: "wi",  color: "#8E44AD", basic: false, formula: "ㅜ + ㅣ", formulaDetail: "두 모음이 합쳐진 소리" },
  "ㅢ": { roman: "ui",  color: "#BDC3C7", basic: false, formula: "ㅡ + ㅣ", formulaDetail: "두 모음이 합쳐진 소리" },
};

const COMPOUND_MAP = {
  "ㅑ": ["ㅣ","ㅏ"], "ㅕ": ["ㅣ","ㅓ"], "ㅛ": ["ㅣ","ㅗ"], "ㅠ": ["ㅣ","ㅜ"],
  "ㅘ": ["ㅜ","ㅏ"], "ㅝ": ["ㅜ","ㅓ"], "ㅚ": ["ㅗ","ㅣ"], "ㅟ": ["ㅜ","ㅣ"], "ㅢ": ["ㅡ","ㅣ"],
};
const VOWEL_ORIGIN = {
  "ㅏ": { base: "human", dots: [[66,40]],        label: "ㅣ  오른쪽에 점",  en: "Heaven RIGHT of Human" },
  "ㅓ": { base: "human", dots: [[14,40]],        label: "ㅣ  왼쪽에 점",   en: "Heaven LEFT of Human"  },
  "ㅗ": { base: "earth", dots: [[40,14]],        label: "ㅡ  위에 점",     en: "Heaven ABOVE Earth"    },
  "ㅜ": { base: "earth", dots: [[40,66]],        label: "ㅡ  아래에 점",   en: "Heaven BELOW Earth"    },
  "ㅑ": { base: "human", dots: [[62,30],[62,50]], label: "ㅣ  오른쪽에 점 두 개", en: "Two heavens RIGHT" },
  "ㅕ": { base: "human", dots: [[18,30],[18,50]], label: "ㅣ  왼쪽에 점 두 개",  en: "Two heavens LEFT"  },
  "ㅛ": { base: "earth", dots: [[30,14],[50,14]], label: "ㅡ  위에 점 두 개",   en: "Two heavens ABOVE"  },
  "ㅠ": { base: "earth", dots: [[30,66],[50,66]], label: "ㅡ  아래에 점 두 개", en: "Two heavens BELOW"  },
  "ㅡ": { base: "earth", dots: [],               label: "땅의 모양",           en: "The flat Earth"     },
  "ㅣ": { base: "human", dots: [],               label: "서 있는 사람의 모양", en: "A standing Human"   },
  "ㅐ": { base: "human", dots: [[66,40]],        label: "ㅣ  오른쪽에 점",  en: "Heaven RIGHT (ㅏ variant)" },
  "ㅔ": { base: "human", dots: [[14,40]],        label: "ㅣ  왼쪽에 점",   en: "Heaven LEFT (ㅓ variant)"  },
};

function AnimatedVowelSVG({ vowel, isActive, animKey }) {
  const o = VOWEL_ORIGIN[vowel];
  if (!o) return null;

  // animKey 바뀔 때마다 애니메이션 재시작을 위해 key prop 활용
  const uid = `v_${vowel.charCodeAt(0)}_${animKey}`;

  const baseDelay = 0;      // 기본 요소 등장
  const dotDelay  = 0.55;   // 점 날아오는 타이밍

  return (
    <div style={{
      background: isActive ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.05)",
      border: `1px solid ${isActive ? "rgba(255,255,255,.25)" : "rgba(255,255,255,.1)"}`,
      borderRadius: 14, padding: "12px 14px", marginBottom: 12,
    }}>
      <style>{`
        @keyframes baseIn_${uid} {
          0%   { opacity:0; transform:scaleX(0) }
          60%  { opacity:1; transform:scaleX(1.1) }
          100% { opacity:1; transform:scaleX(1) }
        }
        @keyframes humanIn_${uid} {
          0%   { opacity:0; transform:scaleY(0) }
          60%  { opacity:1; transform:scaleY(1.1) }
          100% { opacity:1; transform:scaleY(1) }
        }
        @keyframes dotIn_${uid} {
          0%   { opacity:0; r:2;  filter:drop-shadow(0 0 0px #EF4444) }
          50%  { opacity:1; r:10; filter:drop-shadow(0 0 12px #EF4444) }
          100% { opacity:1; r:7;  filter:drop-shadow(0 0 6px #EF4444) }
        }
        @keyframes dotPulse_${uid} {
          0%,100% { filter:drop-shadow(0 0 4px rgba(239,68,68,.8)) }
          50%     { filter:drop-shadow(0 0 14px rgba(239,68,68,1)) }
        }
        .base-earth-${uid} {
          transform-origin: 40px 40px;
          animation: baseIn_${uid} 0.5s ${baseDelay}s cubic-bezier(.34,1.56,.64,1) both;
        }
        .base-human-${uid} {
          transform-origin: 40px 40px;
          animation: humanIn_${uid} 0.5s ${baseDelay}s cubic-bezier(.34,1.56,.64,1) both;
        }
        .dot-${uid}-0 { animation: dotIn_${uid} 0.5s ${dotDelay}s cubic-bezier(.34,1.56,.64,1) both, dotPulse_${uid} 1.2s ${dotDelay + 0.5}s ease-in-out infinite; }
        .dot-${uid}-1 { animation: dotIn_${uid} 0.5s ${dotDelay + 0.12}s cubic-bezier(.34,1.56,.64,1) both, dotPulse_${uid} 1.2s ${dotDelay + 0.62}s ease-in-out infinite; }
      `}</style>

      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        <svg key={uid} width="80" height="80" viewBox="0 0 80 80" style={{ flexShrink:0 }}>
          <circle cx="40" cy="40" r="37" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>

          {/* Earth bar */}
          {o.base === "earth" && (
            <rect className={`base-earth-${uid}`} x="12" y="37" width="56" height="6" rx="3"
              fill="#FBBF24" opacity="0.95"/>
          )}

          {/* Human bar */}
          {o.base === "human" && (
            <rect className={`base-human-${uid}`} x="37" y="12" width="6" height="56" rx="3"
              fill="#4ADE80" opacity="0.95"/>
          )}

          {/* Heaven dots */}
          {o.dots.map((d, i) => (
            <circle key={i} className={`dot-${uid}-${i}`}
              cx={d[0]} cy={d[1]} r="7" fill="#EF4444"/>
          ))}
        </svg>

        <div>
          <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:6, flexWrap:"wrap" }}>
            {o.base === "human" && (
              <span style={{ fontSize:11, background:"rgba(74,222,128,.15)", color:"#4ADE80", padding:"2px 8px", borderRadius:20, fontWeight:700 }}>🧍 ㅣ</span>
            )}
            {o.base === "earth" && (
              <span style={{ fontSize:11, background:"rgba(251,191,36,.15)", color:"#FBBF24", padding:"2px 8px", borderRadius:20, fontWeight:700 }}>🌍 ㅡ</span>
            )}
            {o.dots.length > 0 && (
              <span style={{ fontSize:11, background:"rgba(239,68,68,.15)", color:"#EF4444", padding:"2px 8px", borderRadius:20, fontWeight:700 }}>
                ☀️ ·{o.dots.length > 1 ? "·" : ""}
              </span>
            )}
          </div>
          <div style={{ fontSize:13, color: isActive ? "rgba(255,255,255,.9)" : "rgba(255,255,255,.65)", fontWeight:700, lineHeight:1.5 }}>
            {o.label}
          </div>
        </div>
      </div>
    </div>
  );
}



const EXAMPLES = ["Ryan", "Juan", "Sofia", "Michael", "Nadia", "Lucas"];

function App() {
  const [name, setName]             = useState("");
  const [isLoading, setIsLoading]   = useState(false);
  const [result, setResult]         = useState(null);
  const [activeCard, setActiveCard] = useState(null);
  const [stage, setStage]           = useState("input");
  const [dots, setDots]             = useState("");
  const [animKeys, setAnimKeys]     = useState({});
  const inputRef = useRef(null);

  useEffect(() => {
    if (!isLoading) return;
    const id = setInterval(() => setDots(d => d.length >= 3 ? "" : d + "."), 380);
    return () => clearInterval(id);
  }, [isLoading]);

  async function analyze() {
    if (!name.trim()) return;
    setIsLoading(true);
    try {
      const prompt = `You are a Korean language teacher for absolute beginners.
The learner's name is: "${name.trim()}"

Analyze the name phonetically and map each vowel sound to the closest Korean vowel (모음).
Available Korean vowels: ㅏ ㅑ ㅓ ㅕ ㅗ ㅛ ㅜ ㅠ ㅡ ㅣ ㅐ ㅔ ㅘ ㅝ ㅚ ㅟ ㅢ

Rules:
- Split by syllable SOUND (not spelling). E.g. "Ryan" → ["Ry" /ya/ → ㅑ, "an" /a/ → ㅏ]
- For compound vowels (ㅑ ㅕ ㅛ ㅠ ㅘ ㅝ ㅚ ㅟ ㅢ), set isCompound: true
- IMPORTANT: Each syllable must have a DIFFERENT koreanVowel — never repeat the same vowel twice
- Write greeting in English, keep it warm and short (1 sentence)
- Return ONLY pure JSON, no markdown

{
  "greeting": "short warm English welcome",
  "syllables": [
    {
      "syllable": "Ry",
      "vowelSound": "ya",
      "koreanVowel": "ㅑ",
      "isCompound": true,
      "tip": "one simple English pronunciation tip, no examples"
    }
  ]
}`;

      const response = await fetch("/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "API error");
      const raw = data.text.trim().replace(/```json\n?|```\n?/g, "").trim();
      const parsed = JSON.parse(raw);
      setResult(parsed);
      setStage("result");
      setActiveCard(null);
    } catch (e) {
      console.error(e);
      alert("분석 실패. 다시 시도해주세요.");
    } finally {
      setIsLoading(false);
    }
  }

  function reset() {
    setStage("input"); setResult(null); setActiveCard(null); setName("");
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  }

  const wrap = { position: "relative", zIndex: 1, maxWidth: 680, margin: "0 auto", padding: "44px 20px 88px" };

  return (
    <div style={{ minHeight: "100vh", overflowX: "hidden" }}>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
        <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%)", top: -100, left: -100 }} />
        <div style={{ position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(96,165,250,0.05) 0%, transparent 70%)", bottom: 0, right: -80 }} />
      </div>

      <div style={wrap}>
        {/* HEADER */}
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(167,139,250,0.12)", backdropFilter: "blur(12px)", border: "1px solid rgba(167,139,250,0.25)", borderRadius: 30, padding: "7px 18px", marginBottom: 18 }}>
            <span style={{ fontSize: 16 }}>🇰🇷</span>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.65)", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" }}>Korean Vowel · AI Learning</span>
          </div>
          <h1 style={{ fontSize: "clamp(24px,5.5vw,38px)", fontWeight: 900, color: "white", margin: "0 0 10px", lineHeight: 1.2 }}>
            내 이름 속의{" "}
            <span style={{ background: "linear-gradient(135deg,#A78BFA 0%,#60A5FA 60%,#34D399 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>한국어 모음</span>
            을 찾아봐요
          </h1>
          <p style={{ color: "rgba(255,255,255,0.42)", fontSize: 14 }}>이름을 입력하면 AI가 한글 모음으로 변환해줘요</p>
        </div>

        {/* INPUT */}
        {stage === "input" && (
          <div style={{ background: "rgba(255,255,255,0.055)", backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 28, padding: "34px 30px", animation: "fadeUp .45s both" }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 10, letterSpacing: 1.5, textTransform: "uppercase" }}>이름 (알파벳)</label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <input
                ref={inputRef} value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !isLoading && name.trim() && analyze()}
                placeholder="e.g. Ryan · Sofia · Lucas"
                style={{ flex: 1, minWidth: 200, padding: "15px 18px", fontSize: 22, fontWeight: 700, letterSpacing: 3, background: "rgba(255,255,255,0.07)", border: "2px solid rgba(255,255,255,0.12)", borderRadius: 14, color: "white" }}
              />
              <button onClick={analyze} disabled={isLoading || !name.trim()} style={{
                padding: "15px 24px", fontSize: 14, fontWeight: 800,
                background: (isLoading || !name.trim()) ? "rgba(255,255,255,0.08)" : "linear-gradient(135deg,#A78BFA,#60A5FA)",
                color: (isLoading || !name.trim()) ? "rgba(255,255,255,.28)" : "white",
                border: "none", borderRadius: 14, cursor: (isLoading || !name.trim()) ? "not-allowed" : "pointer",
                boxShadow: (isLoading || !name.trim()) ? "none" : "0 4px 22px rgba(167,139,250,.38)", whiteSpace: "nowrap",
              }}>
                {isLoading ? `분석 중${dots}` : "✦ 분석하기"}
              </button>
            </div>

            <div style={{ marginTop: 20, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,.3)", fontWeight: 700, letterSpacing: 1 }}>예시:</span>
              {EXAMPLES.map(ex => (
                <button key={ex} onClick={() => setName(ex)} style={{ padding: "5px 13px", background: "rgba(255,255,255,.06)", border: "1px solid rgba(255,255,255,.13)", borderRadius: 20, fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,.55)", cursor: "pointer" }}>
                  {ex.flag} {ex.name}
                </button>
              ))}
            </div>

            {isLoading && (
              <div style={{ marginTop: 28, textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 12 }}>
                  {["ㅏ","ㅗ","ㅣ","ㅜ"].map((v, i) => {
                    const m = VOWEL_META[v];
                    return <div key={v} style={{ width: 38, height: 38, background: m.color, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 900, color: "white", animation: `bounce .9s ${i*.18}s infinite` }}>{v}</div>;
                  })}
                </div>
                <p style={{ color: "rgba(255,255,255,.4)", fontSize: 13 }}>AI가 모음을 분석하고 있어요…</p>
              </div>
            )}
          </div>
        )}

        {/* RESULT */}
        {stage === "result" && result && (
          <div>
            {/* Greeting */}
            <div style={{ background: "linear-gradient(135deg,rgba(167,139,250,.13),rgba(96,165,250,.1))", border: "1px solid rgba(167,139,250,.28)", borderRadius: 22, padding: "20px 24px", marginBottom: 22, animation: "fadeUp .5s both", display: "flex", gap: 14, alignItems: "flex-start" }}>
              <div style={{ width: 44, height: 44, minWidth: 44, background: "linear-gradient(135deg,#A78BFA,#60A5FA)", borderRadius: 13, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🤖</div>
              <div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,.38)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6 }}>Gemini AI 선생님</div>
                <p style={{ color: "rgba(255,255,255,.88)", fontSize: 15, fontWeight: 500, lineHeight: 1.65 }}>{result.greeting}</p>
              </div>
            </div>

            {/* Phonetic breakdown */}
            <div style={{ background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.09)", borderRadius: 18, padding: "18px 22px", marginBottom: 26, animation: "fadeUp .5s .08s both" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.35)", fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>
                📝 발음 분해 · "{name.trim()}"
              </div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                {result.syllables.map((s, i) => {
                  const m = VOWEL_META[s.koreanVowel] || { color: "#888", roman: "?" };
                  return (
                    <div key={i} style={{ textAlign: "center", animation: `cardIn .4s ${i*.1}s both` }}>
                      <div style={{ background: m.color + "1A", border: `2px solid ${m.color}44`, borderRadius: 12, padding: "8px 14px", marginBottom: 6, minWidth: 48 }}>
                        <div style={{ fontSize: 20, fontWeight: 900, color: "white", letterSpacing: 1 }}>{s.syllable}</div>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,.35)", marginTop: 2 }}>/{s.vowelSound}/</div>
                      </div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,.25)", marginBottom: 4 }}>↓</div>
                      <div style={{ width: 36, height: 36, background: m.color, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 900, color: "white", margin: "0 auto 3px", boxShadow: `0 3px 10px ${m.color}55` }}>{s.koreanVowel}</div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Cards */}
            <div style={{ fontSize: 11, color: "rgba(255,255,255,.38)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 14 }}>
              ✦ 나만의 모음 카드 — 탭하면 자세히 볼 수 있어요
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(196px,1fr))", gap: 14 }}>
              {result.syllables.map((item, i) => {
                const m = VOWEL_META[item.koreanVowel] || { color: "#888", roman: "?", story: "", origin: "" };
                const isActive = activeCard === i;
                const parts = COMPOUND_MAP[item.koreanVowel];

                return (
                  <div key={i} onClick={() => { setActiveCard(isActive ? null : i); setAnimKeys(prev => ({...prev, [i]: (prev[i]||0)+1})); }} style={{
                    background: isActive ? `linear-gradient(145deg,${m.color}EE,${m.color}AA)` : "rgba(255,255,255,.055)",
                    border: `1.5px solid ${isActive ? m.color : "rgba(255,255,255,.1)"}`,
                    borderRadius: 22, padding: 18, cursor: "pointer",
                    transition: "all .35s cubic-bezier(.34,1.56,.64,1)",
                    transform: isActive ? "scale(1.04)" : "scale(1)",
                    boxShadow: isActive ? `0 14px 42px ${m.color}44` : "0 2px 10px rgba(0,0,0,.25)",
                    animation: `cardIn .5s ${i*.1}s both`,
                  }}>
                    {/* compound badge */}
                    {item.isCompound && (
                      <div style={{ display: "inline-flex", alignItems: "center", gap: 4, background: isActive ? "rgba(255,255,255,.2)" : m.color + "22", border: `1px solid ${isActive ? "rgba(255,255,255,.3)" : m.color + "44"}`, borderRadius: 20, padding: "3px 10px", marginBottom: 12, fontSize: 10, fontWeight: 800, color: isActive ? "white" : m.color }}>⚡ 복합모음</div>
                    )}

                    {/* vowel display */}
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                      <div style={{ width: 58, height: 58, background: isActive ? "rgba(255,255,255,.22)" : m.color, borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 900, color: "white", boxShadow: isActive ? "none" : `0 6px 20px ${m.color}55` }}>{item.koreanVowel}</div>
                      <div>
                        <div style={{ fontSize: 12, color: isActive ? "rgba(255,255,255,.6)" : "rgba(255,255,255,.38)", marginBottom: 3 }}>
                          <b style={{ color: isActive ? "white" : "rgba(255,255,255,.7)" }}>"{item.syllable}"</b> 에서
                        </div>
                        <div style={{ fontSize: 22, fontWeight: 900, color: isActive ? "white" : m.color }}>/{m.roman}/</div>
                      </div>
                    </div>

                    <AnimatedVowelSVG vowel={item.koreanVowel} isActive={isActive} animKey={animKeys[i]||0} />

                    {/* compound decomposition */}
                    {item.isCompound && parts && (
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                        {parts.map((p, j) => {
                          const pm = VOWEL_META[p] || { color: "#888", roman: "?" };
                          return (
                            <div key={j} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              {j > 0 && <div style={{ fontSize: 14, color: "rgba(255,255,255,.4)" }}>+</div>}
                              <div style={{ textAlign: "center" }}>
                                <div style={{ width: 36, height: 36, background: pm.color, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 900, color: "white", margin: "0 auto 2px" }}>{p}</div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: pm.color }}>/{pm.roman}/</div>
                              </div>
                            </div>
                          );
                        })}
                        <div style={{ fontSize: 14, color: "rgba(255,255,255,.3)" }}>→</div>
                        <div style={{ textAlign: "center" }}>
                          <div style={{ width: 40, height: 40, background: m.color, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 900, color: "white", margin: "0 auto 2px", animation: "glowPulse 2s infinite" }}>{item.koreanVowel}</div>
                          <div style={{ fontSize: 11, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                        </div>
                      </div>
                    )}

                    {/* tip (active only) */}
                    {isActive && item.tip && (
                      <div style={{ borderTop: "1px solid rgba(255,255,255,.18)", paddingTop: 11, marginTop: 4 }}>
                        <div style={{ fontSize: 13, color: "rgba(255,255,255,.85)", lineHeight: 1.55 }}>💡 {item.tip}</div>
                      </div>
                    )}

                    <div style={{ textAlign: "right", fontSize: 10, color: "rgba(255,255,255,.22)", marginTop: 8 }}>
                      {isActive ? "탭해서 닫기 ▲" : "탭해서 팁 보기 ▼"}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Basic vowel reference */}
            <div style={{ marginTop: 30, background: "rgba(255,255,255,.04)", border: "1px solid rgba(255,255,255,.08)", borderRadius: 18, padding: "18px 22px", animation: "fadeUp .5s .35s both" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.3)", fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>🗂 기본 모음 · Basic Korean Vowels</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {Object.entries(VOWEL_META).filter(([,m]) => m.basic).map(([v, m]) => {
                  const used = result.syllables.some(s => s.koreanVowel === v);
                  return (
                    <div key={v} style={{ textAlign: "center", opacity: used ? 1 : 0.3 }}>
                      <div style={{ width: 38, height: 38, background: m.color, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 900, color: "white", margin: "0 auto 3px", boxShadow: used ? `0 2px 10px ${m.color}55` : "none", outline: used ? `2.5px solid ${m.color}` : "none", outlineOffset: 2 }}>{v}</div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.2)", marginTop: 10 }}>✦ 밝게 표시된 모음 = 내 이름에 있는 모음</div>
            </div>

            <div style={{ textAlign: "center", marginTop: 36 }}>
              <button onClick={reset} style={{ padding: "14px 38px", fontSize: 14, fontWeight: 800, background: "transparent", color: "rgba(255,255,255,.6)", border: "1.5px solid rgba(255,255,255,.18)", borderRadius: 50, cursor: "pointer" }}>
                ↩ 다른 이름 해보기
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
