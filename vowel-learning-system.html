<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Vowel Learning · AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0D0B1E 0%, #161438 55%, #1E1A3C 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      overflow-x: hidden;
    }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardIn    { 0%{opacity:0;transform:scale(.85)} 65%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 14px rgba(167,139,250,.35)} 50%{box-shadow:0 0 32px rgba(167,139,250,.7)} }
    @keyframes bounce    { 0%,80%,100%{transform:scale(.75);opacity:.4} 40%{transform:scale(1.2);opacity:1} }
    input::placeholder   { color: rgba(255,255,255,0.22); }
    input:focus          { outline: none; }
    button               { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const VOWEL_META = {
  "ㅏ": { roman: "a",   color: "#FF6B6B", mouth: "Open wide",           basic: true  },
  "ㅑ": { roman: "ya",  color: "#FF8E53", mouth: "ㅣ → ㅏ fast",        basic: false },
  "ㅓ": { roman: "eo",  color: "#4ECDC4", mouth: "Round lips slightly",  basic: true  },
  "ㅕ": { roman: "yeo", color: "#45B7D1", mouth: "ㅣ → ㅓ fast",        basic: false },
  "ㅗ": { roman: "o",   color: "#96CEB4", mouth: "Push lips forward",    basic: true  },
  "ㅛ": { roman: "yo",  color: "#52C97A", mouth: "ㅣ → ㅗ fast",        basic: false },
  "ㅜ": { roman: "u",   color: "#7B68EE", mouth: "Round lips tightly",   basic: true  },
  "ㅠ": { roman: "yu",  color: "#9B59B6", mouth: "ㅣ → ㅜ fast",        basic: false },
  "ㅡ": { roman: "eu",  color: "#95A5A6", mouth: "Spread lips flat",     basic: true  },
  "ㅣ": { roman: "i",   color: "#F39C12", mouth: "Stretch lips wide",    basic: true  },
  "ㅐ": { roman: "ae",  color: "#E74C3C", mouth: "Between ㅏ and ㅔ",   basic: true  },
  "ㅔ": { roman: "e",   color: "#27AE60", mouth: "Mid-height, spread",   basic: true  },
  "ㅘ": { roman: "wa",  color: "#E67E22", mouth: "ㅜ → ㅏ fast",        basic: false },
  "ㅝ": { roman: "wo",  color: "#3498DB", mouth: "ㅜ → ㅓ fast",        basic: false },
  "ㅚ": { roman: "oe",  color: "#1ABC9C", mouth: "ㅗ + ㅣ blend",       basic: false },
  "ㅟ": { roman: "wi",  color: "#8E44AD", mouth: "ㅜ → ㅣ fast",        basic: false },
  "ㅢ": { roman: "ui",  color: "#BDC3C7", mouth: "ㅡ → ㅣ fast",        basic: false },
};

const COMPOUND_MAP = {
  "ㅑ": ["ㅣ","ㅏ"],
  "ㅕ": ["ㅣ","ㅓ"],
  "ㅛ": ["ㅣ","ㅗ"],
  "ㅠ": ["ㅣ","ㅜ"],
  "ㅘ": ["ㅜ","ㅏ"],
  "ㅝ": ["ㅜ","ㅓ"],
  "ㅚ": ["ㅗ","ㅣ"],
  "ㅟ": ["ㅜ","ㅣ"],
  "ㅢ": ["ㅡ","ㅣ"],
};

const EXAMPLES = [
  { name: "Ryan",    flag: "🇺🇸" },
  { name: "Juan",    flag: "🇲🇽" },
  { name: "Sofia",   flag: "🇧🇷" },
  { name: "Michael", flag: "🇬🇧" },
  { name: "Nadia",   flag: "🇷🇺" },
  { name: "Lucas",   flag: "🇫🇷" },
];

function App() {
  const [name, setName]           = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [result, setResult]       = useState(null);
  const [activeCard, setActiveCard] = useState(null);
  const [stage, setStage]         = useState("input");
  const [dots, setDots]           = useState("");
  const [openDecomp, setOpenDecomp] = useState({});
  const inputRef = useRef(null);

  useEffect(() => {
    if (!isLoading) return;
    const id = setInterval(() => setDots(d => d.length >= 3 ? "" : d + "."), 380);
    return () => clearInterval(id);
  }, [isLoading]);

  async function analyze() {
    if (!name.trim()) return;
    setIsLoading(true);
    try {
      // ✅ API 키는 서버(api/gemini.js)에서 관리 — 프론트엔드에 키 없음
      const prompt = `You are a Korean language teacher for absolute beginners who are foreign learners.
The learner's name is: "${name.trim()}"

Analyze the name phonetically (sound by sound, not letter by letter) and map each vowel sound to the closest Korean vowel (모음).

Available Korean vowels ONLY: ㅏ ㅑ ㅓ ㅕ ㅗ ㅛ ㅜ ㅠ ㅡ ㅣ ㅐ ㅔ ㅘ ㅝ ㅚ ㅟ ㅢ

Rules:
- Split by syllable sound, not spelling. E.g. "Ryan" → ["Ry" /ya/ → ㅑ, "an" /a/ → ㅏ]
- For compound vowels (ㅑ ㅕ ㅛ ㅠ ㅘ ㅝ ㅚ ㅟ ㅢ), set isCompound: true
- Give 2 Korean word examples per vowel that beginners would recognize
- Write greeting and tips in English only
- Return ONLY pure JSON, no markdown fences

{
  "greeting": "1-2 sentence warm English welcome mentioning their name",
  "syllables": [
    {
      "syllable": "letters of this syllable e.g. Ry",
      "vowelSound": "IPA-style sound e.g. ya",
      "koreanVowel": "ㅑ",
      "isCompound": true,
      "examples": ["야구 (baseball)", "야채 (vegetable)"],
      "tip": "one English pronunciation tip"
    }
  ]
}`;

      // /api/gemini → Vercel 서버리스 함수 (키는 서버 환경변수에서 처리)
      const response = await fetch("/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "API error");
      const raw = data.text.trim().replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(raw);
      setResult(parsed);
      setStage("result");
      setOpenDecomp({});
      setActiveCard(null);
    } catch (e) {
      console.error(e);
      alert("Analysis failed. Please try again.");
    } finally {
      setIsLoading(false);
    }
  }

  function reset() {
    setStage("input");
    setResult(null);
    setActiveCard(null);
    setName("");
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  }

  const wrap = {
    position: "relative", zIndex: 1,
    maxWidth: 680, margin: "0 auto",
    padding: "44px 20px 88px",
  };

  return (
    <div style={{ minHeight: "100vh", overflowX: "hidden" }}>

      {/* BG glows */}
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
        <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%)", top: -100, left: -100 }} />
        <div style={{ position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(96,165,250,0.05) 0%, transparent 70%)", bottom: 0, right: -80 }} />
      </div>

      <div style={wrap}>

        {/* ── HEADER ── */}
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: "rgba(167,139,250,0.12)", backdropFilter: "blur(12px)",
            border: "1px solid rgba(167,139,250,0.25)", borderRadius: 30,
            padding: "7px 18px", marginBottom: 18,
          }}>
            <span style={{ fontSize: 16 }}>🇰🇷</span>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.65)", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" }}>
              Korean Vowel · AI Learning
            </span>
          </div>
          <h1 style={{ fontSize: "clamp(24px,5.5vw,38px)", fontWeight: 900, color: "white", margin: "0 0 10px", lineHeight: 1.2 }}>
            Discover Korean{" "}
            <span style={{ background: "linear-gradient(135deg,#A78BFA 0%,#60A5FA 60%,#34D399 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              vowels
            </span>
            <br />hiding in your name
          </h1>
          <p style={{ color: "rgba(255,255,255,0.42)", fontSize: 14 }}>
            Type your name → AI maps every vowel to 한글 &amp; decomposes compound sounds
          </p>
        </div>

        {/* ── INPUT ── */}
        {stage === "input" && (
          <div style={{
            background: "rgba(255,255,255,0.055)", backdropFilter: "blur(20px)",
            border: "1px solid rgba(255,255,255,0.1)", borderRadius: 28,
            padding: "34px 30px", animation: "fadeUp .45s both",
          }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 10, letterSpacing: 1.5, textTransform: "uppercase" }}>
              Your name (alphabet)
            </label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <input
                ref={inputRef}
                value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !isLoading && name.trim() && analyze()}
                placeholder="e.g.  Ryan · Juan · Sofia"
                style={{
                  flex: 1, minWidth: 200, padding: "15px 18px",
                  fontSize: 22, fontWeight: 700, letterSpacing: 3,
                  background: "rgba(255,255,255,0.07)",
                  border: "2px solid rgba(255,255,255,0.12)",
                  borderRadius: 14, color: "white",
                }}
              />
              <button
                onClick={analyze}
                disabled={isLoading || !name.trim()}
                style={{
                  padding: "15px 24px", fontSize: 14, fontWeight: 800,
                  background: (isLoading || !name.trim()) ? "rgba(255,255,255,0.08)" : "linear-gradient(135deg,#A78BFA,#60A5FA)",
                  color: (isLoading || !name.trim()) ? "rgba(255,255,255,.28)" : "white",
                  border: "none", borderRadius: 14,
                  cursor: (isLoading || !name.trim()) ? "not-allowed" : "pointer",
                  boxShadow: (isLoading || !name.trim()) ? "none" : "0 4px 22px rgba(167,139,250,.38)",
                  whiteSpace: "nowrap",
                }}
              >
                {isLoading ? `Analyzing${dots}` : "✦ Analyze"}
              </button>
            </div>

            {/* Quick examples */}
            <div style={{ marginTop: 20, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,.3)", fontWeight: 700, letterSpacing: 1 }}>TRY:</span>
              {EXAMPLES.map(ex => (
                <button key={ex.name} onClick={() => setName(ex.name)} style={{
                  padding: "5px 13px", background: "rgba(255,255,255,.06)",
                  border: "1px solid rgba(255,255,255,.13)", borderRadius: 20,
                  fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,.55)", cursor: "pointer",
                }}>
                  {ex.flag} {ex.name}
                </button>
              ))}
            </div>

            {/* Loading */}
            {isLoading && (
              <div style={{ marginTop: 28, textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 12 }}>
                  {["ㅏ","ㅗ","ㅣ","ㅜ"].map((v, i) => {
                    const m = VOWEL_META[v];
                    return (
                      <div key={v} style={{
                        width: 38, height: 38, background: m.color, borderRadius: 10,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 18, fontWeight: 900, color: "white",
                        animation: `bounce .9s ${i*.18}s infinite`,
                      }}>{v}</div>
                    );
                  })}
                </div>
                <p style={{ color: "rgba(255,255,255,.4)", fontSize: 13 }}>
                  AI is mapping your name to Korean vowels…
                </p>
              </div>
            )}
          </div>
        )}

        {/* ── RESULT ── */}
        {stage === "result" && result && (
          <div>

            {/* Greeting */}
            <div style={{
              background: "linear-gradient(135deg,rgba(167,139,250,.13),rgba(96,165,250,.1))",
              border: "1px solid rgba(167,139,250,.28)", borderRadius: 22,
              padding: "20px 24px", marginBottom: 22,
              animation: "fadeUp .5s both",
              display: "flex", gap: 14, alignItems: "flex-start",
            }}>
              <div style={{
                width: 44, height: 44, minWidth: 44,
                background: "linear-gradient(135deg,#A78BFA,#60A5FA)", borderRadius: 13,
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
              }}>🤖</div>
              <div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,.38)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6 }}>Gemini AI Teacher</div>
                <p style={{ color: "rgba(255,255,255,.88)", fontSize: 15, fontWeight: 500, lineHeight: 1.65 }}>
                  {result.greeting}
                </p>
              </div>
            </div>

            {/* Phonetic breakdown */}
            <div style={{
              background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.09)",
              borderRadius: 18, padding: "18px 22px", marginBottom: 26,
              animation: "fadeUp .5s .08s both",
            }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.35)", fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>
                📝 Phonetic Breakdown · "{name.trim()}"
              </div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                {result.syllables.map((s, i) => {
                  const m = VOWEL_META[s.koreanVowel] || { color: "#888", roman: "?" };
                  return (
                    <div key={i} style={{ textAlign: "center", animation: `cardIn .4s ${i*.1}s both` }}>
                      <div style={{
                        background: m.color + "1A", border: `2px solid ${m.color}44`,
                        borderRadius: 12, padding: "8px 14px", marginBottom: 6, minWidth: 48,
                      }}>
                        <div style={{ fontSize: 20, fontWeight: 900, color: "white", letterSpacing: 1 }}>{s.syllable}</div>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,.35)", marginTop: 2 }}>/{s.vowelSound}/</div>
                      </div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,.25)", marginBottom: 4 }}>↓</div>
                      <div style={{
                        width: 36, height: 36, background: m.color, borderRadius: 9,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 18, fontWeight: 900, color: "white",
                        margin: "0 auto 3px", boxShadow: `0 3px 10px ${m.color}55`,
                      }}>{s.koreanVowel}</div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Cards label */}
            <div style={{ fontSize: 11, color: "rgba(255,255,255,.38)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 14 }}>
              ✦ Your Personal Vowel Cards — tap each card for details
            </div>

            {/* Cards grid */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(196px,1fr))", gap: 14 }}>
              {result.syllables.map((item, i) => {
                const m = VOWEL_META[item.koreanVowel] || { color: "#888", roman: "?", mouth: "" };
                const isActive    = activeCard === i;
                const isDecompOpen = openDecomp[i];
                const parts       = COMPOUND_MAP[item.koreanVowel];

                return (
                  <div key={i}
                    onClick={() => setActiveCard(isActive ? null : i)}
                    style={{
                      background: isActive ? `linear-gradient(145deg,${m.color}EE,${m.color}AA)` : "rgba(255,255,255,.055)",
                      border: `1.5px solid ${isActive ? m.color : "rgba(255,255,255,.1)"}`,
                      borderRadius: 22, padding: 18, cursor: "pointer",
                      transition: "all .35s cubic-bezier(.34,1.56,.64,1)",
                      transform: isActive ? "scale(1.04)" : "scale(1)",
                      boxShadow: isActive ? `0 14px 42px ${m.color}44` : "0 2px 10px rgba(0,0,0,.25)",
                      animation: `cardIn .5s ${i*.1}s both`,
                    }}
                  >
                    {/* Compound badge */}
                    {item.isCompound && (
                      <div style={{
                        display: "inline-flex", alignItems: "center", gap: 4,
                        background: isActive ? "rgba(255,255,255,.2)" : m.color + "22",
                        border: `1px solid ${isActive ? "rgba(255,255,255,.3)" : m.color + "44"}`,
                        borderRadius: 20, padding: "3px 10px", marginBottom: 12,
                        fontSize: 10, fontWeight: 800, letterSpacing: .5,
                        color: isActive ? "white" : m.color,
                      }}>⚡ COMPOUND · 이중모음</div>
                    )}

                    {/* Vowel row */}
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                      <div style={{
                        width: 58, height: 58,
                        background: isActive ? "rgba(255,255,255,.22)" : m.color,
                        borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 28, fontWeight: 900, color: "white",
                        boxShadow: isActive ? "none" : `0 6px 20px ${m.color}55`,
                      }}>{item.koreanVowel}</div>
                      <div>
                        <div style={{ fontSize: 12, color: isActive ? "rgba(255,255,255,.6)" : "rgba(255,255,255,.38)", marginBottom: 3 }}>
                          from <b style={{ color: isActive ? "white" : "rgba(255,255,255,.7)" }}>"{item.syllable}"</b>
                        </div>
                        <div style={{ fontSize: 22, fontWeight: 900, color: isActive ? "white" : m.color }}>/{m.roman}/</div>
                        <div style={{ fontSize: 11, color: isActive ? "rgba(255,255,255,.55)" : "rgba(255,255,255,.28)" }}>sound: /{item.vowelSound}/</div>
                      </div>
                    </div>

                    {/* Decomposition panel */}
                    {item.isCompound && parts && (
                      <div
                        onClick={e => { e.stopPropagation(); setOpenDecomp(prev => ({ ...prev, [i]: !isDecompOpen })); }}
                        style={{
                          background: isActive ? "rgba(255,255,255,.1)" : "rgba(255,255,255,.04)",
                          border: `1px solid ${isActive ? "rgba(255,255,255,.22)" : "rgba(255,255,255,.08)"}`,
                          borderRadius: 14, padding: isDecompOpen ? 14 : "10px 14px",
                          marginBottom: 12, cursor: "pointer",
                        }}
                      >
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: .8, textTransform: "uppercase", color: isActive ? "rgba(255,255,255,.7)" : "rgba(255,255,255,.38)" }}>
                            🔍 AI Decomposition
                          </span>
                          <span style={{ fontSize: 13, color: isActive ? "rgba(255,255,255,.6)" : "rgba(255,255,255,.3)" }}>
                            {isDecompOpen ? "▲" : "▼"}
                          </span>
                        </div>

                        {isDecompOpen && (
                          <div style={{ marginTop: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
                            {parts.map((p, j) => {
                              const pm = VOWEL_META[p] || { color: "#888", roman: "?" };
                              return (
                                <div key={j} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                  {j > 0 && <div style={{ fontSize: 18, fontWeight: 900, color: "rgba(255,255,255,.3)" }}>+</div>}
                                  <div style={{ textAlign: "center" }}>
                                    <div style={{
                                      width: 44, height: 44, background: pm.color, borderRadius: 12,
                                      display: "flex", alignItems: "center", justifyContent: "center",
                                      fontSize: 20, fontWeight: 900, color: "white",
                                      margin: "0 auto 4px", boxShadow: `0 3px 10px ${pm.color}55`,
                                    }}>{p}</div>
                                    <div style={{ fontSize: 11, fontWeight: 700, color: pm.color }}>/{pm.roman}/</div>
                                  </div>
                                </div>
                              );
                            })}
                            <div style={{ fontSize: 20, fontWeight: 900, color: "rgba(255,255,255,.3)", margin: "0 2px" }}>→</div>
                            <div style={{ textAlign: "center" }}>
                              <div style={{
                                width: 50, height: 50, background: m.color, borderRadius: 14,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: 24, fontWeight: 900, color: "white", margin: "0 auto 4px",
                                animation: "glowPulse 2s infinite",
                              }}>{item.koreanVowel}</div>
                              <div style={{ fontSize: 12, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Examples */}
                    <div style={{ marginBottom: 8 }}>
                      {item.examples.map((ex, j) => (
                        <div key={j} style={{
                          background: isActive ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.05)",
                          borderRadius: 9, padding: "6px 11px", marginBottom: 5,
                          fontSize: 13, fontWeight: 600,
                          color: isActive ? "white" : "rgba(255,255,255,.65)",
                        }}>📖 {ex}</div>
                      ))}
                    </div>

                    {/* Tip (active) */}
                    {isActive && (
                      <div style={{ borderTop: "1px solid rgba(255,255,255,.18)", paddingTop: 11, marginTop: 4 }}>
                        <div style={{ fontSize: 13, color: "rgba(255,255,255,.85)", lineHeight: 1.55, marginBottom: 6 }}>
                          💡 {item.tip}
                        </div>
                        {m.mouth && (
                          <div style={{
                            display: "inline-flex", alignItems: "center", gap: 6,
                            background: "rgba(255,255,255,.15)", borderRadius: 10, padding: "5px 10px",
                          }}>
                            <span style={{ fontSize: 14 }}>👄</span>
                            <span style={{ fontSize: 12, fontWeight: 700, color: "rgba(255,255,255,.85)" }}>{m.mouth}</span>
                          </div>
                        )}
                      </div>
                    )}

                    <div style={{ textAlign: "right", fontSize: 10, color: "rgba(255,255,255,.22)", marginTop: 8 }}>
                      {isActive ? "tap to close ▲" : "tap for tips ▼"}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Basic vowel reference */}
            <div style={{
              marginTop: 30, background: "rgba(255,255,255,.04)",
              border: "1px solid rgba(255,255,255,.08)", borderRadius: 18,
              padding: "18px 22px", animation: "fadeUp .5s .35s both",
            }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.3)", fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>
                🗂 Basic Korean Vowels · 기본 모음
              </div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {Object.entries(VOWEL_META).filter(([,m]) => m.basic).map(([v, m]) => {
                  const used = result.syllables.some(s => s.koreanVowel === v);
                  return (
                    <div key={v} style={{ textAlign: "center", opacity: used ? 1 : 0.3 }}>
                      <div style={{
                        width: 38, height: 38, background: m.color, borderRadius: 10,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 18, fontWeight: 900, color: "white", margin: "0 auto 3px",
                        boxShadow: used ? `0 2px 10px ${m.color}55` : "none",
                        outline: used ? `2.5px solid ${m.color}` : "none",
                        outlineOffset: 2,
                      }}>{v}</div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: m.color }}>/{m.roman}/</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.2)", marginTop: 10 }}>
                ✦ Highlighted = found in your name
              </div>
            </div>

            {/* Reset */}
            <div style={{ textAlign: "center", marginTop: 36 }}>
              <button onClick={reset} style={{
                padding: "14px 38px", fontSize: 14, fontWeight: 800,
                background: "transparent", color: "rgba(255,255,255,.6)",
                border: "1.5px solid rgba(255,255,255,.18)", borderRadius: 50, cursor: "pointer",
              }}>
                ↩ Try Another Name
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
