<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한글 '아' 획순 애니메이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --stroke-color: #000000;
            --grid-color: #f1f5f9;
            --accent-color: #ef4444;
        }

        /* 스크롤 방지 및 화면 꽉 채우기 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
            box-sizing: border-box;
            gap: 2vh; /* 요소 간 간격을 화면 높이에 비례하게 설정 */
        }

        /* 캔버스 영역: 너비와 높이 중 작은 쪽을 기준으로 크기 결정 (스크롤 방지 핵심) */
        .canvas-area {
            position: relative;
            width: min(80vw, 70vh, 400px);
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
        }

        .drawing-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .grid-line {
            position: absolute;
            background-color: var(--grid-color);
            z-index: 0;
        }
        .grid-v { width: 1px; height: 100%; left: 50%; }
        .grid-h { height: 1px; width: 100%; top: 50%; }
        
        .consonant-guide {
            position: absolute;
            width: 25%;
            height: 25%;
            border: 1.5px dashed #e2e8f0;
            border-radius: 50%;
            left: 15%;
            top: 37.5%;
            z-index: 0;
        }

        svg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            overflow: visible;
        }

        .stroke {
            fill: none;
            stroke: var(--stroke-color);
            stroke-width: 24;
            stroke-linecap: butt; 
            stroke-linejoin: miter;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        .animate-stroke-1 {
            animation: draw 0.8s linear forwards;
        }

        .animate-stroke-2 {
            animation: draw 0.4s linear forwards;
            animation-delay: 0.9s;
        }

        .label-text {
            font-family: sans-serif;
            font-weight: bold;
            fill: var(--accent-color);
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .show-label {
            opacity: 1;
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        /* Replay 버튼 크기도 화면 높이에 따라 약간 조절 */
        #replayBtn {
            padding: 0.75rem 2.5rem;
            font-size: 1.125rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Replay 버튼 -->
        <button id="replayBtn" onclick="playAnimation()" class="bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 transition-all shadow-md active:scale-95 z-10">
            Replay
        </button>

        <!-- 글자 애니메이션 영역 -->
        <div class="canvas-area">
            <div class="drawing-container">
                <div class="grid-line grid-v"></div>
                <div class="grid-line grid-h"></div>
                <div class="consonant-guide flex items-center justify-center">
                    <span class="text-slate-200 text-[10px] sm:text-xs font-bold uppercase tracking-tighter">ㅇ</span>
                </div>
            </div>
            
            <svg viewBox="-40 -40 380 380">
                <path d="M185 50 L185 250" stroke="#f8fafc" stroke-width="24" fill="none" stroke-linecap="butt" />
                <path d="M185 150 L255 150" stroke="#f8fafc" stroke-width="24" fill="none" stroke-linecap="butt" />
                <path id="stroke1" class="stroke" d="M185 50 L185 250" />
                <path id="stroke2" class="stroke" d="M185 150 L255 150" />
                <text x="185" y="20" text-anchor="middle" id="label1" class="label-text">1</text>
                <text x="295" y="160" id="label2" class="label-text">2</text>
            </svg>
        </div>
    </div>

    <script>
        function playAnimation() {
            const s1 = document.getElementById('stroke1');
            const s2 = document.getElementById('stroke2');
            const l1 = document.getElementById('label1');
            const l2 = document.getElementById('label2');
            const btn = document.getElementById('replayBtn');

            s1.classList.remove('animate-stroke-1');
            s2.classList.remove('animate-stroke-2');
            l1.classList.remove('show-label');
            l2.classList.remove('show-label');
            btn.classList.remove('btn-pulse');

            void s1.offsetWidth;

            s1.classList.add('animate-stroke-1');
            s2.classList.add('animate-stroke-2');
            
            setTimeout(() => l1.classList.add('show-label'), 100);
            setTimeout(() => l2.classList.add('show-label'), 950);
            
            setTimeout(() => {
                btn.classList.add('btn-pulse');
            }, 2000);
        }

        window.onload = function() {
            playAnimation();
        }
    </script>
</body>
</html>
