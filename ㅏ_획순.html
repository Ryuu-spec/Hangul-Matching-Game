<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 '아' 획순 애니메이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --stroke-color: #000000;
            --grid-color: #f1f5f9;
            --accent-color: #ef4444;
        }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        /* 반응형 컨테이너: 화면 너비에 맞춰 유연하게 변하며, 잘림 방지를 위해 overflow 허용 */
        .drawing-container-wrapper {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
        }

        .drawing-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* 정사각형 비율 유지 */
            background-color: white;
            border: 1px solid #e2e8f0;
        }

        .grid-line {
            position: absolute;
            background-color: var(--grid-color);
            z-index: 0;
        }
        .grid-v { width: 1px; height: 100%; left: 50%; }
        .grid-h { height: 1px; width: 100%; top: 50%; }
        
        .consonant-guide {
            position: absolute;
            width: 25%;
            height: 25%;
            border: 1.5px dashed #e2e8f0;
            border-radius: 50%;
            left: 15%;
            top: 37.5%;
            z-index: 0;
        }

        /* 잘림 방지의 핵심: SVG 영역을 박스보다 넓게 잡거나 overflow:visible 설정 */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible; /* 박스 밖의 숫자 라벨 표시 */
        }

        .stroke {
            fill: none;
            stroke: var(--stroke-color);
            stroke-width: 24;
            stroke-linecap: butt; 
            stroke-linejoin: miter;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .animate-stroke-1 {
            animation: draw 0.8s linear forwards;
        }

        .animate-stroke-2 {
            animation: draw 0.4s linear forwards;
            animation-delay: 0.9s;
        }

        .label-text {
            font-family: sans-serif;
            font-weight: bold;
            fill: var(--accent-color);
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .show-label {
            opacity: 1;
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans p-4">

    <div class="flex flex-col items-center gap-12 w-full max-w-lg">
        <!-- Replay 버튼 -->
        <button id="replayBtn" onclick="playAnimation()" class="px-12 py-3 bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 transition-all shadow-md active:scale-95 text-lg">
            Replay
        </button>

        <div class="drawing-container-wrapper">
            <div class="drawing-container">
                <!-- 배경 그리드 -->
                <div class="grid-line grid-v"></div>
                <div class="grid-line grid-h"></div>
                
                <!-- 자음 자리 가이드 -->
                <div class="consonant-guide flex items-center justify-center">
                    <span class="text-slate-200 text-[10px] sm:text-xs font-bold uppercase tracking-tighter">ㅇ</span>
                </div>
                
                <!-- viewBox 범위를 확장하여 숫자가 그려질 안전 여백(-40) 확보 -->
                <svg viewBox="-40 -40 380 380">
                    <!-- 가이드 잔상 -->
                    <path d="M185 50 L185 250" stroke="#f8fafc" stroke-width="24" fill="none" stroke-linecap="butt" />
                    <path d="M185 150 L255 150" stroke="#f8fafc" stroke-width="24" fill="none" stroke-linecap="butt" />

                    <!-- 애니메이션 획 -->
                    <path id="stroke1" class="stroke" d="M185 50 L185 250" />
                    <path id="stroke2" class="stroke" d="M185 150 L255 150" />

                    <!-- 획순 숫자 (확장된 좌표계에 맞춰 위치 조정) -->
                    <text x="185" y="25" text-anchor="middle" id="label1" class="label-text">1</text>
                    <text x="285" y="160" id="label2" class="label-text">2</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        function playAnimation() {
            const s1 = document.getElementById('stroke1');
            const s2 = document.getElementById('stroke2');
            const l1 = document.getElementById('label1');
            const l2 = document.getElementById('label2');
            const btn = document.getElementById('replayBtn');

            s1.classList.remove('animate-stroke-1');
            s2.classList.remove('animate-stroke-2');
            l1.classList.remove('show-label');
            l2.classList.remove('show-label');
            btn.classList.remove('btn-pulse');

            void s1.offsetWidth;

            s1.classList.add('animate-stroke-1');
            s2.classList.add('animate-stroke-2');
            
            setTimeout(() => l1.classList.add('show-label'), 100);
            setTimeout(() => l2.classList.add('show-label'), 950);
            
            setTimeout(() => {
                btn.classList.add('btn-pulse');
            }, 2000);
        }

        window.onload = playAnimation;
    </script>
</body>
</html>
