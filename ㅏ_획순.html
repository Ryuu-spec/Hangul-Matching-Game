<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한글 '아' 획순 애니메이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --stroke-color: #000000;
            --grid-color: #f1f5f9;
            --accent-color: #ef4444;
        }

        /* 스크롤 방지 및 전체 레이아웃 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom) 1rem;
            box-sizing: border-box;
            gap: 4vh;
        }

        /* 캔버스 영역: 반응형 비율 유지 */
        .canvas-area {
            position: relative;
            width: min(80vw, 60vh, 400px);
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
        }

        .drawing-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .grid-line {
            position: absolute;
            background-color: var(--grid-color);
            z-index: 0;
        }
        .grid-v { width: 1px; height: 100%; left: 50%; }
        .grid-h { height: 1px; width: 100%; top: 50%; }
        
        .consonant-guide {
            position: absolute;
            width: 25%;
            height: 25%;
            border: 1.5px dashed #e2e8f0;
            border-radius: 50%;
            left: 15%;
            top: 37.5%;
            z-index: 0;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .stroke {
            fill: none;
            stroke: var(--stroke-color);
            stroke-width: 24;
            stroke-linecap: butt; 
            stroke-linejoin: miter;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
        }

        @keyframes draw {
            from { stroke-dashoffset: 600; }
            to { stroke-dashoffset: 0; }
        }

        .animate-stroke-1 {
            animation: draw 0.8s linear forwards;
        }

        .animate-stroke-2 {
            animation: draw 0.4s linear forwards;
            animation-delay: 0.9s;
        }

        .label-text {
            font-family: sans-serif;
            font-weight: bold;
            fill: var(--accent-color);
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .show-label {
            opacity: 1;
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        /* 반응형 버튼 */
        #replayBtn {
            padding: clamp(0.6rem, 2.5vh, 1rem) clamp(2rem, 8vw, 3.5rem);
            font-size: clamp(1rem, 2.8vh, 1.3rem);
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Replay 버튼 -->
        <button id="replayBtn" onclick="playAnimation()" class="bg-indigo-600 text-white font-bold rounded-full hover:bg-indigo-700 transition-all shadow-md active:scale-95 z-10">
            Replay
        </button>

        <!-- 글자 애니메이션 영역 -->
        <div class="canvas-area">
            <div class="drawing-container">
                <div class="grid-line grid-v"></div>
                <div class="grid-line grid-h"></div>
                <div class="consonant-guide flex items-center justify-center">
                    <span class="text-slate-200 text-[10px] sm:text-xs font-bold uppercase tracking-tighter">ㅇ</span>
                </div>
            </div>
            
            <svg id="animationSvg" viewBox="0 0 300 300">
                <!-- 가이드 잔상 -->
                <path d="M185 50 L185 250" stroke="#f8fafc" stroke-width="24" fill="none" />
                <path d="M185 150 L255 150" stroke="#f8fafc" stroke-width="24" fill="none" />
                
                <!-- 실제 애니메이션 획 -->
                <path id="stroke1" class="stroke" d="M185 50 L185 250" />
                <path id="stroke2" class="stroke" d="M185 150 L255 150" />
                
                <!-- 획순 숫자 (위치 최적화) -->
                <text x="185" y="30" text-anchor="middle" id="label1" class="label-text">1</text>
                <!-- 숫자 2가 획과 겹치지 않게 오른쪽으로 더 이동 (x: 235 -> 275, y: 140 -> 145) -->
                <text x="275" y="145" text-anchor="middle" id="label2" class="label-text">2</text>
            </svg>
        </div>
    </div>

    <script>
        function playAnimation() {
            const svg = document.getElementById('animationSvg');
            const btn = document.getElementById('replayBtn');
            
            // 기존 애니메이션 요소들을 제거하고 다시 생성하여 "완전 리셋"
            const newSvg = svg.cloneNode(true);
            svg.parentNode.replaceChild(newSvg, svg);

            const s1 = newSvg.getElementById('stroke1');
            const s2 = newSvg.getElementById('stroke2');
            const l1 = newSvg.getElementById('label1');
            const l2 = newSvg.getElementById('label2');

            // 버튼 펄스 효과 제거
            btn.classList.remove('btn-pulse');

            // 강제 리플로우 및 애니메이션 클래스 추가
            void s1.offsetWidth;

            s1.classList.add('animate-stroke-1');
            s2.classList.add('animate-stroke-2');
            
            // 숫자 라벨 순차 표시
            setTimeout(() => l1.classList.add('show-label'), 100);
            setTimeout(() => l2.classList.add('show-label'), 950);
            
            // 애니메이션 종료 시점에 버튼 강조
            setTimeout(() => {
                btn.classList.add('btn-pulse');
            }, 2000);
        }

        // 초기 자동 실행
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(playAnimation, 500);
        });
    </script>
</body>
</html>
